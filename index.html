                  }}>Renomear</button>
                  <button onClick={() => onDelete(b.id)} disabled={count>0} style={{
                    background:'transparent', color:count>0?p.textMute:p.expense,
                    border:'none', fontSize:13, fontWeight:600,
                    cursor:count>0?'not-allowed':'pointer',
                    padding:'6px 10px', fontFamily:f.family, opacity:count>0?0.5:1,
                  }}>Eliminar</button>
                </>
              )}
            </div>
          );
        })}
      </div>
      <div style={{ padding:'16px 18px', background:p.surface2, borderRadius:12, border:`1px solid ${p.border}` }}>
        <div style={{ fontSize:12, fontWeight:700, color:p.textDim, marginBottom:8 }}>Adicionar novo banco</div>
        <div style={{ display:'flex', gap:8 }}>
          <div style={{ flex:1 }}>
            <window.TextInput value={newName} onChange={setNewName} placeholder="Ex.: Revolut, BPI, Millennium…" />
          </div>
          <button onClick={() => { if (newName.trim()) { onAdd(newName.trim()); setNewName(''); } }}
            disabled={!newName.trim()} style={{ ...s.btnPrimary(), opacity:!newName.trim()?0.4:1 }}>
            Adicionar
          </button>
        </div>
      </div>
    </window.Modal>
  );
};
</script>

<!-- ═══ DRAWERS ══════════════════════════════════════════════════════════════ -->
<script type="text/babel">
const { useState: useSD, useEffect: useED } = React;

window.Drawer = function Drawer({ open, onClose, title, kicker, children, footer, accent }) {
  const p = window.MM_PALETTE, f = window.MM_FONT, s = window.MM_STYLES;
  useED(() => {
    if (!open) return;
    const onKey = e => { if (e.key==='Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div onClick={onClose} style={{
      position:'fixed', inset:0, zIndex:999,
      background:'rgba(0,0,0,0.35)', animation:'mmFadeIn 0.15s ease-out',
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        position:'absolute', top:0, right:0, bottom:0, width:480, maxWidth:'100%',
        background:p.bg, boxShadow:'-12px 0 40px rgba(0,0,0,0.15)',
        display:'flex', flexDirection:'column', animation:'mmSlideLeft 0.2s ease-out',
      }}>
        <div style={{ padding:'22px 26px 18px', borderBottom:`1px solid ${p.border}` }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:12 }}>
            <div style={{ flex:1, minWidth:0 }}>
              {kicker && <div style={{ fontSize:11, fontWeight:700, color:accent||p.textDim,
                                       textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:4 }}>{kicker}</div>}
              <div style={s.heading(22)}>{title}</div>
            </div>
            <button onClick={onClose} style={{
              width:32, height:32, borderRadius:'50%', border:'none',
              background:p.surface2, color:p.textDim, fontSize:18, fontWeight:700, cursor:'pointer',
              display:'flex', alignItems:'center', justifyContent:'center',
              fontFamily:f.family, lineHeight:1, flexShrink:0,
            }}>×</button>
          </div>
        </div>
        <div style={{ padding:'22px 26px', overflow:'auto', flex:1 }}>{children}</div>
        {footer && (
          <div style={{ padding:'16px 26px', borderTop:`1px solid ${p.border}`,
                        display:'flex', justifyContent:'flex-end', gap:8 }}>{footer}</div>
        )}
      </div>
    </div>
  );
};

window.SectionLabel = function SectionLabel({ children, action }) {
  const p = window.MM_PALETTE;
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center',
                  marginTop:22, marginBottom:10 }}>
      <div style={{ fontSize:11, fontWeight:700, color:p.textDim,
                    textTransform:'uppercase', letterSpacing:'0.05em' }}>{children}</div>
      {action}
    </div>
  );
};

window.DangerButton = function DangerButton({ onClick, children }) {
  const p = window.MM_PALETTE, f = window.MM_FONT;
  return (
    <button onClick={onClick} style={{
      background:'transparent', color:p.expense, border:`1px solid ${p.expenseSoft}`,
      borderRadius:100, padding:'9px 16px', fontSize:13, fontWeight:600,
      cursor:'pointer', fontFamily:f.family,
    }}>{children}</button>
  );
};

// ─── Drawer: Cofre ──────────────────────────────────────────────────────────
window.CofreDrawer = function CofreDrawer({ open, onClose, idx }) {
  const p = window.MM_PALETTE, f = window.MM_FONT, s = window.MM_STYLES;
  const D = window.MM_DATA, A = window.MM_STORE.actions;
  const cofre = idx != null ? D.cofres[idx] : null;
  const [editName, setEditName] = useSD('');
  const [editTarget, setEditTarget] = useSD('');
  const [editBankId, setEditBankId] = useSD('');
  const [editing, setEditing] = useSD(false);
  const [moveMode, setMoveMode] = useSD(null); // 'deposit' | 'withdraw'
  useED(() => {
    if (cofre) { setEditName(cofre.name); setEditTarget(cofre.target?String(cofre.target):''); setEditBankId(cofre.bankId||''); setEditing(false); setMoveMode(null); }
  }, [open, idx]);
  if (!cofre) return null;
  const colorMap = { green:p.green, blue:p.blue, amber:p.amber, purple:p.purple, expense:p.expense };
  const col = colorMap[cofre.color]||p.green;
  const pct = cofre.target ? Math.min(100, (cofre.balance/cofre.target)*100) : null;
  const bank = D.banks.find(b => b.id===cofre.bankId);
  return (
    <>
    <window.Drawer open={open} onClose={onClose} kicker="Cofre"
      title={editing ? 'Editar cofre' : cofre.name} accent={col}
      footer={editing ? (
        <>
          <button onClick={() => setEditing(false)} style={s.btnGhost()}>Cancelar</button>
          <button onClick={() => {
            A.updateCofre(idx, { name:editName.trim()||cofre.name, target:parseFloat(editTarget)||null,
                                  bankId:editBankId, bank:D.banks.find(b=>b.id===editBankId)?.name });
            setEditing(false);
          }} style={s.btnPrimary()}>Guardar</button>
        </>
      ) : (
        <>
          <window.DangerButton onClick={() => {
            if (confirm(`Eliminar "${cofre.name}"?`)) { A.deleteCofre(idx); onClose(); }
          }}>Eliminar</window.DangerButton>
          <button onClick={() => setEditing(true)} style={s.btnGhost()}>Editar</button>
          <button onClick={() => setMoveMode('withdraw')} style={s.btnGhost()}>Levantar</button>
          <button onClick={() => setMoveMode('deposit')} style={s.btnPrimary()}>Depositar</button>
        </>
      )}>
      {!editing ? (
        <>
          <div style={{ padding:20, borderRadius:14, background:p.surface2, border:`1px solid ${p.border}` }}>
            <div style={{ fontSize:11, fontWeight:700, color:p.textDim,
                          textTransform:'uppercase', letterSpacing:'0.05em' }}>Saldo atual</div>
            <div style={{ ...s.number(36,col), marginTop:6 }}>{window.fmtEurFull(cofre.balance)}</div>
            {cofre.target && (
              <>
                <div style={{ fontSize:13, color:p.textMute, marginTop:4, fontWeight:600 }}>
                  de {window.fmtEur(cofre.target)} · {Math.round(pct)}%
                </div>
                <div style={{ marginTop:14, height:8, background:p.surface3, borderRadius:100, overflow:'hidden' }}>
                  <div style={{ width:`${pct}%`, height:'100%', background:col, borderRadius:100 }} />
                </div>
              </>
            )}
          </div>
          <window.SectionLabel>Detalhes</window.SectionLabel>
          <div style={{ fontSize:14, lineHeight:1.8 }}>
            {[['Banco', bank?.name||cofre.bank||'—'], ['Cor', cofre.color], ['Objetivo', cofre.target?window.fmtEur(cofre.target):'Sem objetivo']].map(([k,v]) => (
              <div key={k} style={{ display:'flex', justifyContent:'space-between' }}>
                <span style={{ color:p.textDim, fontWeight:600 }}>{k}</span><strong>{v}</strong>
              </div>
            ))}
          </div>
          <window.SectionLabel>Histórico</window.SectionLabel>
          {(!cofre.history || cofre.history.length === 0) ? (
            <div style={{ padding:'14px 16px', background:p.surface2, borderRadius:12,
                          fontSize:13, color:p.textDim, fontWeight:500, textAlign:'center' }}>
              Sem movimentos ainda.
            </div>
          ) : (
            <div style={{ borderRadius:12, overflow:'hidden', border:`1px solid ${p.border}` }}>
              {cofre.history.slice(0,20).map((h, i) => (
                <div key={i} style={{
                  display:'flex', alignItems:'center', gap:10,
                  padding:'11px 14px',
                  borderBottom: i < Math.min(cofre.history.length,20)-1 ? `1px solid ${p.border}` : 'none',
                  background: p.surface,
                }}>
                  <div style={{
                    width:28, height:28, borderRadius:'50%', flexShrink:0,
                    background: h.type==='deposit' ? p.greenSoft : p.expenseSoft,
                    color: h.type==='deposit' ? p.green : p.expense,
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontSize:14, fontWeight:700,
                  }}>{h.type==='deposit' ? '+' : '−'}</div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13, fontWeight:600, color:p.text,
                                  overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                      {h.desc || (h.type==='deposit' ? 'Depósito' : 'Levantamento')}
                    </div>
                    <div style={{ fontSize:11, color:p.textMute, marginTop:2 }}>{h.date}</div>
                  </div>
                  <div style={{ fontSize:13, fontWeight:700,
                                color: h.type==='deposit' ? p.green : p.expense, flexShrink:0 }}>
                    {h.type==='deposit' ? '+' : '−'}{window.fmtEurFull(h.amount)}
                  </div>
                </div>
              ))}
            </div>
          )}
        </>
      ) : (
        <>
          <window.Field label="Nome"><window.TextInput value={editName} onChange={setEditName} /></window.Field>
          <window.Field label="Banco">
            <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
              {D.banks.map(b => (
                <button key={b.id} onClick={() => setEditBankId(b.id)} style={{
                  padding:'9px 14px', background:editBankId===b.id?p.text:p.surface,
                  color:editBankId===b.id?p.bg:p.text, border:`1px solid ${editBankId===b.id?p.text:p.border}`,
                  borderRadius:100, fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:f.family,
                }}>{b.name}</button>
              ))}
            </div>
          </window.Field>
          <window.Field label="Objetivo (€)" hint="Deixa em branco para sem objetivo.">
            <window.TextInput value={editTarget} onChange={setEditTarget} placeholder="0" prefix="€" type="number" />
          </window.Field>
        </>
      )}
    </window.Drawer>
    <window.CofreMoveModal
      open={moveMode !== null}
      onClose={() => setMoveMode(null)}
      cofre={cofre}
      mode={moveMode}
      onConfirm={(amount, desc) => {
        if (moveMode === 'deposit') A.depositCofre(idx, amount, desc);
        else A.withdrawCofre(idx, amount, desc);
        setMoveMode(null);
      }}
    />
    </>
  );
};

// ─── Drawer: Encargo (com campos extra) ─────────────────────────────────────
window.EncargoDrawer = function EncargoDrawer({ open, onClose, encargoId, isNew }) {
  const p = window.MM_PALETTE, f = window.MM_FONT, s = window.MM_STYLES;
  const D = window.MM_DATA, A = window.MM_STORE.actions;
  const encargo = isNew ? null : D.encargos.find(e => e.id===encargoId);
  const MONTHS_FULL = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const CATS = ['casa','utilidades','tomás','seguros','outros'];

  const [name, setName]       = useSD('');
  const [amount, setAmount]   = useSD('');
  const [freq, setFreq]       = useSD('mensal');
  const [month, setMonth]     = useSD('Janeiro');
  const [cat, setCat]         = useSD('casa');
  const [method, setMethod]   = useSD('');
  const [day, setDay]         = useSD('');
  const [account, setAccount] = useSD('');
  const [recipient, setRecipient] = useSD('');

  useED(() => {
    if (!open) return;
    if (isNew) {
      setName(''); setAmount(''); setFreq('mensal'); setMonth('Janeiro'); setCat('casa');
      setMethod(''); setDay(''); setAccount(''); setRecipient('');
    } else if (encargo) {
      setName(encargo.name); setAmount(String(encargo.amount));
      setFreq(encargo.freq); setMonth(encargo.month||'Janeiro'); setCat(encargo.cat||'casa');
      setMethod(encargo.method||''); setDay(encargo.day?String(encargo.day):'');
      setAccount(encargo.account||''); setRecipient(encargo.recipient||'');
    }
  }, [open, encargoId, isNew]);

  if (!isNew && !encargo) return null;

  const submit = () => {
    const data = {
      name:name.trim(), amount:parseFloat(amount)||0, freq, cat,
      month: freq==='anual' ? month : undefined,
      method: method||undefined,
      day: day ? parseInt(day) : undefined,
      account: account.trim()||undefined,
      recipient: recipient.trim()||undefined,
    };
    if (isNew) A.addEncargo(data); else A.updateEncargo(encargoId, data);
    onClose();
  };

  const BtnToggle = ({ options, value, onChange }) => (
    <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
      {options.map(opt => (
        <button key={opt.v} onClick={() => onChange(opt.v)} style={{
          padding:'9px 14px', background:value===opt.v?p.text:p.surface,
          color:value===opt.v?p.bg:p.text, border:`1px solid ${value===opt.v?p.text:p.border}`,
          borderRadius:100, fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:f.family,
        }}>{opt.l}</button>
      ))}
    </div>
  );

  return (
    <window.Drawer open={open} onClose={onClose}
      kicker={isNew ? 'Novo encargo' : 'Encargo'}
      title={isNew ? 'Adicionar encargo' : (encargo?.name||'')}
      footer={<>
        {!isNew && (
          <window.DangerButton onClick={() => {
            if (confirm(`Eliminar "${encargo.name}"? Não afeta meses anteriores.`)) { A.deleteEncargo(encargoId); onClose(); }
          }}>Eliminar</window.DangerButton>
        )}
        <button onClick={onClose} style={s.btnGhost()}>Cancelar</button>
        <button onClick={submit} disabled={!name.trim()||!amount}
          style={{ ...s.btnPrimary(), opacity:(!name.trim()||!amount)?0.4:1 }}>
          {isNew ? 'Criar' : 'Guardar'}
        </button>
      </>}>
      {!isNew && (
        <div style={{ padding:'12px 16px', marginBottom:18, borderRadius:10, fontSize:13, fontWeight:600,
                      background:encargo.active?p.greenSoft:p.surface2,
                      color:encargo.active?p.green:p.textDim,
                      display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span>{encargo.active ? 'Ativo · gera tarefa em cada mês' : 'Inativo · não gera tarefas'}</span>
          <button onClick={() => A.toggleEncargo(encargoId)} style={{
            background:encargo.active?p.green:p.text, color:encargo.active?p.onGreen:p.bg,
            border:'none', borderRadius:100, padding:'6px 12px',
            fontSize:12, fontWeight:700, cursor:'pointer', fontFamily:f.family,
          }}>{encargo.active ? 'Desativar' : 'Ativar'}</button>
        </div>
      )}
      <window.Field label="Nome">
        <window.TextInput value={name} onChange={setName} placeholder="Ex.: Renda, Eletricidade…" />
      </window.Field>
      <window.Field label="Valor (€)" hint={freq==='mensal'?'Estimativa mensal.':'Valor único por ano.'}>
        <window.TextInput value={amount} onChange={setAmount} placeholder="0" prefix="€" type="number" />
      </window.Field>
      <window.Field label="Frequência">
        <BtnToggle options={[{v:'mensal',l:'Mensal'},{v:'anual',l:'Anual'}]} value={freq} onChange={setFreq} />
      </window.Field>
      {freq==='anual' && (
        <window.Field label="Mês de cobrança">
          <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
            {MONTHS_FULL.map(m => (
              <button key={m} onClick={() => setMonth(m)} style={{
                padding:'7px 11px', background:month===m?p.text:p.surface,
                color:month===m?p.bg:p.text, border:`1px solid ${month===m?p.text:p.border}`,
                borderRadius:100, fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:f.family,
              }}>{m.slice(0,3)}</button>
            ))}
          </div>
        </window.Field>
      )}
      <window.Field label="Categoria">
        <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
          {CATS.map(c => (
            <button key={c} onClick={() => setCat(c)} style={{
              padding:'8px 12px', background:cat===c?p.text:p.surface,
              color:cat===c?p.bg:p.text, border:`1px solid ${cat===c?p.text:p.border}`,
              borderRadius:100, fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:f.family, textTransform:'capitalize',
            }}>{c}</button>
          ))}
        </div>
      </window.Field>
      <window.Field label="Método de pagamento" hint="Opcional — automático (MB/débito direto) ou manual.">
        <BtnToggle options={[{v:'',l:'Qualquer'},{v:'auto',l:'Automático'},{v:'manual',l:'Manual'}]} value={method} onChange={setMethod} />
      </window.Field>
      <window.Field label="Dia do débito" hint="Dia do mês em que é processado (opcional).">
        <window.TextInput value={day} onChange={setDay} placeholder="Ex.: 5" type="number" />
      </window.Field>
      <window.Field label="Conta de origem" hint="Opcional.">
        <window.TextInput value={account} onChange={setAccount} placeholder="Ex.: Conta Conjunta" />
      </window.Field>
      <window.Field label="Destinatário" hint="Opcional.">
        <window.TextInput value={recipient} onChange={setRecipient} placeholder="Ex.: Nosso caseiro, Seguradora…" />
      </window.Field>
    </window.Drawer>
  );
};

// ─── Drawer: Tarefa ─────────────────────────────────────────────────────────
window.TaskDrawer = function TaskDrawer({ open, onClose, taskId }) {
  const p = window.MM_PALETTE, f = window.MM_FONT, s = window.MM_STYLES;
  const D = window.MM_DATA, A = window.MM_STORE.actions;
  const task = D.tasks.find(t => t.id===taskId);
  const [editing, setEditing] = useSD(false);
  const [editLabel, setEditLabel] = useSD('');
  const [editAmount, setEditAmount] = useSD('');
  useED(() => {
    if (task) { setEditLabel(task.label); setEditAmount(String(task.amount)); setEditing(false); }
  }, [open, taskId]);
  if (!task) return null;
  const enc = task.encargoId ? D.encargos.find(e => e.id===task.encargoId) : null;
  return (
    <window.Drawer open={open} onClose={onClose}
      kicker={task.type==='Auto' ? 'Tarefa auto' : 'Tarefa manual'}
      title={editing ? 'Editar tarefa' : task.label}
      accent={task.done ? p.green : p.text}
      footer={editing ? (
        <>
          <button onClick={() => setEditing(false)} style={s.btnGhost()}>Cancelar</button>
          <button onClick={() => {
            A.updateTask(taskId, { label:editLabel.trim()||task.label, amount:parseFloat(editAmount)||0 });
            setEditing(false);
          }} style={s.btnPrimary()}>Guardar</button>
        </>
      ) : (
        <>
          <window.DangerButton onClick={() => {
            if (confirm(`Eliminar "${task.label}"?`)) { A.deleteTask(taskId); onClose(); }
          }}>Eliminar</window.DangerButton>
          <button onClick={() => setEditing(true)} style={s.btnGhost()}>Editar</button>
          <button onClick={() => A.toggleTask(taskId)} style={s.btnPrimary()}>
            {task.done ? 'Desmarcar' : 'Marcar feita'}
          </button>
        </>
      )}>
      {!editing ? (
        <>
          <div style={{ padding:20, borderRadius:14,
                        background:task.done?p.greenSoft:p.surface2,
                        border:`1px solid ${task.done?p.green:p.border}` }}>
            <div style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.05em',
                          color:task.done?p.green:p.textDim }}>{task.done ? 'Feita' : 'Pendente'}</div>
            <div style={{ ...s.number(32,p.text), marginTop:6 }}>{window.fmtEurFull(task.amount)}</div>
            {task.done && task.who && (
              <div style={{ fontSize:13, color:p.textDim, marginTop:6, fontWeight:600 }}>Marcada por {task.who}</div>
            )}
          </div>
          <window.SectionLabel>Detalhes</window.SectionLabel>
          <div style={{ fontSize:14, lineHeight:1.9 }}>
            {[
              ['Tipo', task.type],
              task.when && ['Data prevista', task.when],
              task.badge && ['Etiqueta', task.badge],
              enc && enc.account && ['Conta', enc.account],
              enc && enc.recipient && ['Destinatário', enc.recipient],
              enc && enc.method && ['Método', enc.method],
              enc && ['Origem', 'Encargo recorrente'],
            ].filter(Boolean).map(([k,v]) => (
              <div key={k} style={{ display:'flex', justifyContent:'space-between' }}>
                <span style={{ color:p.textDim, fontWeight:600 }}>{k}</span>
                <strong style={{ textTransform: k==='Método' ? 'capitalize' : 'none' }}>{v}</strong>
              </div>
            ))}
          </div>
        </>
      ) : (
        <>
          <window.Field label="Descrição"><window.TextInput value={editLabel} onChange={setEditLabel} /></window.Field>
          <window.Field label="Valor (€)"><window.TextInput value={editAmount} onChange={setEditAmount} prefix="€" type="number" /></window.Field>
        </>
      )}
    </window.Drawer>
  );
};

// ─── Drawer: Investimento ───────────────────────────────────────────────────
window.InvestmentDrawer = function InvestmentDrawer({ open, onClose, idx }) {
  const p = window.MM_PALETTE, s = window.MM_STYLES;
  const D = window.MM_DATA, A = window.MM_STORE.actions;
  const it = idx != null ? D.investimentos[idx] : null;
  const [editing, setEditing] = useSD(false);
  const [editAsset, setEditAsset] = useSD('');
  const [editAmount, setEditAmount] = useSD('');
  const [editChange, setEditChange] = useSD('');
  useED(() => {
    if (it) { setEditAsset(it.asset); setEditAmount(String(it.amount)); setEditChange(String(it.change||0)); setEditing(false); }
  }, [open, idx]);
  if (!it) return null;
  const positive = it.change >= 0;
  return (
    <window.Drawer open={open} onClose={onClose} kicker={it.plat}
      title={editing ? 'Editar posição' : it.asset}
      accent={positive ? p.green : p.expense}
      footer={editing ? (
        <>
          <button onClick={() => setEditing(false)} style={s.btnGhost()}>Cancelar</button>
          <button onClick={() => {
            A.updateInvestimento(idx, { asset:editAsset.trim()||it.asset, amount:parseFloat(editAmount)||0, change:parseFloat(editChange)||0 });
            setEditing(false);
          }} style={s.btnPrimary()}>Guardar</button>
        </>
      ) : (
        <>
          <window.DangerButton onClick={() => {
            if (confirm(`Eliminar "${it.asset}"?`)) { A.deleteInvestimento(idx); onClose(); }
          }}>Eliminar</window.DangerButton>
          <button onClick={() => setEditing(true)} style={s.btnGhost()}>Editar</button>
          <button onClick={onClose} style={s.btnPrimary()}>Fechar</button>
        </>
      )}>
      {!editing ? (
        <>
          <div style={{ padding:20, borderRadius:14, background:p.surface2, border:`1px solid ${p.border}` }}>
            <div style={{ fontSize:11, fontWeight:700, color:p.textDim, textTransform:'uppercase', letterSpacing:'0.05em' }}>Valor investido</div>
            <div style={{ ...s.number(32), marginTop:6 }}>{window.fmtEurFull(it.amount)}</div>
            <div style={{ fontSize:14, fontWeight:700, marginTop:8, color:positive?p.green:p.expense }}>
              {positive?'↑':'↓'} {Math.abs(it.change).toFixed(1)}% vs. preço médio
            </div>
          </div>
          <window.SectionLabel>Detalhes</window.SectionLabel>
          <div style={{ fontSize:14, lineHeight:1.9 }}>
            {[['Plataforma',it.plat],['Ativo',it.asset]].map(([k,v]) => (
              <div key={k} style={{ display:'flex', justifyContent:'space-between' }}>
                <span style={{ color:p.textDim, fontWeight:600 }}>{k}</span><strong>{v}</strong>
              </div>
            ))}
          </div>
        </>
      ) : (
        <>
          <window.Field label="Ativo"><window.TextInput value={editAsset} onChange={setEditAsset} /></window.Field>
          <window.Field label="Valor investido (€)"><window.TextInput value={editAmount} onChange={setEditAmount} prefix="€" type="number" /></window.Field>
          <window.Field label="Variação (%)" hint="Positivo se está a ganhar."><window.TextInput value={editChange} onChange={setEditChange} prefix="%" type="number" /></window.Field>
        </>
      )}
    </window.Drawer>
  );
};
</script>

<!-- ═══ SCREEN: HOME ═════════════════════════════════════════════════════════ -->
<script type="text/babel">
const { useState: useSH } = React;

window.ScreenHome = function ScreenHome({ goto }) {
  const p = window.MM_PALETTE, f = window.MM_FONT, s = window.MM_STYLES;
  const D = window.MM_DATA;
  const fmtEur = window.fmtEur, fmtEurFull = window.fmtEurFull;
  const [filter, setFilter] = useSH('pending');
  const [showNewTask, setShowNewTask] = useSH(false);
  const [showNewJosi, setShowNewJosi] = useSH(false);
  const [showNewSpend, setShowNewSpend] = useSH(false);
  const [showNewInvest, setShowNewInvest] = useSH(false);

  const pct = D.tasksTotal > 0 ? Math.round((D.tasksDone/D.tasksTotal)*100) : 0;
  const allDone = D.tasksTotal > 0 && D.tasksDone === D.tasksTotal;
  const filtered = D.tasks.filter(task => {
    if (filter==='pending') return !task.done;
    if (filter==='auto')    return task.type==='Auto';
    if (filter==='manual')  return task.type==='Manual';
    return true;
  }).slice(0, 6);

  const safeHistory = D.spendHistory.length > 0 ? D.spendHistory : [{ m:'—', fixos:0, var:0, josi:0, anuais:0, current:true }];
  const max = Math.max(1, ...safeHistory.map(m => m.fixos+m.var+m.josi+m.anuais));
  const current = safeHistory.find(m => m.current) || safeHistory[safeHistory.length-1];
  const avg = safeHistory.reduce((sm,m) => sm+m.fixos+m.var+m.josi+m.anuais, 0) / safeHistory.length;
  const currentTotal = current.fixos+current.var+current.josi+current.anuais;
  const diff = currentTotal - avg;

  const glyph = k => {
    if (k==='task')   return { bg:p.greenSoft,   c:p.green,   sym:'✓' };
    if (k==='invest') return { bg:p.greenSoft,   c:p.green,   sym:'↗' };
    if (k==='josi')   return { bg:p.amberSoft,   c:p.amber,   sym:'h' };
    if (k==='spend')  return { bg:p.expenseSoft, c:p.expense, sym:'€' };
    return { bg:p.surface3, c:p.textDim, sym:'·' };
  };

  return (
    <div>
      {/* Row 1: Hero + Upcoming */}
      <div style={{ display:'grid', gridTemplateColumns:'1.5fr 1fr', gap:14, marginBottom:14 }}>
        <div style={s.card()}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
            <div>
              <div style={s.kicker()}>Progresso do mês</div>
              <div style={s.heading(22)}>{D.month}</div>
            </div>
            <div style={{ textAlign:'right' }}>
              <div style={s.number(30)}>{D.tasksDone}<span style={{ color:p.textMute, fontSize:20 }}>/{D.tasksTotal}</span></div>
              <div style={{ fontSize:12, color:p.textMute, marginTop:4, fontWeight:500 }}>tarefas feitas</div>
            </div>
          </div>
          <div style={{ marginTop:24, height:10, background:p.surface3, borderRadius:100, overflow:'hidden' }}>
            <div style={{ width:`${pct}%`, height:'100%', background:p.green, borderRadius:100 }} />
          </div>
          {allDone ? (
            <div style={{ marginTop:14, display:'flex', alignItems:'center', gap:10, fontSize:13, color:p.green, fontWeight:700 }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="7.5" fill={p.green}/>
                <path d="M4.5 8.5L7 11L11.5 5.5" stroke={p.onGreen} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
              Tudo feito este mês — não falta transferir nada.
            </div>
          ) : (
            <div style={{ marginTop:12, display:'flex', justifyContent:'space-between', fontSize:13, color:p.textDim }}>
              <span>
                <strong style={{ color:p.text, fontWeight:700 }}>{D.manualDone}/{D.manualTotal}</strong>
                <span style={{ color:p.textMute }}> manuais</span>
                <span style={{ margin:'0 10px', color:p.textMute }}>·</span>
                <strong style={{ color:p.text, fontWeight:700 }}>{D.autoDone}/{D.autoTotal}</strong>
                <span style={{ color:p.textMute }}> auto</span>
              </span>
              <span>Falta <strong style={{ ...s.number(15,p.expense), display:'inline-block' }}>{fmtEur(D.pendingAmount)}</strong></span>
            </div>
          )}
        </div>
        <div style={{ ...s.card(), borderColor:p.borderStrong }}>
          <div style={s.kicker()}>A chegar</div>
          {D.bigUpcoming.amount > 0 ? (
            <>
              <div style={{ fontSize:12, color:p.textDim, marginBottom:6, fontWeight:500 }}>Anual · {D.bigUpcoming.when}</div>
              <div style={s.heading(19)}>{D.bigUpcoming.name}</div>
              <div style={{ ...s.number(28,p.amber), marginTop:8 }}>{fmtEurFull(D.bigUpcoming.amount)}</div>
            </>
          ) : (
            <div style={{ fontSize:13, color:p.textMute, fontWeight:500, marginTop:8 }}>Sem encargos anuais próximos.</div>
          )}
        </div>
      </div>

      {/* Row 2: 4 stats */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:14, marginBottom:14 }}>
        {[
          { k:'Total este mês',     v:fmtEurFull(currentTotal), sub:`${fmtEur(Math.abs(diff))} ${diff>0?'acima':'abaixo'} da média`, ac:p.expense, cta:'Analisar →', go:'gastos' },
          { k:'Limpeza este mês',   v:`${D.josiHours}h`,         sub:fmtEurFull(D.josiAmount),          ac:p.amber,   cta:'Registar horas →', go:'josi' },
          { k:'Investido este mês', v:fmtEurFull(D.monthInvestedAmount||0), sub:`${D.monthInvestedCount||0} ${(D.monthInvestedCount||0)===1?'registo':'registos'}`, ac:p.green, cta:'Registar →', go:'investir' },
          { k:'Por transferir',     v:fmtEur(D.pendingAmount),   sub:`${D.manualTotal-D.manualDone} tarefas manuais`, ac:p.blue, cta:'Ver tarefas →', go:'tarefas' },
        ].map((stat,i) => (
          <button key={i} onClick={() => goto(stat.go)} style={{ ...s.card(), cursor:'pointer', textAlign:'left', fontFamily:f.family }}>
            <div style={s.kicker()}>{stat.k}</div>
            <div style={s.number(26,stat.ac)}>{stat.v}</div>
            <div style={{ fontSize:13, color:p.textDim, marginTop:6, fontWeight:500 }}>{stat.sub}</div>
            <div style={{ fontSize:12, color:p.textMute, marginTop:12, fontWeight:600 }}>{stat.cta}</div>
          </button>
        ))}
      </div>

      {/* Row 3: Chart + Quick actions */}
      <div style={{ display:'grid', gridTemplateColumns:'1.8fr 1fr', gap:14, marginBottom:14 }}>
        <div style={s.card()}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:18 }}>
            <div>
              <div style={s.kicker()}>Gastos · últimos 7 meses</div>
              <div style={{ display:'flex', alignItems:'baseline', gap:12 }}>
                <div style={s.number(26)}>{fmtEurFull(currentTotal)}</div>
                <div style={{ fontSize:12, fontWeight:700, color:diff>0?p.expense:p.green }}>
                  {diff>0?'↑':'↓'} {fmtEur(Math.abs(diff))} vs. média
                </div>
              </div>
            </div>
            <div style={{ display:'flex', gap:14, fontSize:11, color:p.textDim, alignItems:'center', fontWeight:600 }}>
              {[{label:'Fixos',c:p.expense},{label:'Variáveis',c:p.amber},{label:'Josi',c:p.blue},{label:'Anuais',c:p.textMute}].map(l => (
                <div key={l.label} style={{ display:'flex', alignItems:'center', gap:5 }}>
                  <div style={{ width:9, height:9, borderRadius:2, background:l.c }} />{l.label}
                </div>
              ))}
            </div>
          </div>
          <div style={{ display:'flex', alignItems:'flex-end', gap:12, height:170, marginTop:8 }}>
            {safeHistory.map(m => {
              const total = m.fixos+m.var+m.josi+m.anuais;
              const isCurrent = m.current;
              return (
                <div key={m.m} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:6 }}>
                  <div style={{ fontSize:10.5, fontVariantNumeric:'tabular-nums', color:isCurrent?p.text:p.textMute, fontWeight:isCurrent?700:500 }}>{fmtEur(total)}</div>
                  <div style={{ width:'100%', height:125, display:'flex', flexDirection:'column-reverse',
                                borderRadius:5, overflow:'hidden', opacity:isCurrent?1:0.5,
                                outline:isCurrent?`2px solid ${p.green}`:'none', outlineOffset:2 }}>
                    <div style={{ height:`${(m.fixos/max)*100}%`, background:p.expense }} />
                    <div style={{ height:`${(m.var/max)*100}%`, background:p.amber }} />
                    <div style={{ height:`${(m.josi/max)*100}%`, background:p.blue }} />
                    {m.anuais>0 && <div style={{ height:`${(m.anuais/max)*100}%`, background:p.textMute }} />}
                  </div>
                  <div style={{ fontSize:11, color:isCurrent?p.text:p.textMute, fontWeight:isCurrent?700:500 }}>{m.m}</div>
                </div>
              );
            })}
          </div>
        </div>
        <div style={s.card()}>
          <div style={s.kicker()}>Acções rápidas</div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
            {[
              { l:'Registar investimento', sub:'XTB · TR · Maclear',      onClick:() => setShowNewInvest(true) },
              { l:`Registar horas limpeza`, sub:`${D.josiRate}€/h`,        onClick:() => setShowNewJosi(true) },
              { l:'Adicionar gasto',        sub:'Luz · Gás · Água',        onClick:() => setShowNewSpend(true) },
              { l:'Nova tarefa extra',       sub:'Pagamento pontual',       onClick:() => setShowNewTask(true) },
            ].map(a => (
              <button key={a.l} onClick={a.onClick} style={{
                background:p.surface2, color:p.text, border:`1px solid ${p.border}`, borderRadius:12,
                padding:'14px 14px', textAlign:'left', display:'flex', flexDirection:'column',
                alignItems:'flex-start', gap:3, cursor:'pointer', fontFamily:f.family,
              }}>
                <span style={{ fontSize:14, fontWeight:700, letterSpacing:f.headingTrack }}>{a.l}</span>
                <span style={{ fontSize:12, color:p.textMute, fontWeight:500 }}>{a.sub}</span>
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Row 4: Tasks + Activity */}
      <div style={{ display:'grid', gridTemplateColumns:'1.5fr 1fr', gap:14 }}>
        <div style={s.card()}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
            <div><div style={s.kicker()}>A fazer este mês</div><div style={s.heading(20)}>Tarefas</div></div>
            <div style={{ display:'flex', gap:5 }}>
              {[{id:'pending',label:'Por fazer'},{id:'all',label:'Todas'},{id:'manual',label:'Manuais'},{id:'auto',label:'Auto'}].map(fl => (
                <button key={fl.id} onClick={() => setFilter(fl.id)} style={s.pill(filter===fl.id)}>{fl.label}</button>
              ))}
            </div>
          </div>
          <div>
            {filtered.length===0 && D.tasks.length===0 && (
              <window.EmptyState compact title="Sem tarefas neste mês" body="Adiciona encargos para gerar tarefas automaticamente."
                action={<button onClick={() => goto('encargos')} style={s.btnPrimary()}>Ir aos encargos</button>} />
            )}
            {filtered.length===0 && D.tasks.length>0 && (
              <div style={{ padding:'32px 0', textAlign:'center', fontSize:13, color:p.textMute, fontWeight:500 }}>
                Nada a mostrar com este filtro.
              </div>
            )}
            {filtered.map((task,i) => {
              const isAuto = task.type==='Auto';
              const od = window.taskOverdueInfo(task);
              return (
                <div key={task.id} style={{ display:'flex', alignItems:'center', gap:14, padding:'13px 0',
                                            borderBottom:i<filtered.length-1?`1px solid ${p.border}`:'none',
                                            opacity:task.done?0.5:1 }}>
                  <div onClick={() => window.MM_STORE.actions.toggleTask(task.id)} style={{
                    width:22, height:22, borderRadius:'50%',
                    border:`2px solid ${task.done?p.green:(od.isOverdue?p.expense:p.textMute)}`,
                    background:task.done?p.green:'transparent', color:p.onGreen,
                    fontSize:12, fontWeight:800, display:'flex', alignItems:'center', justifyContent:'center',
                    flexShrink:0, cursor:'pointer',
                  }}>{task.done?'✓':''}</div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:14, fontWeight:600, letterSpacing:f.bodyTrack,
                                  textDecoration:task.done?'line-through':'none',
                                  color:task.done?p.textMute:(od.isOverdue?p.expense:p.text) }}>{task.label}</div>
                    {od.isOverdue ? (
                      <div style={{ fontSize:11, color:p.expense, marginTop:2, fontWeight:700 }}>Atrasada {od.daysLate} {od.daysLate===1?'dia':'dias'} · era dia {od.dueDay}</div>
                    ) : task.when && (
                      <div style={{ fontSize:11, color:p.textMute, marginTop:2, fontWeight:500 }}>Débito {task.when}</div>
                    )}
                  </div>
                  {task.badge && <div style={{ fontSize:10, textTransform:'uppercase', letterSpacing:'0.08em', padding:'3px 9px', borderRadius:6, fontWeight:700, background:p.purpleSoft, color:p.purple }}>{task.badge}</div>}
                  <div style={{ fontSize:10, textTransform:'uppercase', letterSpacing:'0.08em', padding:'3px 9px', borderRadius:6, fontWeight:700, background:isAuto?p.blueSoft:p.amberSoft, color:isAuto?p.blue:p.amber }}>{isAuto?'Auto':'Manual'}</div>
                  <div style={{ ...s.number(15,task.done?p.textMute:p.text), minWidth:80, textAlign:'right' }}>{fmtEurFull(task.amount)}</div>
                </div>
              );
            })}
          </div>
          <button onClick={() => goto('tarefas')} style={{
            marginTop:12, width:'100%', background:'transparent', border:`1px solid ${p.border}`,
            borderRadius:100, padding:'10px', color:p.textDim, fontSize:13, fontWeight:600,
            cursor:'pointer', fontFamily:f.family,
          }}>Ver todas as {D.tasksTotal} tarefas →</button>
        </div>
        <div style={s.card()}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:14 }}>
            <div><div style={s.kicker()}>Feito recentemente</div><div style={s.heading(20)}>Atividade</div></div>
          </div>
          <div>
            {D.activity.length===0 && (
              <window.EmptyState compact title="Sem atividade ainda" body="Quando marcares tarefas, registares gastos ou movimentos, aparecem aqui." />
            )}
            {D.activity.map((a,i) => {
              const g = glyph(a.kind);
              return (
                <div key={i} style={{ display:'flex', alignItems:'center', gap:12, padding:'11px 0',
                                      borderBottom:i<D.activity.length-1?`1px solid ${p.border}`:'none' }}>
                  <div style={{ width:30, height:30, borderRadius:'50%', background:g.bg, color:g.c,
                                display:'flex', alignItems:'center', justifyContent:'center',
                                fontSize:13, fontWeight:800, flexShrink:0 }}>{g.sym}</div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13, letterSpacing:f.bodyTrack }}>
                      <span style={{ fontWeight:700 }}>{a.who}</span>
                      <span style={{ color:p.textDim, fontWeight:500 }}> {a.what}</span>
                    </div>
                    <div style={{ fontSize:11, color:p.textMute, marginTop:2, fontWeight:500 }}>{a.when}</div>
                  </div>
                  {a.amt && <div style={{ ...s.number(13,p.textDim), flexShrink:0 }}>{a.amt}</div>}
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <window.NewTaskModal open={showNewTask} onClose={() => setShowNewTask(false)}
        onCreate={(label,amount) => window.MM_STORE.actions.addTask(label,amount,'Manual')} />
      <window.NewJosiSessionModal open={showNewJosi} onClose={() => setShowNewJosi(false)}
        rate={D.josi.rate} workerName={D.josi.workerName}
        onCreate={(date,hours,obs) => window.MM_STORE.actions.addJosiSession(date,hours,obs)} />
      <window.NewSpendModal open={showNewSpend} onClose={() => setShowNewSpend(false)}
        categories={Object.keys(D.variaveis).length>0?Object.keys(D.variaveis):['Eletricidade','Gás','Água']}
        onCreate={(cat,date,amount) => window.MM_STORE.actions.addVariable(cat,date,amount)} />
      <window.NewInvestmentModal open={showNewInvest} onClose={() => setShowNewInvest(false)}
        platforms={[...new Set(D.investimentos.map(i=>i.plat))]}
        assets={D.investimentos}
        onCreate={(plat,asset,amount) => window.MM_STORE.actions.addInvestment(plat,asset,amount)} />
    </div>
  );
};
</script>

<script type="text/babel">
const { useState: useST } = React;

window.ScreenTarefas = function ScreenTarefas({ goto }) {
  const p = window.MM_PALETTE, f = window.MM_FONT, s = window.MM_STYLES;
  const D = window.MM_DATA;
  const { state, actions: A } = window.useMonimoniStore();
  const fmtEur = window.fmtEur, fmtEurFull = window.fmtEurFull;
  const [filter, setFilter] = useST('all');
  const [group,  setGroup]  = useST('status');
  const [showNew, setShowNew] = useST(false);
  const [showTemplates, setShowTemplates] = useST(false);
  const [detailId, setDetailId] = useST(null);

  const templates = state.taskTemplates || [];
  const overdueTasks = D.tasks.filter(t => !t.done && window.taskOverdueInfo(t).isOverdue);
  const filtered = D.tasks.filter(t => {
    if (filter==='pending') return !t.done;
    if (filter==='done')    return t.done;
    if (filter==='recorrente') return t.type==='Auto';
    if (filter==='pontual')    return t.type==='Manual';
    if (filter==='overdue') return !t.done && window.taskOverdueInfo(t).isOverdue;
    return true;
  });

  const totalPending = D.tasks.filter(t => !t.done).reduce((sum,t) => sum+t.amount, 0);
  const totalDone    = D.tasks.filter(t => t.done).reduce((sum,t) => sum+t.amount, 0);
  const totalAll     = D.tasks.reduce((sum,t) => sum+t.amount, 0);
  const totalOverdue = overdueTasks.reduce((sum,t) => sum+t.amount, 0);
  const allDone = D.tasksTotal>0 && D.tasksDone===D.tasksTotal;
  const pct = D.tasksTotal>0 ? Math.round((D.tasksDone/D.tasksTotal)*100) : 0;

  const groups = group==='status'
    ? [{ id:'pending', title:'Por fazer', items:filtered.filter(t=>!t.done) }, { id:'done', title:'Feito', items:filtered.filter(t=>t.done) }]
    : [{ id:'pontual', title:'Pontuais', items:filtered.filter(t=>t.type==='Manual') }, { id:'recorrente', title:'Recorrentes', items:filtered.filter(t=>t.type==='Auto') }];

  return (
    <div>
      <window.PageTitle kicker="Tarefas"
        title={allDone ? 'Tudo feito este mês 🎉' : `${D.tasksDone}/${D.tasksTotal} feitas`}
        sub={D.tasksTotal===0
          ? 'Sem tarefas neste mês — adiciona encargos para gerar tarefas automaticamente.'
          : allDone ? 'Não falta transferir nada este mês.'
          : overdueTasks.length>0
            ? <span><strong style={{ color:p.expense, fontWeight:700 }}>{overdueTasks.length} {overdueTasks.length===1?'tarefa atrasada':'tarefas atrasadas'}</strong> · falta transferir {fmtEurFull(totalPending)}.</span>
            : `Falta transferir ${fmtEurFull(totalPending)} este mês.`}
        action={<>
          <button onClick={() => setShowTemplates(true)} style={s.btnGhost()}>
            ↺ Recorrentes {templates.length > 0 && <span style={{ marginLeft:4, fontSize:11, opacity:0.7 }}>{templates.length}</span>}
          </button>
          <button onClick={() => setShowNew(true)} style={s.btnPrimary()}>+ Nova tarefa</button>
        </>}
      />

      {/* Summary */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:14, marginBottom:22 }}>
        <div style={s.card()}>
          <div style={s.kicker()}>Progresso</div>
          <div style={s.number(28,allDone?p.green:p.text)}>{pct}%</div>
          <div style={{ marginTop:12, height:8, background:p.surface3, borderRadius:100, overflow:'hidden' }}>
            <div style={{ width:`${pct}%`, height:'100%', background:p.green, borderRadius:100 }} />
          </div>
        </div>
        <div style={s.card()}>
          <div style={s.kicker()}>Por fazer</div>
          <div style={s.number(28,(D.tasksTotal-D.tasksDone)===0?p.green:p.expense)}>{D.tasksTotal-D.tasksDone}</div>
          <div style={{ fontSize:13, color:p.textDim, marginTop:6, fontWeight:500 }}>{fmtEurFull(totalPending)}</div>
        </div>
        <div style={s.card()}>
          <div style={s.kicker()}>Feitas</div>
          <div style={s.number(28,p.green)}>{D.tasksDone}</div>
          <div style={{ fontSize:13, color:p.textDim, marginTop:6, fontWeight:500 }}>{fmtEurFull(totalDone)}</div>
        </div>
        {overdueTasks.length>0 ? (
          <div style={{ ...s.card(), background:p.expenseSoft, borderColor:'rgba(176,48,48,0.2)' }}>
            <div style={{ ...s.kicker(), color:p.expense }}>Atrasadas</div>

<script type="text/babel">
// ── ScreenGastos + Donut + LineChart ─────────────────────────────────────────
const { useState: useSG } = React;

function Donut({ data, total }) {
  const p = window.MM_PALETTE;
  const r = 64, cx = 80, cy = 80, stroke = 22;
  const C = 2 * Math.PI * r;
  let offset = 0;
  return (
    <svg width="160" height="160" viewBox="0 0 160 160">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={p.surface3} strokeWidth={stroke} />
      {data.map((d, i) => {
        if (!total || !d.amount) return null;
        const frac = d.amount / total;
        const len = C * frac;
        const dash = `${len} ${C - len}`;
        const dashOffset = -offset;
        offset += len;
        return (
          <circle key={i} cx={cx} cy={cy} r={r} fill="none"
            stroke={d.c} strokeWidth={stroke}
            strokeDasharray={dash} strokeDashoffset={dashOffset}
            transform={`rotate(-90 ${cx} ${cy})`} />
        );
      })}
      <text x={cx} y={cy-4} textAnchor="middle"
        fontFamily={window.MM_FONT.family} fontWeight={700} fontSize={20}
        fill={p.text} style={{ fontVariantNumeric:'tabular-nums', letterSpacing:'-0.02em' }}>
        {Math.round(total)}€
      </text>
      <text x={cx} y={cy+16} textAnchor="middle"
        fontFamily={window.MM_FONT.family} fontWeight={500} fontSize={10}
        fill={p.textMute} style={{ letterSpacing:'0.06em', textTransform:'uppercase' }}>
        TOTAL
      </text>
    </svg>
  );
}

function LineChart({ data, avg, max }) {
  const p = window.MM_PALETTE, f = window.MM_FONT;
  if (!data || data.length < 2) return (
    <div style={{ height:80, display:'flex', alignItems:'center', justifyContent:'center',
      color:p.textMute, fontSize:13, fontWeight:500 }}>Sem dados suficientes</div>
  );
  const W = 1100, H = 200, pad = 30;
  const innerW = W - pad*2, innerH = H - pad*2;
  const yScale = v => pad + innerH - (v / (max*1.15||1)) * innerH;
  const xScale = i => pad + (i / Math.max(1, data.length-1)) * innerW;
  const path = data.map((d,i) => `${i===0?'M':'L'} ${xScale(i)} ${yScale(d.amount)}`).join(' ');
  const monthLabel = d => {
    const date = new Date(d);
    return ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][date.getMonth()];
  };
  return (
    <div style={{ width:'100%', overflow:'hidden' }}>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display:'block' }}>
        <line x1={pad} x2={W-pad} y1={yScale(avg)} y2={yScale(avg)}
          stroke={p.textMute} strokeDasharray="4 4" strokeWidth={1} />
        <text x={W-pad} y={yScale(avg)-6} textAnchor="end"
          fontFamily={f.family} fontWeight={600} fontSize={11} fill={p.textMute}>
          média {Math.round(avg)}€
        </text>
        <path d={path} fill="none" stroke={p.amber} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round" />
        {data.map((d, i) => (
          <g key={i}>
            <circle cx={xScale(i)} cy={yScale(d.amount)} r={5} fill={p.bg} stroke={p.amber} strokeWidth={2.5} />
            <text x={xScale(i)} y={yScale(d.amount)-14} textAnchor="middle"
              fontFamily={f.family} fontWeight={700} fontSize={12} fill={p.text}
              style={{ fontVariantNumeric:'tabular-nums' }}>{d.amount}€</text>
            <text x={xScale(i)} y={H-8} textAnchor="middle"
              fontFamily={f.family} fontWeight={600} fontSize={11} fill={p.textMute}>
              {monthLabel(d.date)}
            </text>
          </g>
        ))}
      </svg>
    </div>
  );
}

window.ScreenGastos = function ScreenGastos({ goto }) {
  const p = window.MM_PALETTE, f = window.MM_FONT, s = window.MM_STYLES;
  const D = window.MM_DATA;
  const fmtEur = window.fmtEur, fmtEurFull = window.fmtEurFull;
  const [range, setRange] = useSG('7m');
  const [variableTab, setVariableTab] = useSG(Object.keys(D.variaveis||{})[0] || 'Eletricidade');
  const [showNew, setShowNew] = useSG(false);

  const safeHistory = D.spendHistory && D.spendHistory.length > 0
    ? D.spendHistory : [{ m:'...', fixos:0, var:0, josi:0, anuais:0, current:true }];
  const max = Math.max(1, ...safeHistory.map(m => m.fixos + m.var + m.josi + m.anuais));
  const current = safeHistory.find(m => m.current) || safeHistory[safeHistory.length-1];
  const avg = safeHistory.reduce((sm,m) => sm + m.fixos + m.var + m.josi + m.anuais, 0) / safeHistory.length;
  const currentTotal = current.fixos + current.var + current.josi + current.anuais;
  const diff = currentTotal - avg;

  const breakdown = [
    { label:'Fixos mensais',           amount:current.fixos,  c:p.expense },
    { label:'Variáveis (luz/gás/água)', amount:current.var,    c:p.amber },
    { label:'Josi (limpeza)',           amount:current.josi,   c:p.blue },
    { label:'Anuais (proporcionais)',   amount:current.anuais, c:p.textMute },
  ];

  const variable = (D.variaveis||{})[variableTab] || [];
  const hasVar = variable.length > 0;
  const vMin = hasVar ? Math.min(...variable.map(v => v.amount)) : 0;
  const vMax = hasVar ? Math.max(...variable.map(v => v.amount)) : 0;
  const vAvg = hasVar ? variable.reduce((sm,v) => sm + v.amount, 0) / variable.length : 0;
  const varKeys = Object.keys(D.variaveis||{});

  return (
    <div>
      <window.PageTitle
        kicker="Gastos & análise"
        title={`${D.month} · ${fmtEurFull(currentTotal)}`}
        sub={
          <span>
            <strong style={{ color:diff>0?p.expense:p.green, fontWeight:700 }}>
              {diff>0?'↑':'↓'} {fmtEur(Math.abs(diff))}
            </strong>
            {' '}vs. média dos últimos meses · média {fmtEurFull(avg)}
          </span>
        }
        action={
          <div style={{ display:'flex', gap:8 }}>
            <button style={s.btnGhost()}>Exportar CSV</button>
            <button onClick={() => setShowNew(true)} style={s.btnPrimary()}>+ Registar gasto</button>
          </div>
        }
      />

      <div style={{ ...s.card(), marginBottom:14 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:18 }}>
          <div>
            <div style={s.kicker()}>Histórico — total por mês</div>
            <div style={{ display:'flex', alignItems:'baseline', gap:14 }}>
              <div style={s.number(34)}>{fmtEurFull(currentTotal)}</div>
              <div style={{ fontSize:13, color:p.textDim, fontWeight:500 }}>este mês · média {fmtEurFull(avg)}</div>
            </div>
          </div>
          <div style={{ display:'flex', gap:5 }}>
            {[{id:'7m',label:'7 meses'},{id:'12m',label:'12 meses'},{id:'ytd',label:'YTD'}]
              .map(r => <button key={r.id} onClick={() => setRange(r.id)} style={s.pill(range===r.id)}>{r.label}</button>)}
          </div>
        </div>
        <div style={{ display:'flex', alignItems:'flex-end', gap:14, height:240, marginTop:8 }}>
          {safeHistory.map(m => {
            const total = m.fixos + m.var + m.josi + m.anuais;
            const isCurrent = m.current;
            return (
              <div key={m.m} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:8 }}>
                <div style={{ fontSize:11, fontVariantNumeric:'tabular-nums',
                  color:isCurrent?p.text:p.textMute, fontWeight:isCurrent?700:500 }}>{fmtEur(total)}</div>
                <div style={{ width:'100%', height:180, display:'flex', flexDirection:'column-reverse',
                  borderRadius:6, overflow:'hidden', opacity:isCurrent?1:0.55,
                  outline:isCurrent?`2px solid ${p.green}`:'none', outlineOffset:2 }}>
                  <div style={{ height:`${(m.fixos/max)*100}%`, background:p.expense }} />
                  <div style={{ height:`${(m.var/max)*100}%`, background:p.amber }} />
                  <div style={{ height:`${(m.josi/max)*100}%`, background:p.blue }} />
                  {m.anuais>0 && <div style={{ height:`${(m.anuais/max)*100}%`, background:p.textMute }} />}
                </div>
                <div style={{ fontSize:12, color:isCurrent?p.text:p.textMute, fontWeight:isCurrent?700:500 }}>{m.m}</div>
              </div>
            );
          })}
        </div>
        <div style={{ display:'flex', gap:18, fontSize:12, color:p.textDim, alignItems:'center', fontWeight:600,
          marginTop:18, paddingTop:14, borderTop:`1px solid ${p.border}` }}>
          {[{label:'Fixos',c:p.expense,val:current.fixos},{label:'Variáveis',c:p.amber,val:current.var},
            {label:'Josi',c:p.blue,val:current.josi},{label:'Anuais',c:p.textMute,val:current.anuais}].map(l => (
            <div key={l.label} style={{ display:'flex', alignItems:'center', gap:7 }}>
              <div style={{ width:10, height:10, borderRadius:2, background:l.c }} />
              <span>{l.label}</span>
              <span style={{ ...s.number(13,p.text), marginLeft:4 }}>{fmtEur(l.val)}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1.2fr', gap:14, marginBottom:14 }}>
        <div style={s.card()}>
          <div style={s.kicker()}>Onde foi o dinheiro · {D.month}</div>
          <div style={{ display:'flex', alignItems:'center', gap:22, marginTop:14 }}>
            <Donut data={breakdown} total={currentTotal} />
            <div style={{ flex:1 }}>
              {breakdown.map((b, i) => {
                const pct = currentTotal > 0 ? Math.round((b.amount/currentTotal)*100) : 0;
                return (
                  <div key={i} style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 0',
                    borderBottom: i<breakdown.length-1 ? `1px solid ${p.border}` : 'none' }}>
                    <div style={{ width:10, height:10, borderRadius:2, background:b.c }} />
                    <div style={{ flex:1, fontSize:13, fontWeight:600 }}>{b.label}</div>
                    <div style={{ fontSize:12, color:p.textMute, fontWeight:600 }}>{pct}%</div>
                    <div style={{ ...s.number(13), minWidth:70, textAlign:'right' }}>{fmtEur(b.amount)}</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
        <div style={s.card()}>
          <div style={s.kicker()}>Insights</div>
          <div style={{ marginTop:8 }}>
            {[
              { kind:'up',   title:'Encargos recorrentes activos', sub:`${window.MM_STORE?.get().encargos?.filter(e=>e.active&&e.freq==='mensal').length||0} mensais + ${window.MM_STORE?.get().encargos?.filter(e=>e.active&&e.freq==='anual').length||0} anuais a correr.` },
              { kind:diff>0?'up':'down', title:`${diff>0?'Acima':'Abaixo'} da média este mês`, sub:`${fmtEur(Math.abs(diff))} ${diff>0?'acima':'abaixo'} da média de ${fmtEurFull(avg)}.` },
              { kind:'flat', title:'Josi este mês', sub:`${D.josi?.sessions?.length||0} sessões · ${D.josi?.sessions?.reduce((s,x)=>s+x.hours,0)||0}h · ${fmtEur((D.josi?.sessions?.reduce((s,x)=>s+x.hours,0)||0)*(D.josi?.rate||7.5))}` },
              { kind:'flat', title:'Tarefas concluídas', sub:`${D.tasksDone||0} de ${D.tasksTotal||0} tarefas pagas este mês.` },
            ].map((it, i) => {
              const c = it.kind==='up'?p.expense : it.kind==='down'?p.green : p.textDim;
              const sym = it.kind==='up'?'↑' : it.kind==='down'?'↓' : '·';
              return (
                <div key={i} style={{ display:'flex', alignItems:'flex-start', gap:12, padding:'12px 0',
                  borderBottom: i<3 ? `1px solid ${p.border}` : 'none' }}>
                  <div style={{ width:26, height:26, borderRadius:'50%',
                    background: c===p.textDim ? p.surface3 : (it.kind==='up'?p.expenseSoft:p.greenSoft),
                    color:c, fontWeight:800, fontSize:14,
                    display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>{sym}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, fontWeight:700, marginBottom:2 }}>{it.title}</div>
                    <div style={{ fontSize:12, color:p.textDim, fontWeight:500 }}>{it.sub}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div style={s.card()}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:18 }}>
          <div>
            <div style={s.kicker()}>Gastos variáveis · histórico mês a mês</div>
            <div style={s.heading(20)}>{variableTab}</div>
            <div style={{ fontSize:12, color:p.textDim, marginTop:4, fontWeight:500 }}>
              Mín {fmtEur(vMin)} · Méd {fmtEur(vAvg)} · Máx {fmtEur(vMax)}
            </div>
          </div>
          <div style={{ display:'flex', gap:5 }}>
            {varKeys.map(k => <button key={k} onClick={() => setVariableTab(k)} style={s.pill(variableTab===k)}>{k}</button>)}
          </div>
        </div>
        {hasVar
          ? <LineChart data={variable} avg={vAvg} max={vMax} />
          : <window.EmptyState compact title="Sem registos" body="Adiciona gastos variáveis para ver o histórico." />
        }
      </div>

      <window.NewSpendModal
        open={showNew}
        onClose={() => setShowNew(false)}
        categories={varKeys.length ? varKeys : ['Eletricidade','Gás','Água']}
        onCreate={(cat, date, amount) => window.MM_STORE.actions.addVariable(cat, date, amount)}
      />
    </div>
  );
};
</script>

<script type="text/babel">
// ── ScreenJosi ───────────────────────────────────────────────────────────────
const { useState: useSJ } = React;
window.ScreenJosi = function ScreenJosi({ goto }) {
  const p = window.MM_PALETTE, f = window.MM_FONT, s = window.MM_STYLES;
  const { state } = window.useMonimoniStore();
  const D = window.MM_DATA;
  const fmtEur = window.fmtEur, fmtEurFull = window.fmtEurFull;
  const [showNew, setShowNew] = useSJ(false);
  const [editRate, setEditRate] = useSJ(false);
  const [rateInput, setRateInput] = useSJ('');

  const J = D.josi || { sessions:[], rate:7.5, workerName:'Josi', history:[] };
  const totalHours  = J.sessions.reduce((sum, x) => sum + x.hours, 0);
  const totalAmount = totalHours * J.rate;
  const history     = J.history || [];
  const totalYear   = history.reduce((sum, x) => sum + x.total, 0);
  const totalHoursYear = history.reduce((sum, x) => sum + x.h, 0);
  const histCount   = history.length || 1;
  const maxH        = Math.max(1, ...history.map(x => x.h));

  const handleRateSubmit = () => {
    const r = parseFloat(rateInput);
    if (r > 0) {
      window.MM_STORE.actions.setJosiRate(r);
      window.MM_TOAST?.push(`Tarifa actualizada para ${r}€/h`, { kind:'success' });
    }
    setEditRate(false);
  };

  return (
    <div>
      <window.PageTitle
        kicker={`Limpeza · ${J.workerName}`}
        title={`${totalHours}h em ${D.month}`}
        sub={`${fmtEurFull(totalAmount)} a pagar este mês · ${J.rate}€/hora`}
        action={
          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
            {editRate
              ? <>
                  <input value={rateInput} onChange={e => setRateInput(e.target.value)}
                    placeholder={String(J.rate)} type="number" min="0" step="0.5"
                    style={{ width:80, padding:'8px 12px', border:`1px solid ${p.borderStrong}`,
                      borderRadius:8, fontSize:13, fontFamily:'inherit', fontWeight:600 }} />
                  <button onClick={handleRateSubmit} style={s.btnPrimary()}>Guardar</button>
                  <button onClick={() => setEditRate(false)} style={s.btnGhost()}>Cancelar</button>
                </>
              : <>
                  <button onClick={() => { setRateInput(String(J.rate)); setEditRate(true); }} style={s.btnGhost()}>Editar tarifa</button>
                  <button onClick={() => setShowNew(true)} style={s.btnPrimary()}>+ Registar sessão</button>
                </>
            }
          </div>
        }
      />

      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:14, marginBottom:22 }}>
        <div style={s.card()}>
          <div style={s.kicker()}>Mês atual</div>
          <div style={s.number(28, p.amber)}>{totalHours}h</div>
          <div style={{ fontSize:13, color:p.textDim, marginTop:6, fontWeight:500 }}>{fmtEurFull(totalAmount)}</div>
        </div>
        <div style={s.card()}>
          <div style={s.kicker()}>Sessões</div>
          <div style={s.number(28)}>{J.sessions.length}</div>
          <div style={{ fontSize:13, color:p.textDim, marginTop:6, fontWeight:500 }}>
            {J.sessions.length>0 ? `~${(totalHours/J.sessions.length).toFixed(1)}h por sessão` : 'sem sessões registadas'}
          </div>
        </div>
        <div style={s.card()}>
          <div style={s.kicker()}>Tarifa</div>
          <div style={s.number(28)}>{J.rate}€<span style={{ color:p.textMute, fontSize:18 }}>/h</span></div>
          <div style={{ fontSize:13, color:p.textDim, marginTop:6, fontWeight:500 }}>clica "Editar tarifa" para alterar</div>
        </div>
        <div style={s.card()}>
          <div style={s.kicker()}>Total ano ({histCount} meses)</div>
          <div style={s.number(28)}>{fmtEur(totalYear)}</div>
          <div style={{ fontSize:13, color:p.textDim, marginTop:6, fontWeight:500 }}>
            {totalHoursYear}h · média {fmtEur(totalYear/histCount)}/mês
          </div>
        </div>
      </div>

      {history.length > 0 && (
        <div style={{ ...s.card(), marginBottom:14 }}>
          <div style={{ marginBottom:18 }}>
            <div style={s.kicker()}>Horas por mês — últimos {histCount}</div>
            <div style={s.heading(20)}>Histórico</div>
          </div>
          <div style={{ display:'flex', alignItems:'flex-end', gap:12, height:180 }}>
            {history.map(m => {
              const isCurrent = m.current;
              return (
                <div key={m.m} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:8 }}>
                  <div style={{ fontSize:11, fontWeight:isCurrent?700:500, color:isCurrent?p.text:p.textMute }}>{m.h}h</div>
                  <div style={{ width:'70%', height:`${(m.h/maxH)*130}px`,
                    background: isCurrent?p.amber:p.amberSoft,
                    border: isCurrent?'none':`1px solid ${p.amberSoft}`,
                    borderRadius:6,
                    outline: isCurrent?`2px solid ${p.amber}`:'none', outlineOffset:3 }} />
                  <div style={{ fontSize:11, color:isCurrent?p.text:p.textMute, fontWeight:isCurrent?700:500 }}>{m.m}</div>
                  <div style={{ fontSize:10, color:p.textMute, fontVariantNumeric:'tabular-nums', fontWeight:600 }}>{fmtEur(m.total)}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div style={{ ...s.card(), padding:0 }}>
        <div style={{ padding:'14px 22px', borderBottom:`1px solid ${p.border}`, background:p.surface2,
          borderTopLeftRadius:16, borderTopRightRadius:16,
          display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div style={s.heading(15)}>Sessões em {D.month}</div>
          <div style={s.number(13, p.textDim)}>{totalHours}h · {fmtEurFull(totalAmount)}</div>
        </div>
        <div style={{ padding:'0 22px' }}>
          {J.sessions.length===0 && (
            <window.EmptyState compact
              title="Sem sessões este mês"
              body="Regista cada visita. O sistema calcula automaticamente o valor a pagar no fim do mês."
              action={<button onClick={() => setShowNew(true)} style={s.btnPrimary()}>+ Registar primeira sessão</button>}
            />
          )}
          {J.sessions.map((sess, i) => {
            const date = new Date(sess.date);
            const dayName = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][date.getDay()];
            return (
              <div key={sess.id||i} style={{ display:'flex', alignItems:'center', gap:14, padding:'14px 0',
                borderBottom: i<J.sessions.length-1 ? `1px solid ${p.border}` : 'none' }}>
                <div style={{ width:56, fontSize:11, color:p.amber, fontWeight:700,
                  letterSpacing:'0.04em', textTransform:'uppercase' }}>
                  {dayName} {date.getDate()}/{date.getMonth()+1}
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:14, fontWeight:600 }}>{sess.hours}h de limpeza</div>
                  {sess.obs
                    ? <div style={{ fontSize:11, color:p.textMute, marginTop:2, fontWeight:500 }}>{sess.obs}</div>
                    : <div style={{ fontSize:11, color:p.textMute, marginTop:2, fontWeight:500 }}>Registado por {state.currentUser||D.user}</div>
                  }
                </div>
                <div style={s.number(15, p.amber)}>{fmtEurFull(sess.hours * J.rate)}</div>
                <button onClick={() => {
                  if (window.confirm(`Eliminar sessão de ${sess.hours}h em ${sess.date}?`)) {
                    window.MM_STORE.actions.deleteJosiSession(sess.id || sess.date);
                    window.MM_TOAST?.push('Sessão eliminada', { kind:'info' });
                  }
                }} style={{ background:'transparent', border:'none', color:p.textMute,
                  fontSize:16, fontWeight:700, cursor:'pointer', padding:6 }}>⋯</button>
              </div>
            );
          })}
        </div>
      </div>

      <window.NewJosiSessionModal
        open={showNew}
        onClose={() => setShowNew(false)}
        rate={J.rate}
        workerName={J.workerName}
        onCreate={(date, hours, obs) => window.MM_STORE.actions.addJosiSession(date, hours, obs)}
      />
    </div>
  );
};
</script>
<!-- PART 5 END -->

<script type="text/babel">
// ── ScreenCofres ─────────────────────────────────────────────────────────────
const { useState: useSC } = React;
window.ScreenCofres = function ScreenCofres({ goto }) {
  const p = window.MM_PALETTE, f = window.MM_FONT, s = window.MM_STYLES;
  const { state } = window.useMonimoniStore();
  const D = window.MM_DATA;
  const fmtEur = window.fmtEur, fmtEurFull = window.fmtEurFull;
  const [showNew, setShowNew] = useSC(false);
  const [showManage, setShowManage] = useSC(false);
  const [moveCofre, setMoveCofre] = useSC(null);
  const [detailIdx, setDetailIdx] = useSC(null);

  const banks = state.banks;
  const cofres = state.cofres;
  const totalSaved  = cofres.reduce((sum, c) => sum + c.balance, 0);
  const totalTarget = cofres.filter(c => c.target).reduce((sum, c) => sum + c.target, 0);
  const colorMap = { green:p.green, blue:p.blue, amber:p.amber, purple:p.purple, expense:p.expense };
  const softMap  = { green:p.greenSoft, blue:p.blueSoft, amber:p.amberSoft, purple:p.purpleSoft, expense:p.expenseSoft };

  const byBank = {};
  cofres.forEach(c => {
    const bk = banks.find(b => b.id === c.bankId);
    const key = bk ? bk.name : (c.bank || 'Sem banco');
    byBank[key] = byBank[key] || { bank:key, total:0, count:0 };
    byBank[key].total += c.balance;
    byBank[key].count += 1;
  });
  const banksTotals = Object.values(byBank).sort((a,b) => b.total - a.total);
  const A = window.MM_STORE.actions;

  return (
    <div>
      <window.PageTitle
        kicker="Cofres"
        title={`${fmtEurFull(totalSaved)} guardados`}
        sub={`Em ${cofres.length} cofres · objetivo total ${fmtEur(totalTarget)}`}
        action={<>
          <button onClick={() => setShowManage(true)} style={s.btnGhost()}>Gerir bancos</button>
          <button onClick={() => setShowNew(true)} style={s.btnPrimary()}>+ Novo cofre</button>
        </>}
      />
      {banksTotals.length > 0 && (
        <div style={{ display:'grid', gridTemplateColumns:`repeat(${Math.min(banksTotals.length,4)},1fr)`, gap:14, marginBottom:22 }}>
          {banksTotals.map(b => (
            <div key={b.bank} style={s.card()}>
              <div style={s.kicker()}>Em {b.bank}</div>
              <div style={s.number(28)}>{fmtEurFull(b.total)}</div>
              <div style={{ fontSize:13, color:p.textDim, marginTop:6, fontWeight:500 }}>
                {b.count} {b.count===1?'cofre':'cofres'}
              </div>
            </div>
          ))}
        </div>
      )}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:14 }}>
        {cofres.length===0 && (
          <div style={{ ...s.card(), gridColumn:'1 / -1' }}>
            <window.EmptyState title="Sem cofres"
              body="Cofres são contas-objetivo: férias, casa, fundo de emergência. Define um valor-alvo e vai depositando."
              action={<button onClick={() => setShowNew(true)} style={s.btnPrimary()}>+ Criar primeiro cofre</button>} />
          </div>
        )}
        {cofres.map((c, i) => {
          const pct = c.target ? Math.min(100, (c.balance/c.target)*100) : null;
          const reached = c.target && c.balance >= c.target;
          const col  = colorMap[c.color] || p.green;
          const soft = softMap[c.color]  || p.greenSoft;
          return (
            <div key={i} style={{ ...s.card(), cursor:'pointer' }}
              onClick={() => setDetailIdx(i)}
              onMouseEnter={e => e.currentTarget.style.boxShadow=p.shadowHover}
              onMouseLeave={e => e.currentTarget.style.boxShadow=p.shadow}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:16 }}>
                <div>
                  <div style={{ width:8, height:8, borderRadius:2, background:col, marginBottom:8 }} />
                  <div style={s.heading(20)}>{c.name}</div>
                  <div style={{ display:'flex', alignItems:'center', gap:6, flexWrap:'wrap', marginTop:6 }}>
                    <div style={{ fontSize:11, fontWeight:700, color:p.textDim, padding:'3px 8px', borderRadius:6,
                      background:p.surface2, border:`1px solid ${p.border}`, letterSpacing:'0.02em' }}>
                      {banks.find(b => b.id === c.bankId)?.name || c.bank || 'Sem banco'}
                    </div>
                    {reached && (
                      <div style={{ display:'inline-flex', alignItems:'center', gap:4, fontSize:11, fontWeight:700,
                        color:p.green, padding:'3px 9px', borderRadius:100, background:p.greenSoft }}>
                        <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
                          <path d="M2 5.5L4.5 8L9 3" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                        </svg>
                        Objetivo atingido
                      </div>
                    )}
                  </div>
                  {c.target && <div style={{ fontSize:12, color:p.textMute, marginTop:8, fontWeight:600 }}>Objetivo {fmtEur(c.target)}</div>}
                </div>
                <button onClick={e => { e.stopPropagation(); setDetailIdx(i); }} style={{
                  background:'transparent', border:'none', color:p.textMute, fontSize:16, fontWeight:700, cursor:'pointer', padding:6 }}>⋯</button>
              </div>
              <div style={{ display:'flex', alignItems:'baseline', gap:8 }}>
                <div style={s.number(36, col)}>{fmtEur(c.balance)}</div>
                {c.target && <div style={{ fontSize:13, color:p.textMute, fontWeight:600 }}>de {fmtEur(c.target)} · {Math.round(pct)}%</div>}
              </div>
              {c.target
                ? <div style={{ marginTop:16, height:10, background:p.surface3, borderRadius:100, overflow:'hidden' }}>
                    <div style={{ width:`${pct}%`, height:'100%', background:col, borderRadius:100 }} />
                  </div>
                : <div style={{ fontSize:12, color:p.textDim, marginTop:16, fontWeight:500 }}>Sem objetivo definido</div>
              }
              <div style={{ marginTop:18, paddingTop:14, borderTop:`1px solid ${p.border}`, display:'flex', gap:8 }}>
