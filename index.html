function JosiView({entries,cfg,mk,user,onSave,onCfgChange,showToast,addActivity}){
  const [modal,setModal]=useState(false);
  const [editRate,setEditRate]=useState(false);
  const [rateVal,setRateVal]=useState(String(cfg.rate));
  const hours=entries.reduce((s,e)=>s+(parseFloat(e.hours)||0),0);
  const total=hours*cfg.rate;

  const saveRate=async()=>{
    const r=parseFloat(rateVal);
    if(r>0){await onCfgChange({...cfg,rate:r});setEditRate(false);showToast('Valor/hora atualizado ✓');}
  };
  const saveEntry=async data=>{
    const next=[...entries,{id:Date.now(),by:user,at:new Date().toISOString(),...data}].sort((a,b)=>a.date.localeCompare(b.date));
    await onSave(next); setModal(false); showToast('Guardado ✓');
    addActivity&&addActivity('✦','#f59e0b',`Josi — ${parseFloat(data.hours).toFixed(1)}h`,fmt(parseFloat(data.hours)*cfg.rate));
  };
  const del=async id=>{
    const e=entries.find(x=>x.id===id);
    const next=entries.filter(x=>x.id!==id);
    await onSave(next); showToast('Removido');
    addActivity&&addActivity('🗑','#6b7280',`Removido: Josi ${parseFloat(e?.hours||0).toFixed(1)}h`,null);
  };

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
        <SecTitle>Josi</SecTitle>
        <Btn onClick={()=>setModal(true)} style={{padding:'8px 16px',fontSize:'13px'}}>+ Dia</Btn>
      </div>
      <Card style={{marginBottom:'12px',background:'linear-gradient(135deg,rgba(245,158,11,0.07),rgba(16,185,129,0.04))'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'14px'}}>
          <div>
            <div style={{color:'#6b7280',fontSize:'11px',textTransform:'uppercase',marginBottom:'4px'}}>Horas este mês</div>
            <div style={{fontSize:'36px',fontWeight:'700',color:'#f59e0b',fontFamily:"'Fraunces',serif"}}>{hours.toFixed(1)}<span style={{fontSize:'18px'}}>h</span></div>
          </div>
          <div>
            <div style={{color:'#6b7280',fontSize:'11px',textTransform:'uppercase',marginBottom:'4px'}}>A transferir</div>
            <div style={{fontSize:'26px',fontWeight:'700',color:'#10b981',fontFamily:"'Fraunces',serif"}}>{fmt(total)}</div>
          </div>
        </div>
        <div style={{borderTop:'1px solid rgba(255,255,255,0.05)',paddingTop:'12px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:'13px',color:'#6b7280'}}>Valor/hora: <span style={{color:'#f59e0b',fontWeight:'600'}}>{fmt(cfg.rate)}/h</span></div>
          {!editRate?(
            <Btn onClick={()=>setEditRate(true)} variant="ghost" style={{fontSize:'12px'}}>Editar</Btn>
          ):(
            <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
              <input value={rateVal} onChange={e=>setRateVal(e.target.value)} type="number" style={{width:'72px',padding:'6px 8px',background:'#1f2937',border:'1px solid #374151',borderRadius:'8px',color:'#e5e7eb',fontSize:'13px',outline:'none'}}/>
              <Btn onClick={saveRate} style={{padding:'6px 12px',fontSize:'12px'}}>OK</Btn>
              <Btn onClick={()=>setEditRate(false)} variant="ghost" style={{fontSize:'12px'}}>✕</Btn>
            </div>
          )}
        </div>
      </Card>
      {entries.length===0?(
        <Card style={{textAlign:'center',padding:'40px 16px',color:'#374151'}}>
          <div style={{fontSize:'40px',marginBottom:'10px'}}>✦</div>
          <div style={{fontSize:'14px'}}>Nenhum dia registado este mês.</div>
        </Card>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
          {entries.map(e=>(
            <Card key={e.id} style={{padding:'12px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontSize:'15px',color:'#e5e7eb',fontWeight:'500'}}>{fmtD(e.date)}</div>
                <div style={{fontSize:'11px',color:'#374151',marginTop:'2px'}}>por {e.by}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:'20px',fontWeight:'700',color:'#f59e0b'}}>{parseFloat(e.hours).toFixed(1)}h</div>
                  <div style={{fontSize:'12px',color:'#6b7280'}}>{fmt(parseFloat(e.hours)*cfg.rate)}</div>
                </div>
                <button onClick={()=>del(e.id)} style={{background:'rgba(239,68,68,0.1)',border:'none',borderRadius:'8px',padding:'8px 10px',color:'#f87171',fontSize:'14px',cursor:'pointer',minHeight:'36px'}}>✕</button>
              </div>
            </Card>
          ))}
          <div style={{display:'flex',justifyContent:'space-between',padding:'14px 4px',borderTop:'1px dashed #374151'}}>
            <div style={{color:'#9ca3af',fontSize:'14px',fontWeight:'500'}}>Total do mês</div>
            <div style={{fontWeight:'700',color:'#10b981',fontSize:'18px'}}>{fmt(total)}</div>
          </div>
        </div>
      )}
      {modal&&(
        <Modal title="Registar Horas" onClose={()=>setModal(false)}>
          <JosiForm onSave={saveEntry} onClose={()=>setModal(false)}/>
        </Modal>
      )}
    </div>
  );
}

function JosiForm({onSave,onClose}){
  const [date,setDate]=useState(new Date().toISOString().split('T')[0]);
  const [hours,setHours]=useState('');
  const [saving,setSaving]=useState(false);
  const save=async()=>{if(!hours||!date)return;setSaving(true);await onSave({date,hours});setSaving(false);};
  return(
    <div>
      <Field label="Data" type="date" value={date} onChange={setDate}/>
      <Field label="Horas trabalhadas" type="number" value={hours} onChange={setHours} placeholder="ex: 3.5"/>
      <Btn onClick={save} disabled={!hours||!date||saving} style={{width:'100%',padding:'14px',marginTop:'8px'}}>{saving?'A guardar…':'Guardar'}</Btn>
    </div>
  );
}

// ─── COFRES ───────────────────────────────────────────────────────────────────

function Cofres({vaults,snapshots,user,onSaveSnapshots,onSaveVaults,showToast,addActivity}){
  const [modal,setModal]=useState(null); // null | 'new-snapshot' | 'manage-vaults'
  const [openSnap,setOpenSnap]=useState(snapshots[0]?.id??null);
  const [editSnap,setEditSnap]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null);

  const saveSnap=async(vals,existingId)=>{
    let next;
    if(existingId){
      next=snapshots.map(s=>s.id===existingId?{...s,vals,editedBy:user,editedAt:new Date().toISOString()}:s);
      addActivity&&addActivity('✏️','#6b7280','Snapshot editado',null);
    } else {
      next=[{id:Date.now(),date:new Date().toISOString(),by:user,vals},...snapshots];
      addActivity&&addActivity('◈','#60a5fa','Cofres atualizados',null);
    }
    await onSaveSnapshots(next); setModal(null); setEditSnap(null); showToast(existingId?'Snapshot atualizado ✓':'Snapshot guardado ✓');
  };

  const delSnap=async id=>{
    const next=snapshots.filter(s=>s.id!==id);
    await onSaveSnapshots(next); setConfirmDel(null); showToast('Snapshot eliminado');
    addActivity&&addActivity('🗑','#6b7280','Snapshot eliminado',null);
  };

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
        <SecTitle>Cofres</SecTitle>
        <div style={{display:'flex',gap:'8px'}}>
          <Btn onClick={()=>setModal('manage-vaults')} variant="secondary" style={{padding:'8px 12px',fontSize:'13px'}}>⚙️</Btn>
          <Btn onClick={()=>setModal('new-snapshot')} style={{padding:'8px 16px',fontSize:'13px'}}>+ Novo</Btn>
        </div>
      </div>

      {snapshots.length===0?(
        <Card style={{textAlign:'center',padding:'40px 16px',color:'#374151'}}>
          <div style={{fontSize:'40px',marginBottom:'10px'}}>◈</div>
          <div style={{fontSize:'14px'}}>Ainda sem snapshots.</div>
        </Card>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
          {snapshots.map((snap,idx)=>{
            const total=vaults.reduce((sum,v)=>{
              const totalField=v.fields.find(f=>f.label==='Total');
              return sum+(totalField?parseFloat(snap.vals[v.id+'_'+totalField.id])||0:0);
            },0);
            const isOpen=openSnap===snap.id;
            return(
              <Card key={snap.id} style={{padding:'14px'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}} onClick={()=>setOpenSnap(isOpen?null:snap.id)}>
                  <div>
                    <div style={{fontSize:'13px',color:'#6b7280'}}>{fmtD(snap.date)} · {snap.by}</div>
                    {idx===0&&<div style={{fontSize:'11px',color:'#10b981',marginTop:'2px',fontWeight:'600'}}>● Mais recente</div>}
                    {snap.editedBy&&<div style={{fontSize:'10px',color:'#374151',marginTop:'1px'}}>editado por {snap.editedBy}</div>}
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                    <div style={{fontSize:'18px',fontWeight:'700',color:'#60a5fa'}}>{fmt(total)}</div>
                    <span style={{color:'#374151',fontSize:'12px'}}>{isOpen?'▲':'▼'}</span>
                  </div>
                </div>
                {isOpen&&(
                  <div style={{marginTop:'14px',borderTop:'1px solid #1f2937',paddingTop:'14px'}}>
                    {vaults.map(v=>{
                      const vTotal=parseFloat(snap.vals[v.id+'_'+(v.fields.find(f=>f.label==='Total')?.id)])||0;
                      return(
                        <div key={v.id} style={{marginBottom:'14px'}}>
                          <div style={{fontSize:'11px',color:'#4b5563',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'8px'}}>{v.name}</div>
                          {v.fields.map(f=>{
                            let val;
                            if(f.type==='calculated'){
                              const manualSum=v.fields.filter(x=>x.type==='manual'&&x.label!=='Total').reduce((s,x)=>s+(parseFloat(snap.vals[v.id+'_'+x.id])||0),0);
                              val=vTotal-manualSum;
                            } else {
                              val=parseFloat(snap.vals[v.id+'_'+f.id])||0;
                            }
                            return(
                              <div key={f.id} style={{display:'flex',justifyContent:'space-between',padding:'5px 0'}}>
                                <div style={{fontSize:'13px',color: f.type==='calculated'?'#10b981':'#6b7280'}}>{f.label}{f.type==='calculated'?' (calc.)':''}</div>
                                <div style={{fontSize:'13px',color:'#e5e7eb',fontWeight:'500'}}>{fmt(val)}</div>
                              </div>
                            );
                          })}
                          <div style={{display:'flex',justifyContent:'space-between',borderTop:'1px solid #1a2332',paddingTop:'5px',marginTop:'4px'}}>
                            <div style={{fontSize:'12px',color:'#374151'}}>Total {v.name}</div>
                            <div style={{fontSize:'13px',color:'#60a5fa',fontWeight:'600'}}>{fmt(vTotal)}</div>
                          </div>
                        </div>
                      );
                    })}
                    <div style={{display:'flex',justifyContent:'space-between',borderTop:'2px solid #1f2937',paddingTop:'10px',marginBottom:'12px'}}>
                      <div style={{fontSize:'14px',color:'#9ca3af',fontWeight:'600'}}>Total Global</div>
                      <div style={{fontSize:'20px',color:'#60a5fa',fontWeight:'700'}}>{fmt(total)}</div>
                    </div>
                    <div style={{display:'flex',gap:'8px'}}>
                      <Btn onClick={()=>{setEditSnap(snap);setModal('new-snapshot');}} variant="secondary" style={{flex:1,padding:'10px',fontSize:'13px'}}>✏️ Editar</Btn>
                      <Btn onClick={()=>setConfirmDel(snap.id)} variant="danger" style={{padding:'10px 14px',fontSize:'13px'}}>🗑</Btn>
                    </div>
                  </div>
                )}
              </Card>
            );
          })}
        </div>
      )}

      {(modal==='new-snapshot')&&(
        <VaultSnapshotModal vaults={vaults} existing={editSnap} onSave={saveSnap} onClose={()=>{setModal(null);setEditSnap(null);}}/>
      )}
      {modal==='manage-vaults'&&(
        <ManageVaultsModal vaults={vaults} onSave={async v=>{await onSaveVaults(v);showToast('Cofres atualizados ✓');}} onClose={()=>setModal(null)}/>
      )}
      {confirmDel&&(
        <ConfirmModal title="Eliminar Snapshot" message="Tens a certeza que queres eliminar este snapshot?"
          confirmLabel="Eliminar" variant="danger" onConfirm={()=>delSnap(confirmDel)} onCancel={()=>setConfirmDel(null)}/>
      )}
    </div>
  );
}

function VaultSnapshotModal({vaults,existing,onSave,onClose}){
  const [vals,setVals]=useState(()=>{
    const init={};
    vaults.forEach(v=>v.fields.filter(f=>f.type==='manual').forEach(f=>{
      const k=v.id+'_'+f.id;
      init[k]=existing?.vals[k]!==undefined?String(existing.vals[k]):'';
    }));
    return init;
  });
  const [saving,setSaving]=useState(false);

  const getCalc=(v,currentVals)=>{
    const totalField=v.fields.find(f=>f.label==='Total');
    const total=parseFloat(currentVals[v.id+'_'+(totalField?.id)])||0;
    const manualSum=v.fields.filter(f=>f.type==='manual'&&f.label!=='Total').reduce((s,f)=>s+(parseFloat(currentVals[v.id+'_'+f.id])||0),0);
    return total-manualSum;
  };

  const save=async()=>{setSaving(true);await onSave(vals,existing?.id);setSaving(false);};

  return(
    <Modal title={existing?'Editar Snapshot':'Novo Snapshot'} onClose={onClose}>
      {vaults.map(v=>(
        <div key={v.id} style={{marginBottom:'20px'}}>
          <div style={{fontSize:'12px',color:'#4b5563',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'10px',borderBottom:'1px solid #1f2937',paddingBottom:'6px'}}>{v.name}</div>
          {v.fields.filter(f=>f.type==='manual').map(f=>(
            <Field key={f.id} label={f.label} type="number" value={vals[v.id+'_'+f.id]||''} onChange={val=>setVals({...vals,[v.id+'_'+f.id]:val})} placeholder="0"/>
          ))}
          {v.fields.filter(f=>f.type==='calculated').map(f=>{
            const calc=getCalc(v,vals);
            return(
              <div key={f.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',background:'rgba(16,185,129,0.06)',border:'1px solid rgba(16,185,129,0.15)',borderRadius:'12px',marginBottom:'14px'}}>
                <div>
                  <div style={{fontSize:'11px',color:'#4b5563',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'2px'}}>{f.label}</div>
                  <div style={{fontSize:'11px',color:'#374151'}}>calculado automaticamente</div>
                </div>
                <div style={{fontSize:'18px',fontWeight:'700',color:'#10b981'}}>{fmt(calc)}</div>
              </div>
            );
          })}
        </div>
      ))}
      <Btn onClick={save} disabled={saving} style={{width:'100%',padding:'14px'}}>{saving?'A guardar…':'Guardar Snapshot'}</Btn>
    </Modal>
  );
}

function ManageVaultsModal({vaults,onSave,onClose}){
  const [local,setLocal]=useState(vaults);
  const [editV,setEditV]=useState(null);

  const saveVault=async v=>{
    let next;
    if(v.id&&local.find(x=>x.id===v.id)){next=local.map(x=>x.id===v.id?v:x);}
    else{next=[...local,{...v,id:'v'+Date.now()}];}
    setLocal(next); await onSave(next); setEditV(null);
  };
  const delVault=async id=>{
    const next=local.filter(v=>v.id!==id);
    setLocal(next); await onSave(next); setEditV(null);
  };

  return(
    <Modal title="Gerir Cofres" onClose={onClose}>
      {editV?(
        <VaultForm vault={editV==='new'?null:editV} onSave={saveVault} onDelete={editV!=='new'?()=>delVault(editV.id):null} onBack={()=>setEditV(null)}/>
      ):(
        <>
          {local.map(v=>(
            <div key={v.id} onClick={()=>setEditV(v)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px',background:'#1f2937',borderRadius:'12px',marginBottom:'8px',cursor:'pointer',minHeight:'52px'}}>
              <div>
                <div style={{fontSize:'14px',color:'#e5e7eb'}}>{v.name}</div>
                <div style={{fontSize:'11px',color:'#4b5563'}}>{v.fields.length} campos</div>
              </div>
              <span style={{color:'#374151',fontSize:'14px'}}>›</span>
            </div>
          ))}
          <Btn onClick={()=>setEditV('new')} variant="secondary" style={{width:'100%',marginTop:'8px'}}>+ Novo Cofre</Btn>
        </>
      )}
    </Modal>
  );
}

function VaultForm({vault,onSave,onDelete,onBack}){
  const [name,setName]=useState(vault?.name||'');
  const [fields,setFields]=useState(vault?.fields||[{id:'f1',label:'Total',type:'manual'}]);
  const [newField,setNewField]=useState('');
  const [newFieldType,setNewFieldType]=useState('manual');
  const [confirm,setConfirm]=useState(false);

  const addField=()=>{
    if(!newField.trim())return;
    setFields([...fields,{id:'f'+Date.now(),label:newField.trim(),type:newFieldType}]);
    setNewField('');
  };
  const delField=id=>setFields(fields.filter(f=>f.id!==id));

  if(confirm)return(
    <ConfirmModal title="Eliminar Cofre" message={`Eliminar "${vault?.name}"?`}
      confirmLabel="Eliminar" variant="danger" onConfirm={()=>onDelete()} onCancel={()=>setConfirm(false)}/>
  );

  return(
    <div>
      <button onClick={onBack} style={{background:'none',border:'none',color:'#6b7280',fontSize:'13px',cursor:'pointer',marginBottom:'16px',display:'flex',alignItems:'center',gap:'4px',padding:'0'}}>← Voltar</button>
      <Field label="Nome do Cofre" value={name} onChange={setName} placeholder="ex: Trade Republic"/>
      <div style={{marginBottom:'14px'}}>
        <label style={{display:'block',color:'#6b7280',fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'8px'}}>Campos</label>
        {fields.map(f=>(
          <div key={f.id} style={{display:'flex',alignItems:'center',gap:'8px',padding:'8px 12px',background:'#1f2937',borderRadius:'10px',marginBottom:'6px'}}>
            <div style={{flex:1}}>
              <div style={{fontSize:'13px',color:'#e5e7eb'}}>{f.label}</div>
              <div style={{fontSize:'10px',color:f.type==='calculated'?'#10b981':'#6b7280'}}>{f.type==='calculated'?'Calculado':'Manual'}</div>
            </div>
            {f.label!=='Total'&&<button onClick={()=>delField(f.id)} style={{background:'none',border:'none',color:'#f87171',cursor:'pointer',fontSize:'16px',padding:'4px 6px'}}>✕</button>}
          </div>
        ))}
        <div style={{display:'flex',gap:'6px',marginTop:'8px'}}>
          <input value={newField} onChange={e=>setNewField(e.target.value)} placeholder="Novo campo…" onKeyDown={e=>e.key==='Enter'&&addField()}
            style={{flex:1,padding:'9px 12px',background:'#1f2937',border:'1px solid #374151',borderRadius:'10px',color:'#e5e7eb',fontSize:'13px',outline:'none'}}/>
          <select value={newFieldType} onChange={e=>setNewFieldType(e.target.value)} style={{padding:'9px 8px',background:'#1f2937',border:'1px solid #374151',borderRadius:'10px',color:'#e5e7eb',fontSize:'12px',outline:'none'}}>
            <option value="manual">Manual</option>
            <option value="calculated">Calculado</option>
          </select>
          <Btn onClick={addField} disabled={!newField.trim()} style={{padding:'9px 14px'}}>+</Btn>
        </div>
      </div>
      <Divider/>
      <div style={{display:'flex',gap:'8px'}}>
        {onDelete&&<Btn onClick={()=>setConfirm(true)} variant="danger" style={{padding:'12px 16px'}}>🗑</Btn>}
        <Btn onClick={()=>onSave({...(vault||{}),name,fields})} disabled={!name} style={{flex:1,padding:'14px'}}>{vault?'Guardar':'Adicionar'}</Btn>
      </div>
    </div>
  );
}

// ─── SETTINGS ─────────────────────────────────────────────────────────────────

function Settings({tasks,onSaveTasks,emailCfg,onSaveEmail,onSendTest,varCategories,onSaveVarCategories,user,onClose,showToast}){
  const [editTask,setEditTask]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null);

  const saveTask=async(data,affect)=>{
    let next;
    const now=new Date().toISOString();
    if(data.id&&tasks.find(t=>t.id===data.id)){
      next=tasks.map(t=>t.id===data.id?{...data,editedBy:user,editedAt:now,affect}:t);
    } else {
      next=[...tasks,{...data,id:'t'+Date.now(),createdBy:user,createdAt:now}];
    }
    await onSaveTasks(next); setEditTask(null); showToast('Tarefa guardada ✓');
  };

  const delTask=async(id,affect)=>{
    const next=tasks.filter(t=>t.id!==id).map(t=>({...t,deletedBy:user,deletedAt:new Date().toISOString()}));
    const filtered=tasks.filter(t=>t.id!==id);
    await onSaveTasks(filtered); setConfirmDel(null); setEditTask(null); showToast('Tarefa eliminada');
  };

  if(editTask){
    return(
      <Modal title={editTask==='new'?'Nova Tarefa':'Editar Tarefa'} onClose={()=>setEditTask(null)}>
        <TaskForm task={editTask==='new'?null:editTask} onSave={saveTask} onDelete={editTask!=='new'?setConfirmDel:null} onBack={()=>setEditTask(null)}/>
        {confirmDel&&(
          <ConfirmModal title="Eliminar Tarefa" message="Esta tarefa será eliminada. Confirmas?"
            confirmLabel="Eliminar" variant="danger"
            onConfirm={()=>delTask(confirmDel.id,confirmDel.affect)}
            onCancel={()=>setConfirmDel(null)}/>
        )}
      </Modal>
    );
  }

  const [tasksOpen,setTasksOpen]=useState(false);
  const [emailOpen,setEmailOpen]=useState(false);
  const [varOpen,setVarOpen]=useState(false);

  return(
    <Modal title="Configurações" onClose={onClose}>
      {/* Tarefas section */}
      <button onClick={()=>setTasksOpen(o=>!o)} style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 14px',background:'#1f2937',borderRadius:'12px',border:'none',cursor:'pointer',marginBottom:'8px',minHeight:'44px'}}>
        <span style={{color:'#e5e7eb',fontSize:'14px',fontWeight:'500'}}>📋 Gerir Tarefas</span>
        <span style={{color:'#4b5563',fontSize:'12px'}}>{tasksOpen?'▲':'▼'}</span>
      </button>
      {tasksOpen&&(
        <div style={{marginBottom:'8px'}}>
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:'8px'}}>
            <Btn onClick={()=>setEditTask('new')} style={{padding:'7px 14px',fontSize:'13px'}}>+ Nova</Btn>
          </div>
          {tasks.map(t=>(
            <div key={t.id} onClick={()=>setEditTask(t)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px',background:'#1f2937',borderRadius:'12px',marginBottom:'8px',cursor:'pointer',minHeight:'52px'}}>
              <div style={{flex:1,minWidth:0,paddingRight:'8px'}}>
                <div style={{fontSize:'13px',color:'#e5e7eb',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.label}</div>
                <div style={{fontSize:'10px',color:'#4b5563',marginTop:'2px'}}>{t.type}</div>
              </div>
              <span style={{color:'#374151',fontSize:'14px',flexShrink:0}}>›</span>
            </div>
          ))}
        </div>
      )}

      {/* Gastos Variáveis section */}
      <button onClick={()=>setVarOpen(o=>!o)} style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 14px',background:'#1f2937',borderRadius:'12px',border:'none',cursor:'pointer',marginBottom:'8px',minHeight:'44px'}}>
        <span style={{color:'#e5e7eb',fontSize:'14px',fontWeight:'500'}}>📊 Gastos Variáveis</span>
        <span style={{color:'#4b5563',fontSize:'12px'}}>{varOpen?'▲':'▼'}</span>
      </button>
      {varOpen&&(
        <div style={{marginBottom:'8px'}}>
          <VarCategoriesConfig categories={varCategories} onSave={onSaveVarCategories} showToast={showToast}/>
        </div>
      )}

      {/* Email section */}
      <button onClick={()=>setEmailOpen(o=>!o)} style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 14px',background:'#1f2937',borderRadius:'12px',border:'none',cursor:'pointer',marginBottom:'8px',minHeight:'44px'}}>
        <span style={{color:'#e5e7eb',fontSize:'14px',fontWeight:'500'}}>✉️ Emails</span>
        <span style={{color:'#4b5563',fontSize:'12px'}}>{emailOpen?'▲':'▼'}</span>
      </button>
      {emailOpen&&(
        <div style={{marginBottom:'8px'}}>
          <EmailConfig emailCfg={emailCfg} onSave={onSaveEmail} onSendTest={onSendTest} showToast={showToast}/>
        </div>
      )}
    </Modal>
  );
}

function EmailConfig({emailCfg,onSave,onSendTest,showToast}){
  const [cfg,setCfg]=useState(emailCfg);
  const [saving,setSaving]=useState(false);
  const [testing,setTesting]=useState(false);
  const save=async()=>{setSaving(true);await onSave(cfg);setSaving(false);showToast('Configurações de email guardadas ✓');};
  const sendTest=async()=>{
    if(!cfg.serviceId||!cfg.templateId||!cfg.publicKey){showToast('Preenche primeiro o Service ID, Template ID e Public Key ✗',false);return;}
    setTesting(true); await onSendTest(); setTesting(false);
  };
  return(
    <div>
      <div style={{color:'#4b5563',fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'12px'}}>Emails — Resumo Mensal</div>
      <Field label="Email Nocas" type="email" value={cfg.nocas} onChange={v=>setCfg({...cfg,nocas:v})} placeholder="nocas@email.com"/>
      <Field label="Email João" type="email" value={cfg.joao} onChange={v=>setCfg({...cfg,joao:v})} placeholder="joao@email.com"/>
      <div style={{padding:'12px',background:'rgba(96,165,250,0.06)',border:'1px solid rgba(96,165,250,0.15)',borderRadius:'12px',marginBottom:'14px'}}>
        <div style={{fontSize:'11px',color:'#60a5fa',fontWeight:'600',marginBottom:'6px'}}>Configuração EmailJS</div>
        <div style={{fontSize:'11px',color:'#4b5563',marginBottom:'10px'}}>Precisas de criar uma conta gratuita em emailjs.com e preencher estes campos.</div>
        <Field label="Service ID" value={cfg.serviceId} onChange={v=>setCfg({...cfg,serviceId:v})} placeholder="service_xxxxxxx"/>
        <Field label="Template ID" value={cfg.templateId} onChange={v=>setCfg({...cfg,templateId:v})} placeholder="template_xxxxxxx"/>
        <Field label="Public Key" value={cfg.publicKey} onChange={v=>setCfg({...cfg,publicKey:v})} placeholder="xxxxxxxxxxxx"/>
      </div>
      <Btn onClick={save} disabled={saving} style={{width:'100%',marginBottom:'10px'}}>{saving?'A guardar…':'Guardar Configurações'}</Btn>
      <Btn onClick={sendTest} disabled={testing} variant="secondary" style={{width:'100%'}}>{testing?'A enviar…':'📧 Enviar email de teste'}</Btn>
    </div>
  );
}

function TaskForm({task,onSave,onDelete,onBack}){
  const [label,setLabel]=useState(task?.label||'');
  const [desc,setDesc]=useState(task?.desc||'');
  const [type,setType]=useState(task?.type||'Manual');
  const [affect,setAffect]=useState('future');

  const save=()=>{
    if(!label)return;
    onSave({...(task||{}),label,desc,type},affect);
  };

  return(
    <div>
      <Field label="Nome da Tarefa" value={label} onChange={setLabel} placeholder="ex: Pagar seguro"/>
      <Field label="Descrição" value={desc} onChange={setDesc} placeholder="ex: 290€ · Janeiro"/>
      <SelectField label="Tipo" value={type} onChange={setType} options={[{value:'Manual',label:'Manual'},{value:'Auto',label:'Automático'},{value:'Info',label:'Info / Lembrete'}]}/>
      {task&&(
        <SelectField label="Aplicar alteração a" value={affect} onChange={setAffect} options={[{value:'future',label:'Só meses futuros'},{value:'current',label:'Mês atual e futuros'}]}/>
      )}
      <Divider/>
      <div style={{display:'flex',gap:'8px'}}>
        {onDelete&&<Btn onClick={()=>onDelete({id:task.id,affect})} variant="danger" style={{padding:'12px 16px'}}>🗑</Btn>}
        <Btn onClick={save} disabled={!label} style={{flex:1,padding:'14px'}}>{task?'Guardar':'Adicionar'}</Btn>
      </div>
      {task?.editedBy&&<div style={{fontSize:'11px',color:'#374151',textAlign:'center',marginTop:'10px'}}>Editado por {task.editedBy} em {fmtDT(task.editedAt)}</div>}
    </div>
  );
}

// ─── HIST MODAL ───────────────────────────────────────────────────────────────

function HistModal({entry,onClose}){
  const done=DEFAULT_TASKS.filter(t=>entry.data[t.id]?.done);
  const notDone=DEFAULT_TASKS.filter(t=>!entry.data[t.id]?.done);
  return(
    <Modal title={entry.label} onClose={onClose}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'20px'}}>
        <div style={{background:'rgba(16,185,129,0.08)',border:'1px solid rgba(16,185,129,0.2)',borderRadius:'12px',padding:'14px',textAlign:'center'}}>
          <div style={{fontSize:'28px',fontWeight:'700',color:'#10b981',fontFamily:"'Fraunces',serif"}}>{done.length}</div>
          <div style={{fontSize:'12px',color:'#6b7280'}}>Concluídas</div>
        </div>
        <div style={{background:'rgba(245,158,11,0.08)',border:'1px solid rgba(245,158,11,0.2)',borderRadius:'12px',padding:'14px',textAlign:'center'}}>
          <div style={{fontSize:'28px',fontWeight:'700',color:'#f59e0b',fontFamily:"'Fraunces',serif"}}>{notDone.length}</div>
          <div style={{fontSize:'12px',color:'#6b7280'}}>Por fazer</div>
        </div>
      </div>
      {done.length>0&&(
        <div style={{marginBottom:'16px'}}>
          <Lbl>✓ Concluídas</Lbl>
          {done.map(t=>(
            <div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid #1a2332',minHeight:'36px'}}>
              <div style={{fontSize:'13px',color:'#9ca3af',flex:1,paddingRight:'8px'}}>{t.label}</div>
              <div style={{fontSize:'11px',color:'#059669',flexShrink:0}}>{entry.data[t.id].by} · {fmtD(entry.data[t.id].at)}</div>
            </div>
          ))}
        </div>
      )}
      {notDone.length>0&&(
        <div style={{marginBottom:'16px'}}>
          <Lbl>✗ Por fazer</Lbl>
          {notDone.map(t=>(
            <div key={t.id} style={{padding:'7px 0',borderBottom:'1px solid #1a2332'}}>
              <div style={{fontSize:'13px',color:'#374151',textDecoration:'line-through'}}>{t.label}</div>
            </div>
          ))}
        </div>
      )}
      <div style={{padding:'10px 12px',background:'#1f2937',borderRadius:'8px',fontSize:'11px',color:'#4b5563'}}>
        Arquivado em {fmtDT(entry.at)} por {entry.by}
      </div>
    </Modal>
  );
}

// ─── NEW MONTH MODAL ──────────────────────────────────────────────────────────


function JosiPayModal({amount, onConfirm, onClose}){
  const [val, setVal] = useState(String(parseFloat(amount).toFixed(2)));
  return(
    <Modal title="Confirmar Pagamento — Josi" onClose={onClose}>
      <div style={{marginBottom:'20px',padding:'16px',background:'rgba(245,158,11,0.08)',border:'1px solid rgba(245,158,11,0.2)',borderRadius:'12px'}}>
        <div style={{fontSize:'13px',color:'#9ca3af',marginBottom:'12px'}}>Confirma o valor a pagar à Josi? Podes editar se necessário.</div>
        <label style={{display:'block',color:'#6b7280',fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'6px'}}>Valor (€)</label>
        <input type="number" value={val} onChange={e=>setVal(e.target.value)}
          style={{width:'100%',padding:'12px 14px',background:'#1f2937',border:'1px solid #374151',borderRadius:'12px',color:'#e5e7eb',fontSize:'18px',fontWeight:'700',outline:'none',textAlign:'center'}}/>
      </div>
      <div style={{display:'flex',gap:'10px'}}>
        <Btn onClick={onClose} variant="secondary" style={{flex:1}}>Cancelar</Btn>
        <Btn onClick={()=>onConfirm(parseFloat(val)||0)} disabled={!val||parseFloat(val)<=0} style={{flex:1,padding:'14px'}}>✓ Confirmar Pagamento</Btn>
      </div>
    </Modal>
  );
}

function NewMonthModal({currentMk,hist,cl,josiPaid,josiAmt,onConfirm,onClose}){
  const now=new Date(); const mo=now.getMonth(); const yr=now.getFullYear();
  const nextMo=(mo+1)%12; const nextYr=mo===11?yr+1:yr;
  const nextMk=mkKey(nextYr,nextMo);
  const alreadyExists=hist.some(h=>h.key===nextMk);
  const currentLabel=`${MONTHS[mo]} ${yr}`;
  const nextLabel=`${MONTHS[nextMo]} ${nextYr}`;

  return(
    <Modal title="Iniciar Novo Mês" onClose={onClose}>
      <div style={{background:'rgba(245,158,11,0.08)',border:'1px solid rgba(245,158,11,0.2)',borderRadius:'12px',padding:'16px',marginBottom:'16px'}}>
        <div style={{fontSize:'14px',color:'#f59e0b',fontWeight:'600',marginBottom:'8px'}}>⚠️ Atenção</div>
        <div style={{fontSize:'13px',color:'#9ca3af',lineHeight:1.6}}>
          <strong style={{color:'#e5e7eb'}}>{currentLabel}</strong> está em aberto e será arquivado automaticamente.
          {alreadyExists&&<><br/><br/><span style={{color:'#f87171'}}>⚠️ Já existe um arquivo para <strong>{nextLabel}</strong>. Será criado um registo duplicado.</span></>}
        </div>
      </div>
      {!josiPaid&&josiAmt>0&&(
        <div style={{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:'12px',padding:'14px',marginBottom:'16px',fontSize:'13px',color:'#fca5a5',lineHeight:1.5}}>
          ⚠️ A Josi ainda não foi paga este mês — <strong>{fmt(josiAmt)}</strong> em aberto.
        </div>
      )}
      <div style={{fontSize:'13px',color:'#6b7280',marginBottom:'20px'}}>O novo mês será <strong style={{color:'#e5e7eb'}}>{nextLabel}</strong>. As tarefas e horas da Josi serão reiniciadas.</div>
      <div style={{display:'flex',gap:'10px'}}>
        <Btn onClick={onClose} variant="secondary" style={{flex:1}}>Cancelar</Btn>
        <Btn onClick={onConfirm} variant="warning" style={{flex:1}}>Confirmar</Btn>
      </div>
    </Modal>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────

function App(){
  const now=new Date(); const yr=now.getFullYear(); const mo=now.getMonth();
  const mk=mkKey(yr,mo);

  const [fbReady,setFbReady]=useState(!!window._fbReady);
  const [authed,setAuthed]=useState(()=>sessionStorage.getItem('mm_authed')==='1');
  const [ready,setReady]=useState(false);
  const [user,setUser]=useState(()=>sessionStorage.getItem('mm_user')||null);
  const [tab,setTab]=useState('home');
  const [cl,setCl]=useState({});
  const [snapshots,setSnapshots]=useState([]);
  const [inv,setInv]=useState([]);
  const [josi,setJosi]=useState([]);
  const [josiCfg,setJosiCfg]=useState({rate:9});
  const [hist,setHist]=useState([]);
  const [expenses,setExpenses]=useState(DEFAULT_EXPENSES);
  const [vaults,setVaults]=useState(DEFAULT_VAULTS);
  const [assets,setAssets]=useState(DEFAULT_ASSETS);
  const [platforms,setPlatforms]=useState(DEFAULT_PLATFORMS);
  const [tasks,setTasks]=useState(DEFAULT_TASKS);
  const [toast,setToast]=useState(null);
  const [histView,setHistView]=useState(null);
  const [showNewMonth,setShowNewMonth]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [josiPayModal,setJosiPayModal]=useState(false);
  const [emailCfg,setEmailCfg]=useState({nocas:'',joao:'',serviceId:'',templateId:'',publicKey:''});
  const [varCategories,setVarCategories]=useState(DEFAULT_VAR_CATEGORIES);
  const [varExpenses,setVarExpenses]=useState([]);
  const [activityLog,setActivityLog]=useState([]);

  useEffect(()=>{
    if(fbReady)return;
    const h=()=>setFbReady(true);
    window.addEventListener('fb-ready',h);
    return()=>window.removeEventListener('fb-ready',h);
  },[fbReady]);

  useEffect(()=>{
    if(!fbReady||!authed)return;
    Promise.all([
      ld(`cl-${mk}`),ld('snapshots'),ld('inv'),
      ld(`josi-${mk}`),ld('josi-cfg'),ld('cl-hist'),
      ld('expenses'),ld('vaults'),ld('assets'),ld('platforms'),ld('tasks'),ld('email-config'),ld('var-categories'),ld('var-expenses'),ld('activity-log'),
    ]).then(([c,sn,iv,j,jc,h,ex,vl,as,pl,tk,em,vc,ve,al])=>{
      setCl(c||{}); setSnapshots(sn||[]); setInv(iv||[]);
      setJosi(j||[]); if(jc)setJosiCfg(jc); setHist(h||[]);
      if(ex&&ex.length>0)setExpenses(ex); if(vl&&vl.length>0)setVaults(vl);
      if(as)setAssets(as); if(pl)setPlatforms(pl);
      if(tk)setTasks(tk); if(em)setEmailCfg(em);
      if(vc&&vc.length>0)setVarCategories(vc); if(ve)setVarExpenses(ve);
      if(al)setActivityLog(al);
      setReady(true);
    });
  },[fbReady,authed]);

  // Auto-inject periodic expense tasks for current month
  useEffect(()=>{
    if(!ready)return;
    const periodicThisMonth=expenses.filter(e=>e.active&&e.period==='annual'&&e.month===mo);
    periodicThisMonth.forEach(exp=>{
      const tid='expense_'+exp.id;
      if(!tasks.find(t=>t.id===tid)){
        const newTask={id:tid,label:`Pagar: ${exp.name}`,desc:`${fmt(exp.amount)} · gerado automaticamente`,type:'Manual',autoGenerated:true};
        setTasks(prev=>{
          const next=[...prev,newTask];
          sv('tasks',next);
          return next;
        });
      }
    });
  },[ready,expenses,mo]);

  if(!fbReady||(!ready&&authed)) return <Splash msg={!fbReady?'A ligar ao Firebase…':'A carregar…'}/>;
  if(!authed) return <PasswordScreen onSuccess={()=>setAuthed(true)}/>;
  if(!user) return <LoginScreen onSelect={u=>{setUser(u);sessionStorage.setItem('mm_user',u);}}/>;

  const showToast=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),2200);};

  const handleMenuAction=async action=>{
    if(action==='switch-user'){setUser(null);sessionStorage.removeItem('mm_user');}
    else if(action==='new-month'){setShowNewMonth(true);}
    else if(action==='settings'){setShowSettings(true);}
    else if(action==='logout'){setUser(null);setAuthed(false);sessionStorage.removeItem('mm_authed');sessionStorage.removeItem('mm_user');}
  };

  const addActivity=async(icon,color,label,sub=null)=>{
    const entry={id:Date.now(),at:new Date().toISOString(),by:user,icon,color,label,sub};
    setActivityLog(prev=>{
      const next=[entry,...prev].slice(0,200);
      sv('activity-log',next);
      return next;
    });
  };

  const sendMonthlyEmail=async(monthLabel,clData,josiData,invData,expData,snapData,varExp,varCats)=>{
    if(!emailCfg.serviceId||!emailCfg.templateId||!emailCfg.publicKey) return;
    const recipients=[emailCfg.nocas,emailCfg.joao].filter(Boolean);
    if(!recipients.length) return;
    const actionTasks=DEFAULT_TASKS.filter(t=>t.type!=='Info');
    const doneCount=actionTasks.filter(t=>clData[t.id]?.done).length;
    const notDone=actionTasks.filter(t=>!clData[t.id]?.done).map(t=>t.label).join(', ')||'Todas concluídas ✓';
    const josiH=josiData.reduce((s,e)=>s+(parseFloat(e.hours)||0),0);
    const josiPaid=!!clData['josi']?.done;
    const josiPaidAmount=clData['josi']?.paidAmount||0;
    const josiTotal=josiPaid?josiPaidAmount:josiH*josiCfg.rate;
    const monthInv=invData.filter(i=>i.mk===mk);
    const invTotal=monthInv.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
    const byPlat={};monthInv.forEach(i=>{if(!byPlat[i.platform])byPlat[i.platform]=0;byPlat[i.platform]+=parseFloat(i.amount)||0;});
    const invDetail=Object.entries(byPlat).map(([p,v])=>`${p}: ${fmt(v)}`).join(' | ')||'—';
    const moIdx=now.getMonth();
    const activeExp=expData.filter(e=>e.active);
    const fixedTotal=activeExp.filter(e=>e.period==='monthly').reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
    const periodic=activeExp.filter(e=>e.period==='annual'&&e.month===moIdx);
    const periodicTotal=periodic.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
    const periodicDetail=periodic.map(e=>`${e.name}: ${fmt(e.amount)}`).join(', ')||'Nenhum';
    const lastSnap=snapData[0];
    const snapTotal=lastSnap?Object.values(lastSnap.vals).reduce((s,v)=>s+(parseFloat(v)||0),0):0;

    // Gastos variáveis current month
    const curMoKey=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const prevMoDate=new Date(now.getFullYear(),now.getMonth()-1,1);
    const prevMoKey=`${prevMoDate.getFullYear()}-${String(prevMoDate.getMonth()+1).padStart(2,'0')}`;
    const varCurEntries=(varExp||[]).filter(e=>e.monthKey===curMoKey);
    const varPrevEntries=(varExp||[]).filter(e=>e.monthKey===prevMoKey);
    const varTotal=varCurEntries.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
    const varDetail=(varCats||[]).map(cat=>{
      const cur=varCurEntries.find(e=>e.categoryId===cat.id);
      const prev=varPrevEntries.find(e=>e.categoryId===cat.id);
      if(!cur) return null;
      const trend=!prev?'->':parseFloat(cur.amount)>parseFloat(prev.amount)?'(+)':parseFloat(cur.amount)<parseFloat(prev.amount)?'(-)':'->';
      return `${cat.icon} ${cat.name}: ${fmt(cur.amount)} ${trend}`;
    }).filter(Boolean).join(', ')||'Sem registos';

    const templateParams={
      month_label: monthLabel,
      tasks_done: `${doneCount}/${actionTasks.length}`,
      tasks_not_done: notDone,
      josi_hours: josiH.toFixed(1),
      josi_total: fmt(josiTotal),
      josi_paid: josiPaid?'✓ Pago':'⚠️ Por pagar',
      inv_total: fmt(invTotal),
      inv_detail: invDetail,
      expenses_fixed: fmt(fixedTotal),
      expenses_periodic: periodicDetail,
      expenses_total: fmt(fixedTotal+periodicTotal),
      cofres_total: lastSnap?fmt(snapTotal):'Sem snapshot',
      cofres_date: lastSnap?fmtD(lastSnap.date):'—',
      initiated_by: user,
      var_total: fmt(varTotal),
      var_detail: varDetail,
    };

    try {
      emailjs.init(emailCfg.publicKey);
      for(const to of recipients){
        await emailjs.send(emailCfg.serviceId, emailCfg.templateId, {...templateParams, to_email: to});
      }
      showToast('Email enviado ✓');
    } catch(e){
      console.error('Email error',e);
      showToast('Erro ao enviar email ✗', false);
    }
  };

  const doNewMonth=async()=>{
    const entry={key:mk,label:`${MONTHS[mo]} ${yr}`,data:cl,at:new Date().toISOString(),by:user};
    const h=[entry,...hist];
    setHist(h); await sv('cl-hist',h);
    setCl({}); await sv(`cl-${mk}`,{});
    setJosi([]); await sv(`josi-${mk}`,[]);
    setShowNewMonth(false); showToast('Novo mês iniciado ✓');
    sendMonthlyEmail(`${MONTHS[mo]} ${yr}`, cl, josi, inv, expenses, snapshots, varExpenses, varCategories);
  };

  const toggle=async id=>{
    if(id==='josi'&&!cl[id]?.done){setJosiPayModal(true);return;}
    const wasDone=!!cl[id]?.done;
    const next={...cl,[id]:wasDone?null:{done:true,by:user,at:new Date().toISOString()}};
    setCl(next); const ok=await sv(`cl-${mk}`,next);
    if(ok){
      const task=tasks.find(t=>t.id===id);
      if(wasDone) addActivity('✗','#f87171',`Desmarcado: ${task?.label||id}`,null);
      else addActivity('✓','#10b981',`Concluído: ${task?.label||id}`,null);
    }
    showToast(ok?'Guardado ✓':'Erro ao guardar ✗',ok);
  };

  const confirmJosiPay=async(amount)=>{
    const next={...cl,josi:{done:true,by:user,at:new Date().toISOString(),paidAmount:amount}};
    setCl(next); const ok=await sv(`cl-${mk}`,next);
    if(ok) addActivity('💶','#10b981','Josi paga',fmt(amount));
    setJosiPayModal(false);
    showToast(ok?`Pagamento de ${fmt(amount)} registado ✓`:'Erro ao guardar ✗',ok);
  };

  const jH=josi.reduce((s,e)=>s+(parseFloat(e.hours)||0),0);
  const actionTasks=tasks.filter(t=>t.type!=='Info');
  const done=actionTasks.filter(t=>cl[t.id]?.done).length;

  const views={
    home:<Home done={done} total={actionTasks.length} cl={cl} mk={mk} inv={inv} josi={josi} josiCfg={josiCfg} expenses={expenses} snapshots={snapshots} hist={hist} tasks={tasks} onNavigate={t=>setTab(t)} onHistView={setHistView}/>,
    tasks:<Tasks tasks={tasks} cl={cl} onToggle={toggle}/>,

    expenses:<Expenses expenses={expenses} user={user} addActivity={addActivity} onSave={async ex=>{setExpenses(ex);await sv('expenses',ex);showToast('Encargos guardados ✓');}}/>,

    josi:<JosiView entries={josi} cfg={josiCfg} mk={mk} user={user} showToast={showToast} addActivity={addActivity}
      onSave={async v=>{setJosi(v);await sv(`josi-${mk}`,v);}}
      onCfgChange={async v=>{setJosiCfg(v);await sv('josi-cfg',v);}}/>,
    cofres:<Cofres vaults={vaults} snapshots={snapshots} user={user} showToast={showToast} addActivity={addActivity}
      onSaveSnapshots={async v=>{setSnapshots(v);await sv('snapshots',v);}}
      onSaveVaults={async v=>{setVaults(v);await sv('vaults',v);}}/>,
    invest:<Invest inv={inv} mk={mk} assets={assets} platforms={platforms} user={user} addActivity={addActivity}
      onSaveInv={async v=>{setInv(v);await sv('inv',v);}}
      onSaveAssets={async v=>{setAssets(v);await sv('assets',v);}}
      onSavePlatforms={async v=>{setPlatforms(v);await sv('platforms',v);}}/>,
    varexpenses:<GastosVariaveis categories={varCategories} expenses={varExpenses} josi={josi} josiCfg={josiCfg} user={user} showToast={showToast} addActivity={addActivity}
      onSaveExpenses={async v=>{setVarExpenses(v);await sv('var-expenses',v);}}/>,
  };

  return(
    <div style={{background:'#0d1117',minHeight:'100vh',maxWidth:'480px',margin:'0 auto',paddingBottom:'80px'}}>
      <Header user={user} month={MONTHS[mo]} year={yr} onMenuAction={handleMenuAction}/>
      <main style={{padding:'16px 16px 24px'}}>{views[tab]}</main>
      <Nav tab={tab} setTab={setTab} done={done} total={actionTasks.length}/>
      {josiPayModal&&<JosiPayModal amount={jH*josiCfg.rate} onConfirm={confirmJosiPay} onClose={()=>setJosiPayModal(false)}/>}
      {histView&&<HistModal entry={histView} onClose={()=>setHistView(null)}/>}
      {showNewMonth&&<NewMonthModal currentMk={mk} hist={hist} cl={cl} josiPaid={!!cl['josi']?.done} josiAmt={jH*josiCfg.rate} onConfirm={doNewMonth} onClose={()=>setShowNewMonth(false)}/>}
      {showSettings&&<Settings tasks={tasks} user={user} showToast={showToast} onClose={()=>setShowSettings(false)}
        emailCfg={emailCfg} onSaveEmail={async v=>{setEmailCfg(v);await sv('email-config',v);}}
        onSendTest={()=>sendMonthlyEmail(`Teste — ${MONTHS[mo]} ${yr}`,cl,josi,inv,expenses,snapshots,varExpenses,varCategories)}
        varCategories={varCategories} onSaveVarCategories={async v=>{setVarCategories(v);await sv('var-categories',v);}}
        onSaveTasks={async v=>{setTasks(v);await sv('tasks',v);}}/>}
      {toast&&<Toast msg={toast.msg} ok={toast.ok}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
