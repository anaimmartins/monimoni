// ─── PASSWORD SCREEN ──────────────────────────────────────────────────────────

function PasswordScreen({onSuccess}){
  const [pw,setPw]=useState('');
  const [err,setErr]=useState(false);
  const [loading,setLoading]=useState(false);

  const check=async()=>{
    setLoading(true);
    const stored=await ld('app-password');
    const correct=stored||'monimoni';
    if(pw===correct){sessionStorage.setItem('mm_authed','1');onSuccess();}
    else{setErr(true);setPw('');setLoading(false);}
  };

  return(
    <div style={{background:'#0d1117',minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px'}}>
      <div style={{fontFamily:"'Fraunces',serif",fontSize:'44px',color:'#10b981',letterSpacing:'-0.5px',lineHeight:1}}>Monimoni</div>
      <div style={{color:'#374151',fontSize:'12px',letterSpacing:'3px',textTransform:'uppercase',margin:'8px 0 48px'}}>Gestão Familiar</div>
      <div style={{width:'100%',maxWidth:'300px'}}>
        <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr(false);}} onKeyDown={e=>e.key==='Enter'&&check()}
          placeholder="Password" autoFocus
          style={{width:'100%',padding:'14px 18px',background:'#111827',border:`1px solid ${err?'#ef4444':'#374151'}`,borderRadius:'14px',color:'#e5e7eb',fontSize:'16px',outline:'none',textAlign:'center',letterSpacing:'4px',marginBottom:'12px'}}/>
        {err&&<div style={{color:'#f87171',fontSize:'13px',textAlign:'center',marginBottom:'12px'}}>Password incorreta</div>}
        <Btn onClick={check} disabled={loading||!pw} style={{width:'100%',padding:'14px',fontSize:'16px'}}>{loading?'A verificar…':'Entrar'}</Btn>
      </div>
    </div>
  );
}

// ─── HEADER ───────────────────────────────────────────────────────────────────

function Header({user,month,year,onMenuAction}){
  const [open,setOpen]=useState(false);
  const ref=useRef();
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[]);
  const action=a=>{setOpen(false);onMenuAction(a);};
  return(
    <div style={{background:'#111827',borderBottom:'1px solid #1f2937',padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:30}}>
      <div>
        <div style={{fontFamily:"'Fraunces',serif",fontSize:'22px',color:'#10b981',lineHeight:1}}>Monimoni</div>
        <div style={{color:'#4b5563',fontSize:'11px',marginTop:'2px',letterSpacing:'0.5px'}}>{month} {year}</div>
      </div>
      <div ref={ref} style={{position:'relative'}}>
        <button onClick={()=>setOpen(o=>!o)} style={{background:'#1f2937',border:'1px solid #374151',borderRadius:'20px',padding:'8px 14px',color:'#9ca3af',fontSize:'12px',cursor:'pointer',display:'flex',alignItems:'center',gap:'6px',minHeight:'36px'}}>
          {user==='Nocas'?'👩':'👨'} {user} <span style={{fontSize:'10px',color:'#4b5563'}}>▾</span>
        </button>
        {open&&(
          <div style={{position:'absolute',right:0,top:'calc(100% + 8px)',background:'#1a2332',border:'1px solid #1f2937',borderRadius:'14px',minWidth:'180px',overflow:'hidden',boxShadow:'0 8px 24px rgba(0,0,0,0.5)',zIndex:40,animation:'fadeIn 0.15s ease'}}>
            {[
              {icon:'👤',label:'Mudar utilizador',action:'switch-user'},
              {icon:'🔄',label:'Iniciar novo mês',action:'new-month'},
              {icon:'⚙️',label:'Configurações',action:'settings'},
              {icon:'🚪',label:'Logout',action:'logout'},
            ].map(item=>(
              <button key={item.action} onClick={()=>action(item.action)} style={{width:'100%',padding:'13px 16px',background:'none',border:'none',color:'#e5e7eb',fontSize:'14px',textAlign:'left',display:'flex',alignItems:'center',gap:'10px',transition:'background 0.15s',minHeight:'44px'}}>
                <span>{item.icon}</span><span>{item.label}</span>
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function Nav({tab,setTab,done,total}){
  const [moreOpen,setMoreOpen]=useState(false);
  const moreRef=useRef();
  useEffect(()=>{
    const h=e=>{if(moreRef.current&&!moreRef.current.contains(e.target))setMoreOpen(false);};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[]);

  const mainItems=[
    {id:'home',    Icon:IconHome,    label:'Início'},
    {id:'tasks',   Icon:IconTasks,   label:'Tarefas', badge:`${done}/${total}`},
    {id:'expenses',Icon:IconExpenses,label:'Encargos'},
  ];
  const moreItems=[
    {id:'josi',        label:'Josi'},
    {id:'cofres',      label:'Cofres'},
    {id:'invest',      label:'Investimentos'},
    {id:'varexpenses', label:'Gastos Variáveis'},
  ];
  const moreActive=['josi','cofres','invest','varexpenses'].includes(tab);
  const goMore=id=>{setTab(id);setMoreOpen(false);};

  return(
    <nav style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:'480px',background:'#1a2332',borderTop:'1px solid #252f3f',display:'flex',zIndex:20,paddingBottom:'env(safe-area-inset-bottom)'}}>
      {mainItems.map(it=>{
        const active=tab===it.id;
        return(
          <button key={it.id} onClick={()=>setTab(it.id)} style={{flex:1,padding:'10px 4px 12px',background:'none',border:'none',display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',color:active?'#10b981':'#6b7280',cursor:'pointer',transition:'color 0.15s',minHeight:'56px'}}>
            <it.Icon size={22} color={active?'#10b981':'#6b7280'}/>
            <span style={{fontSize:'11px',fontWeight:active?'600':'400',color:active?'#10b981':'#9ca3af',letterSpacing:'0.2px'}}>{it.label}</span>
            {it.badge&&<span style={{fontSize:'9px',color:active?'#10b981':'#4b5563',marginTop:'-2px'}}>{it.badge}</span>}
          </button>
        );
      })}
      <div ref={moreRef} style={{flex:1,position:'relative',display:'flex',alignItems:'stretch'}}>
        <button onClick={()=>setMoreOpen(o=>!o)} style={{flex:1,padding:'10px 4px 12px',background:'none',border:'none',display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',color:moreActive||moreOpen?'#10b981':'#6b7280',cursor:'pointer',transition:'color 0.15s',minHeight:'56px'}}>
          <IconMore size={22} color={moreActive||moreOpen?'#10b981':'#6b7280'}/>
          <span style={{fontSize:'11px',fontWeight:moreActive||moreOpen?'600':'400',color:moreActive||moreOpen?'#10b981':'#9ca3af',letterSpacing:'0.2px'}}>Mais</span>
        </button>
        {moreOpen&&(
          <div style={{position:'absolute',bottom:'calc(100% + 8px)',right:0,background:'#1a2332',border:'1px solid #252f3f',borderRadius:'14px',overflow:'hidden',boxShadow:'0 -4px 24px rgba(0,0,0,0.6)',minWidth:'170px',animation:'fadeIn 0.15s ease'}}>
            {moreItems.map(it=>(
              <button key={it.id} onClick={()=>goMore(it.id)} style={{width:'100%',padding:'14px 18px',background:tab===it.id?'rgba(16,185,129,0.1)':'none',border:'none',borderBottom:'1px solid #252f3f',color:tab===it.id?'#10b981':'#e5e7eb',fontSize:'14px',fontWeight:tab===it.id?'600':'400',textAlign:'left',cursor:'pointer',display:'block',minHeight:'48px'}}>

              </button>
            ))}

        )}
      </div>
    </nav>
  );
}

function ActivityFeed({events}){
  const [expanded,setExpanded]=useState(false);
  const shown=expanded?events:events.slice(0,6);
  return(
    <Card>
      <div style={{color:'#4b5563',fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'12px'}}>Atividade Recente</div>
      {shown.map((e,i)=>(
        <div key={i} style={{display:'flex',alignItems:'flex-start',gap:'10px',padding:'7px 0',borderBottom:'1px solid #1a2332'}}>
          <div style={{width:'24px',height:'24px',borderRadius:'50%',background:`${e.color}18`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',flexShrink:0,marginTop:'1px'}}>{e.icon}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:'13px',color:'#e5e7eb',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.label}</div>

            <div style={{fontSize:'11px',color:'#4b5563'}}>{e.meta}</div>

        <button onClick={()=>setExpanded(x=>!x)} style={{width:'100%',marginTop:'10px',padding:'8px',background:'none',border:'none',color:'#4b5563',fontSize:'12px',cursor:'pointer',textAlign:'center'}}>
          {expanded?'Ver menos ▲':`Ver mais (${events.length-6}) ▼`}

function Home({done,total,cl,mk,inv,josi,josiCfg,expenses,snapshots,hist,tasks,onNavigate,onHistView}){
  const now=new Date(); const mo=now.getMonth();
  const pct=total>0?Math.round((done/total)*100):0;
  const monthInv=inv.filter(i=>i.mk===mk);
  const invTotal=monthInv.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const jH=josi.reduce((s,e)=>s+(parseFloat(e.hours)||0),0);
  const jAmt=jH*josiCfg.rate;

  // Expenses calc
  const activeExp=expenses.filter(e=>e.active);
  const monthlyFixed=activeExp.filter(e=>e.period==='monthly').reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const thisMonthPeriodic=activeExp.filter(e=>e.period==='annual'&&e.month===mo);
  const periodicTotal=thisMonthPeriodic.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const totalExpenses=monthlyFixed+periodicTotal;

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'14px',animation:'fadeUp 0.3s ease'}}>
      {/* Progress card - clickable to tasks */}
      <Card onClick={()=>onNavigate('tasks')} style={{cursor:'pointer'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'14px'}}>
          <div>
            <div style={{color:'#4b5563',fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'4px'}}>Progresso do Mês</div>
            <div style={{color:'#10b981',fontSize:'14px',fontWeight:'600',marginBottom:'6px'}}>{MONTHS[mo]} {now.getFullYear()}</div>
            <div style={{fontSize:'42px',fontWeight:'700',color:'#10b981',lineHeight:1,fontFamily:"'Fraunces',serif"}}>{pct}%</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:'30px',fontWeight:'700',color:'#f9fafb'}}>{done}<span style={{color:'#374151',fontSize:'18px'}}>/{total}</span></div>
            <div style={{color:'#4b5563',fontSize:'12px'}}>tarefas</div>
            <div style={{color:'#4b5563',fontSize:'11px',marginTop:'4px'}}>Ver tarefas →</div>
          </div>
        </div>
        <div style={{background:'#1f2937',borderRadius:'6px',height:'6px',overflow:'hidden'}}>
          <div style={{width:`${pct}%`,height:'100%',background:'linear-gradient(90deg,#059669,#34d399)',borderRadius:'6px',transition:'width 0.6s ease'}}/>
        </div>
      </Card>

      {/* Stats row */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
        {/* Encargos - clickable */}
        <Card onClick={()=>onNavigate('expenses')} style={{cursor:'pointer'}}>
          <div style={{color:'#4b5563',fontSize:'10px',textTransform:'uppercase',marginBottom:'8px'}}>Encargos {MONTH_SHORT[mo]}</div>
          <div style={{fontSize:'18px',fontWeight:'700',color:'#f87171'}}>{fmt(totalExpenses)}</div>
          {thisMonthPeriodic.length>0&&(
            <div style={{marginTop:'8px',borderTop:'1px solid #1f2937',paddingTop:'8px'}}>
              {thisMonthPeriodic.map(e=>(
                <div key={e.id} style={{fontSize:'11px',color:'#f59e0b',display:'flex',justifyContent:'space-between',marginTop:'3px'}}>
                  <span>⚠️ {e.name}</span><span>{fmt(e.amount)}</span>
                </div>
              ))}
            </div>
          )}
          <div style={{color:'#4b5563',fontSize:'10px',marginTop:'6px'}}>Ver encargos →</div>
        </Card>

        {/* Josi - clickable */}
        <Card onClick={()=>onNavigate('josi')} style={{cursor:'pointer'}}>
          <div style={{color:'#4b5563',fontSize:'10px',textTransform:'uppercase',marginBottom:'8px'}}>Josi este mês</div>
          <div style={{fontSize:'24px',fontWeight:'700',color:'#f59e0b',fontFamily:"'Fraunces',serif"}}>{jH.toFixed(1)}<span style={{fontSize:'14px'}}>h</span></div>
          <div style={{fontSize:'14px',color:'#10b981',fontWeight:'600',marginTop:'4px'}}>{fmt(jAmt)}</div>
          <div style={{color:'#4b5563',fontSize:'10px',marginTop:'6px'}}>Ver registo →</div>
        </Card>
      </div>

      {/* Invest - clickable */}
      <Card onClick={()=>onNavigate('invest')} style={{cursor:'pointer'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{color:'#4b5563',fontSize:'10px',textTransform:'uppercase',marginBottom:'4px'}}>Investimentos {MONTH_SHORT[mo]}</div>
            {monthInv.length>0
              ?<div style={{fontSize:'20px',fontWeight:'700',color:'#34d399'}}>{fmt(invTotal)}</div>
              :<div style={{color:'#374151',fontSize:'13px'}}>Sem registos este mês</div>
            }
          </div>
          <div style={{color:'#4b5563',fontSize:'11px'}}>Ver →</div>
        </div>
      </Card>

      {/* Atividade Recente */}
      {(()=>{
        const events=[];
        // Tasks - marked and unmarked
        Object.entries(cl||{}).forEach(([id,s])=>{
          if(!s||!s.done) return;
          const task=tasks.find(t=>t.id===id);
          if(!task) return;
          events.push({at:s.at,icon:'✓',color:'#10b981',label:task.label,meta:s.by,sub:s.paidAmount?fmt(s.paidAmount)+' pagos':null});
        });
        // Investments
        inv.forEach(i=>{
          if(i.editedAt) events.push({at:i.editedAt,icon:'✏️',color:'#6b7280',label:`Editado: ${i.asset}`,meta:i.editedBy,sub:fmt(parseFloat(i.amount)||0)});
          events.push({at:i.date,icon:'↗',color:'#34d399',label:i.asset,meta:i.by,sub:`${fmt(parseFloat(i.amount)||0)} · ${i.platform}`});
        });
        // Snapshots
        snapshots.forEach(s=>{
          if(s.editedAt) events.push({at:s.editedAt,icon:'✏️',color:'#6b7280',label:'Snapshot editado',meta:s.editedBy,sub:null});
          events.push({at:s.date,icon:'◈',color:'#60a5fa',label:'Cofres atualizados',meta:s.by,sub:null});
        });
        // Josi hours
        josi.forEach(e=>{
          events.push({at:e.at||e.date+'T00:00:00',icon:'✦',color:'#f59e0b',label:`Josi — ${parseFloat(e.hours).toFixed(1)}h`,meta:e.by,sub:fmt(parseFloat(e.hours)*josiCfg.rate)});
        });
        // Expenses
        expenses.filter(e=>e.createdAt).forEach(e=>{
          events.push({at:e.createdAt,icon:'€',color:'#f87171',label:`Novo encargo: ${e.name}`,meta:e.createdBy,sub:fmt(e.amount)});
        });
        expenses.filter(e=>e.editedAt).forEach(e=>{
          events.push({at:e.editedAt,icon:'✏️',color:'#6b7280',label:`Encargo editado: ${e.name}`,meta:e.editedBy,sub:fmt(e.amount)});
        });

        events.sort((a,b)=>new Date(b.at)-new Date(a.at));
        if(!events.length) return null;
        return <ActivityFeed events={events}/>;
      })()}

      {/* History */}
      {hist.length>0&&(
        <Card>
          <div style={{color:'#4b5563',fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'12px'}}>Histórico</div>
          {hist.slice(0,4).map(h=>{
            const hDone=DEFAULT_TASKS.filter(t=>h.data[t.id]?.done).length;
            return(
              <div key={h.key} onClick={()=>onHistView(h)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #1a2332',cursor:'pointer',minHeight:'44px'}}>
                <div style={{fontSize:'14px',color:'#e5e7eb'}}>{h.label}</div>
                <div style={{fontSize:'12px',color:hDone===DEFAULT_TASKS.length?'#10b981':'#f59e0b',fontWeight:'600'}}>{hDone}/{DEFAULT_TASKS.length} ✓</div>
              </div>
            );
          })}
        </Card>
      )}
    </div>
  );
}

// ─── TASKS ────────────────────────────────────────────────────────────────────

function Tasks({tasks,cl,onToggle}){
  const [filter,setFilter]=useState('all');
  const [infoOpen,setInfoOpen]=useState(false);

  const infoTasks=tasks.filter(t=>t.type==='Info');
  const actionTasks=tasks.filter(t=>t.type!=='Info');
  const shown=(filter==='all'?actionTasks:actionTasks.filter(t=>t.type===filter));
  // Done to bottom
  const sorted=[...shown.filter(t=>!cl[t.id]?.done),...shown.filter(t=>cl[t.id]?.done)];
  const done=actionTasks.filter(t=>cl[t.id]?.done).length;

  return(
    <div style={{animation:'fadeUp 0.3s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
        <SecTitle>Tarefas</SecTitle>
        <div style={{color:'#6b7280',fontSize:'13px',fontWeight:'600'}}>{done}/{actionTasks.length}</div>
      </div>

      {/* Info collapsible */}
      {infoTasks.length>0&&(
        <div style={{marginBottom:'14px'}}>
          <button onClick={()=>setInfoOpen(o=>!o)} style={{width:'100%',padding:'10px 14px',background:'rgba(107,114,128,0.1)',border:'1px solid rgba(107,114,128,0.2)',borderRadius:'12px',color:'#9ca3af',fontSize:'13px',fontWeight:'500',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',minHeight:'40px'}}>
            <span>ℹ️ Info <span style={{fontSize:'11px',color:'#4b5563'}}>({infoTasks.length})</span></span>
            <span style={{fontSize:'12px'}}>{infoOpen?'▲':'▼'}</span>
          </button>
          {infoOpen&&(
            <div style={{marginTop:'6px',display:'flex',flexDirection:'column',gap:'6px'}}>
              {infoTasks.map(task=>(
                <div key={task.id} style={{background:'rgba(107,114,128,0.06)',border:'1px solid rgba(107,114,128,0.15)',borderRadius:'12px',padding:'12px 14px'}}>
                  <div style={{fontSize:'13px',color:'#9ca3af',fontWeight:'500'}}>{task.label}</div>
                  {task.desc&&<div style={{fontSize:'12px',color:'#4b5563',marginTop:'3px'}}>{task.desc}</div>}
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Filters */}
      <div style={{display:'flex',gap:'6px',marginBottom:'16px',overflowX:'auto',paddingBottom:'4px'}}>
        {['all','Manual','Auto'].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{padding:'7px 14px',borderRadius:'20px',fontSize:'12px',fontWeight:'500',whiteSpace:'nowrap',border:'none',cursor:'pointer',background:filter===f?'#10b981':'#1f2937',color:filter===f?'#fff':'#6b7280',minHeight:'36px'}}>
            {f==='all'?'Todas':f}
          </button>
        ))}
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
        {sorted.map(task=>{
          const st=cl[task.id]; const isDone=!!st?.done;
          return(
            <div key={task.id} onClick={()=>onToggle(task.id)} style={{background:isDone?'rgba(16,185,129,0.04)':'#111827',border:`1px solid ${isDone?'rgba(16,185,129,0.15)':'#1f2937'}`,borderRadius:'14px',padding:'14px',display:'flex',alignItems:'flex-start',gap:'12px',cursor:'pointer',transition:'all 0.2s',minHeight:'60px',opacity:isDone?0.6:1}}>
              <div style={{width:'24px',height:'24px',borderRadius:'50%',flexShrink:0,marginTop:'1px',background:isDone?'#10b981':'transparent',border:`2px solid ${isDone?'#10b981':'#374151'}`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:'14px',transition:'all 0.2s'}}>
                {isDone&&'✓'}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:'14px',color:isDone?'#4b5563':'#e5e7eb',textDecoration:isDone?'line-through':'none',lineHeight:1.4}}>{task.label}</div>
                <div style={{fontSize:'12px',color:'#374151',marginTop:'2px'}}>{task.desc}</div>
                {isDone&&<div style={{fontSize:'11px',color:'#059669',marginTop:'5px'}}>✓ {st.by} · {fmtD(st.at)} {fmtT(st.at)}</div>}
              </div>
              <Pill label={task.type}/>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── EXPENSES ─────────────────────────────────────────────────────────────────

function Expenses({expenses,onSave,user,addActivity}){
  const [modal,setModal]=useState(null); // null | 'add' | expense obj
  const now=new Date(); const mo=now.getMonth();

  const monthly=expenses.filter(e=>e.period==='monthly');
  const annual=expenses.filter(e=>e.period==='annual');
  const activeMonthly=monthly.filter(e=>e.active).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const activeAnnual=annual.filter(e=>e.active).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);

  const toggle=async exp=>{
    const next=expenses.map(e=>e.id===exp.id?{...e,active:!e.active}:e);
    await onSave(next);
  };

  const save=async data=>{
    let next;
    if(data.id&&expenses.find(e=>e.id===data.id)){
      next=expenses.map(e=>e.id===data.id?{...data,editedBy:user,editedAt:new Date().toISOString()}:e);
      addActivity&&addActivity('✏️','#6b7280',`Encargo editado: ${data.name}`,fmt(data.amount));
    } else {
      next=[...expenses,{...data,id:'e'+Date.now(),createdBy:user,createdAt:new Date().toISOString()}];
      addActivity&&addActivity('€','#f87171',`Novo encargo: ${data.name}`,fmt(data.amount));
    }
    await onSave(next); setModal(null);
  };

  const del=async id=>{
    const exp=expenses.find(e=>e.id===id);
    const next=expenses.filter(e=>e.id!==id);
    await onSave(next); setModal(null);
    addActivity&&addActivity('🗑','#6b7280',`Encargo eliminado: ${exp?.name||''}`,null);
  };

  const ExpRow=({exp})=>(
    <div onClick={()=>setModal(exp)} style={{display:'flex',alignItems:'center',gap:'12px',padding:'12px',borderRadius:'12px',background:exp.active?'#111827':'rgba(30,35,45,0.5)',border:`1px solid ${exp.active?'#1f2937':'#141920'}`,marginBottom:'8px',cursor:'pointer',minHeight:'52px',opacity:exp.active?1:0.55}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:'14px',color:exp.active?'#e5e7eb':'#4b5563',textDecoration:exp.active?'none':'line-through',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{exp.name}</div>
        {exp.note&&<div style={{fontSize:'11px',color:'#374151',marginTop:'2px'}}>{exp.note}</div>}
        {exp.period==='annual'&&<div style={{fontSize:'11px',color:exp.active?'#f59e0b':'#374151',marginTop:'2px'}}>{MONTHS[exp.month]}</div>}
      </div>
      <div style={{textAlign:'right',flexShrink:0}}>
        <div style={{fontSize:'15px',fontWeight:'700',color:exp.active?'#f87171':'#374151'}}>{fmt(exp.amount)}</div>
        {exp.period==='monthly'&&<div style={{fontSize:'10px',color:'#374151'}}>mensal</div>}
      </div>
      <div onClick={e=>{e.stopPropagation();toggle(exp);}} style={{width:'36px',height:'20px',borderRadius:'10px',background:exp.active?'#10b981':'#374151',cursor:'pointer',position:'relative',transition:'background 0.2s',flexShrink:0}}>
        <div style={{position:'absolute',top:'2px',left:exp.active?'18px':'2px',width:'16px',height:'16px',borderRadius:'50%',background:'#fff',transition:'left 0.2s'}}/>
      </div>
    </div>
  );

  return(
    <div style={{animation:'fadeUp 0.3s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
        <SecTitle>Encargos</SecTitle>
        <Btn onClick={()=>setModal('add')} style={{padding:'8px 16px',fontSize:'13px'}}>+ Novo</Btn>
      </div>

      {/* Summary */}
      <Card style={{marginBottom:'16px',background:'linear-gradient(135deg,rgba(248,113,113,0.07),rgba(245,158,11,0.04))'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
          <div>
            <div style={{color:'#6b7280',fontSize:'11px',textTransform:'uppercase',marginBottom:'4px'}}>Fixos/mês</div>
            <div style={{fontSize:'22px',fontWeight:'700',color:'#f87171',fontFamily:"'Fraunces',serif"}}>{fmt(activeMonthly)}</div>
          </div>
          <div>
            <div style={{color:'#6b7280',fontSize:'11px',textTransform:'uppercase',marginBottom:'4px'}}>Anuais (total)</div>
            <div style={{fontSize:'22px',fontWeight:'700',color:'#f59e0b',fontFamily:"'Fraunces',serif"}}>{fmt(activeAnnual)}</div>
          </div>
        </div>
        {(() => {
          const periodic=annual.filter(e=>e.active&&e.month===mo);
          if(!periodic.length)return null;
          return(
            <div style={{marginTop:'12px',borderTop:'1px solid rgba(255,255,255,0.05)',paddingTop:'12px'}}>
              <div style={{fontSize:'11px',color:'#f59e0b',fontWeight:'600',marginBottom:'6px'}}>⚠️ Este mês:</div>
              {periodic.map(e=>(
                <div key={e.id} style={{display:'flex',justifyContent:'space-between',fontSize:'13px',color:'#f59e0b',marginBottom:'3px'}}>
                  <span>{e.name}</span><span>{fmt(e.amount)}</span>
                </div>
              ))}
            </div>
          );
        })()}
      </Card>

      <Lbl>Fixos Mensais</Lbl>
      {monthly.map(e=><ExpRow key={e.id} exp={e}/>)}
      <div style={{height:'12px'}}/>
      <Lbl>Anuais / Periódicos</Lbl>
      {annual.map(e=><ExpRow key={e.id} exp={e}/>)}

      {(modal==='add'||(modal!==null&&typeof modal==='object'))&&(
        <ExpenseModal
          expense={modal==='add'?null:modal}
          onSave={save}
          onDelete={del}
          onClose={()=>setModal(null)}
        />
      )}
    </div>
  );
}

function ExpenseModal({expense,onSave,onDelete,onClose}){
  const [name,setName]=useState(expense?.name||'');
  const [amount,setAmount]=useState(expense?String(expense.amount):'');
  const [period,setPeriod]=useState(expense?.period||'monthly');
  const [month,setMonth]=useState(expense?.month??0);
  const [note,setNote]=useState(expense?.note||'');
  const [active,setActive]=useState(expense?.active!==false);
  const [confirm,setConfirm]=useState(false);

  const save=()=>{
    if(!name||!amount)return;
    onSave({...(expense||{}),name,amount:parseFloat(amount),period,month:period==='annual'?parseInt(month):null,note,active});
  };

  if(confirm)return(
    <ConfirmModal title="Eliminar Encargo" message={`Tens a certeza que queres eliminar "${expense?.name}"?`}
      confirmLabel="Eliminar" variant="danger" onConfirm={()=>onDelete(expense.id)} onCancel={()=>setConfirm(false)}/>
  );

  return(
    <Modal title={expense?'Editar Encargo':'Novo Encargo'} onClose={onClose}>
      <Field label="Nome" value={name} onChange={setName} placeholder="ex: Seguro Saúde"/>
      <Field label="Valor (€)" type="number" value={amount} onChange={setAmount} placeholder="0,00"/>
      <SelectField label="Periodicidade" value={period} onChange={setPeriod} options={[{value:'monthly',label:'Mensal'},{value:'annual',label:'Anual / Periódico'}]}/>
      {period==='annual'&&(
        <SelectField label="Mês" value={month} onChange={v=>setMonth(parseInt(v))} options={MONTHS.map((m,i)=>({value:i,label:m}))}/>
      )}
      <Field label="Nota (opcional)" value={note} onChange={setNote}/>
      <Toggle value={active} onChange={setActive} label="Ativo"/>
      <Divider/>
      <div style={{display:'flex',gap:'8px',marginTop:'8px'}}>
        {expense&&<Btn onClick={()=>setConfirm(true)} variant="danger" style={{padding:'12px 16px'}}>🗑</Btn>}
        <Btn onClick={save} disabled={!name||!amount} style={{flex:1,padding:'14px'}}>{expense?'Guardar':'Adicionar'}</Btn>
      </div>
      {expense?.editedBy&&<div style={{fontSize:'11px',color:'#374151',textAlign:'center',marginTop:'10px'}}>Editado por {expense.editedBy} em {fmtDT(expense.editedAt)}</div>}
    </Modal>
  );
}

// ─── INVEST ───────────────────────────────────────────────────────────────────

function Invest({inv,mk,assets,platforms,onSaveInv,onSaveAssets,onSavePlatforms,user,addActivity}){
  const [modal,setModal]=useState(null);
  const [editItem,setEditItem]=useState(null);

  const thisMo=inv.filter(i=>i.mk===mk);
  const past=inv.filter(i=>i.mk!==mk);
  const byPlat=list=>{const m={};list.forEach(i=>{if(!m[i.platform])m[i.platform]=0;m[i.platform]+=parseFloat(i.amount)||0;});return m;};

  const saveEntry=async data=>{
    let next;
    if(editItem){
      next=inv.map(i=>i.id===editItem.id?{...i,...data,editedBy:user,editedAt:new Date().toISOString()}:i);
      addActivity&&addActivity('✏️','#6b7280',`Editado: ${data.asset}`,fmt(parseFloat(data.amount)||0));
    } else {
      next=[{id:Date.now(),date:new Date().toISOString(),mk,by:user,...data},...inv];
      addActivity&&addActivity('↗','#34d399',`Investimento: ${data.asset}`,fmt(parseFloat(data.amount)||0));
    }
    await onSaveInv(next); setModal(null); setEditItem(null);
  };

  const delEntry=async id=>{
    const entry=inv.find(i=>i.id===id);
    const next=inv.filter(i=>i.id!==id);
    await onSaveInv(next); setModal(null); setEditItem(null);
    addActivity&&addActivity('🗑','#6b7280',`Eliminado: ${entry?.asset||''}`,null);
  };

  const InvRow=({item})=>(
    <Card style={{padding:'12px',marginBottom:'8px',cursor:'pointer'}} onClick={()=>{setEditItem(item);setModal('entry');}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div style={{flex:1,minWidth:0,paddingRight:'8px'}}>
          <div style={{fontSize:'14px',color:'#e5e7eb',fontWeight:'500',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.asset}</div>
          <div style={{fontSize:'12px',color:'#6b7280',marginTop:'2px'}}>{item.platform} · {fmtD(item.date)} · {item.by}</div>
          {item.editedBy&&<div style={{fontSize:'10px',color:'#374151',marginTop:'2px'}}>editado por {item.editedBy}</div>}
        </div>
        <div style={{fontSize:'18px',fontWeight:'700',color:'#34d399',flexShrink:0}}>{fmt(parseFloat(item.amount)||0)}</div>
      </div>
      {item.notes&&<div style={{fontSize:'12px',color:'#4b5563',marginTop:'8px',borderTop:'1px solid #1a2332',paddingTop:'8px'}}>{item.notes}</div>}
    </Card>
  );

  return(
    <div style={{animation:'fadeUp 0.3s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
        <SecTitle>Investimentos</SecTitle>
        <div style={{display:'flex',gap:'8px'}}>
          <Btn onClick={()=>setModal('settings')} variant="secondary" style={{padding:'8px 12px',fontSize:'13px'}}>⚙️</Btn>
          <Btn onClick={()=>{setEditItem(null);setModal('entry');}} style={{padding:'8px 16px',fontSize:'13px'}}>+ Novo</Btn>
        </div>
      </div>

      {inv.length===0?(
        <Card style={{textAlign:'center',padding:'40px 16px',color:'#374151'}}>
          <div style={{fontSize:'40px',marginBottom:'10px'}}>↗</div>
          <div style={{fontSize:'14px'}}>Sem registos ainda.</div>
        </Card>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
          {thisMo.length>0&&(
            <div>
              <Lbl>Este Mês</Lbl>
              {(()=>{
                const bp=byPlat(thisMo);
                return(
                  <Card style={{padding:'12px',marginBottom:'8px',display:'flex',gap:'8px',flexWrap:'wrap'}}>
                    {Object.entries(bp).map(([p,v])=>(
                      <div key={p} style={{background:'#1f2937',borderRadius:'8px',padding:'6px 12px',fontSize:'12px'}}>
                        <span style={{color:'#6b7280'}}>{p} </span>
                        <span style={{color:'#34d399',fontWeight:'600'}}>{fmt(v)}</span>
                      </div>
                    ))}
                  </Card>
                );
              })()}
              {thisMo.map(i=><InvRow key={i.id} item={i}/>)}
            </div>
          )}
          {past.length>0&&(
            <div>
              <Lbl>Anteriores</Lbl>
              {past.slice(0,30).map(i=><InvRow key={i.id} item={i}/>)}
            </div>
          )}
        </div>
      )}

      {modal==='entry'&&(
        <InvEntryModal
          item={editItem}
          assets={assets}
          platforms={platforms}
          onSave={saveEntry}
          onDelete={delEntry}
          onClose={()=>{setModal(null);setEditItem(null);}}
        />
      )}
      {modal==='settings'&&(
        <InvSettingsModal
          assets={assets} platforms={platforms}
          onSaveAssets={onSaveAssets} onSavePlatforms={onSavePlatforms}
          onClose={()=>setModal(null)}
        />
      )}
    </div>
  );
}

function InvEntryModal({item,assets,platforms,onSave,onDelete,onClose}){
  const [assetId,setAssetId]=useState(item?.assetId||assets[0]?.id||'');
  const [platform,setPlatform]=useState(item?.platform||assets[0]?.platform||platforms[0]||'');
  const [amount,setAmount]=useState(item?String(item.amount):'');
  const [notes,setNotes]=useState(item?.notes||'');
  const [confirm,setConfirm]=useState(false);

  const selAsset=assets.find(a=>a.id===assetId);
  useEffect(()=>{ if(selAsset&&!item) setPlatform(selAsset.platform); },[assetId]);

  const save=()=>{
    if(!amount)return;
    const label=selAsset?selAsset.label:(item?.asset||'');
    onSave({assetId,asset:label,platform,amount:parseFloat(amount),notes});
  };

  if(confirm)return(
    <ConfirmModal title="Eliminar Registo" message="Tens a certeza que queres eliminar este registo de investimento?"
      confirmLabel="Eliminar" variant="danger" onConfirm={()=>onDelete(item.id)} onCancel={()=>setConfirm(false)}/>
  );

  return(
    <Modal title={item?'Editar Investimento':'Novo Investimento'} onClose={onClose}>
      <div style={{marginBottom:'14px'}}>
        <label style={{display:'block',color:'#6b7280',fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'6px'}}>Ativo</label>
        <select value={assetId} onChange={e=>setAssetId(e.target.value)} style={{width:'100%',padding:'12px 14px',background:'#1f2937',border:'1px solid #374151',borderRadius:'12px',color:'#e5e7eb',fontSize:'14px',outline:'none'}}>
          {assets.map(a=><option key={a.id} value={a.id}>{a.label}</option>)}
        </select>
      </div>
      <SelectField label="Plataforma" value={platform} onChange={setPlatform} options={platforms.map(p=>({value:p,label:p}))}/>
      <Field label="Montante (€)" type="number" value={amount} onChange={setAmount} placeholder="0,00"/>
      <Field label="Notas (opcional)" value={notes} onChange={setNotes}/>
      <Divider/>
      <div style={{display:'flex',gap:'8px'}}>
        {item&&<Btn onClick={()=>setConfirm(true)} variant="danger" style={{padding:'12px 16px'}}>🗑</Btn>}
        <Btn onClick={save} disabled={!amount} style={{flex:1,padding:'14px'}}>{item?'Guardar':'Adicionar'}</Btn>
      </div>
    </Modal>
  );
}

function InvSettingsModal({assets,platforms,onSaveAssets,onSavePlatforms,onClose}){
  const [tab,setTab]=useState('assets');
  const [localAssets,setLocalAssets]=useState(assets);
  const [localPlats,setLocalPlats]=useState(platforms);
  const [newPlat,setNewPlat]=useState('');
  const [editAsset,setEditAsset]=useState(null);

  const savePlatform=async()=>{
    if(!newPlat.trim())return;
    const next=[...localPlats,newPlat.trim()];
    setLocalPlats(next); await onSavePlatforms(next); setNewPlat('');
  };
  const delPlatform=async p=>{
    const next=localPlats.filter(x=>x!==p);
    setLocalPlats(next); await onSavePlatforms(next);
  };
  const saveAsset=async data=>{
    let next;
    if(data.id&&localAssets.find(a=>a.id===data.id)){
      next=localAssets.map(a=>a.id===data.id?data:a);
    } else {
      next=[...localAssets,{...data,id:'a'+Date.now()}];
    }
    setLocalAssets(next); await onSaveAssets(next); setEditAsset(null);
  };
  const delAsset=async id=>{
    const next=localAssets.filter(a=>a.id!==id);
    setLocalAssets(next); await onSaveAssets(next); setEditAsset(null);
  };

  return(
    <Modal title="Configurar Investimentos" onClose={onClose}>
      <div style={{display:'flex',gap:'6px',marginBottom:'16px'}}>
        {['assets','platforms'].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:'8px',borderRadius:'10px',border:'none',cursor:'pointer',background:tab===t?'#10b981':'#1f2937',color:tab===t?'#fff':'#6b7280',fontSize:'13px',fontWeight:'500',minHeight:'36px'}}>
            {t==='assets'?'Ativos':'Plataformas'}
          </button>
        ))}
      </div>

      {tab==='platforms'&&(
        <div>
          {localPlats.map(p=>(
            <div key={p} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',background:'#1f2937',borderRadius:'10px',marginBottom:'8px',minHeight:'44px'}}>
              <span style={{fontSize:'14px',color:'#e5e7eb'}}>{p}</span>
              <button onClick={()=>delPlatform(p)} style={{background:'none',border:'none',color:'#f87171',fontSize:'16px',cursor:'pointer',padding:'4px 8px'}}>✕</button>
            </div>
          ))}
          <div style={{display:'flex',gap:'8px',marginTop:'8px'}}>
            <input value={newPlat} onChange={e=>setNewPlat(e.target.value)} placeholder="Nova plataforma…" onKeyDown={e=>e.key==='Enter'&&savePlatform()}
              style={{flex:1,padding:'10px 12px',background:'#1f2937',border:'1px solid #374151',borderRadius:'10px',color:'#e5e7eb',fontSize:'14px',outline:'none'}}/>
            <Btn onClick={savePlatform} disabled={!newPlat.trim()} style={{padding:'10px 16px'}}>+</Btn>
          </div>
        </div>
      )}

      {tab==='assets'&&(
        <div>
          {editAsset?(
            <AssetForm asset={editAsset==='new'?null:editAsset} platforms={localPlats} onSave={saveAsset} onDelete={editAsset!=='new'?()=>delAsset(editAsset.id):null} onBack={()=>setEditAsset(null)}/>
          ):(
            <>
              {localAssets.map(a=>(
                <div key={a.id} onClick={()=>setEditAsset(a)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',background:'#1f2937',borderRadius:'10px',marginBottom:'8px',cursor:'pointer',minHeight:'52px'}}>
                  <div>
                    <div style={{fontSize:'14px',color:'#e5e7eb'}}>{a.label}</div>
                    <div style={{fontSize:'11px',color:'#4b5563'}}>{a.platform}{a.auto?` · auto ${fmt(a.autoAmount)}/mês`:''}</div>
                  </div>
                  <span style={{color:'#374151',fontSize:'14px'}}>›</span>
                </div>
              ))}
              <Btn onClick={()=>setEditAsset('new')} variant="secondary" style={{width:'100%',marginTop:'8px'}}>+ Novo Ativo</Btn>
            </>
          )}
        </div>
      )}
    </Modal>
  );
}

function AssetForm({asset,platforms,onSave,onDelete,onBack}){
  const [label,setLabel]=useState(asset?.label||'');
  const [platform,setPlatform]=useState(asset?.platform||platforms[0]||'');
  const [auto,setAuto]=useState(asset?.auto||false);
  const [autoAmount,setAutoAmount]=useState(asset?String(asset.autoAmount||0):'');
  const [confirm,setConfirm]=useState(false);

  if(confirm)return(
    <ConfirmModal title="Eliminar Ativo" message={`Eliminar "${asset?.label}"?`}
      confirmLabel="Eliminar" variant="danger" onConfirm={()=>onDelete()} onCancel={()=>setConfirm(false)}/>
  );

  return(
    <div>
      <button onClick={onBack} style={{background:'none',border:'none',color:'#6b7280',fontSize:'13px',cursor:'pointer',marginBottom:'16px',display:'flex',alignItems:'center',gap:'4px',padding:'0'}}>← Voltar</button>
      <Field label="Nome do Ativo" value={label} onChange={setLabel} placeholder="ex: S&P 500"/>
      <SelectField label="Plataforma" value={platform} onChange={setPlatform} options={platforms.map(p=>({value:p,label:p}))}/>
      <Toggle value={auto} onChange={setAuto} label="Investimento automático"/>
      {auto&&<Field label="Valor mensal automático (€)" type="number" value={autoAmount} onChange={setAutoAmount} placeholder="0,00"/>}
      <Divider/>
      <div style={{display:'flex',gap:'8px',marginTop:'8px'}}>
        {onDelete&&<Btn onClick={()=>setConfirm(true)} variant="danger" style={{padding:'12px 16px'}}>🗑</Btn>}
        <Btn onClick={()=>onSave({...(asset||{}),label,platform,auto,autoAmount:parseFloat(autoAmount)||0})} disabled={!label} style={{flex:1,padding:'14px'}}>{asset?'Guardar':'Adicionar'}</Btn>
      </div>
    </div>
  );
}

  const [local,setLocal]=useState(categories);

  const [newColor,setNewColor]=useState('#a78bfa');
  const [newIcon,setNewIcon]=useState('💰');

  const add=async()=>{
    if(!newName.trim())return;

  };

  return(
    <div>

        <div key={cat.id} style={{display:'flex',alignItems:'center',gap:'10px',padding:'10px 12px',background:'#1f2937',borderRadius:'10px',marginBottom:'8px'}}>
          <span style={{fontSize:'18px'}}>{cat.icon}</span>
          <span style={{flex:1,fontSize:'14px',color:'#e5e7eb'}}>{cat.name}</span>

          {cat.id!=='vc1'&&cat.id!=='vc2'&&cat.id!=='vc3'&&(
            <button onClick={()=>setConfirm(cat.id)} style={{background:'none',border:'none',color:'#f87171',fontSize:'16px',cursor:'pointer',padding:'2px 6px'}}>✕</button>
          )}
        </div>
      ))}
      <div style={{marginTop:'14px',padding:'12px',background:'rgba(167,139,250,0.06)',border:'1px solid rgba(167,139,250,0.15)',borderRadius:'12px'}}>
        <div style={{fontSize:'11px',color:'#a78bfa',fontWeight:'600',marginBottom:'10px'}}>Nova Categoria</div>
        <div style={{display:'flex',gap:'8px',marginBottom:'8px'}}>
          <input value={newIcon} onChange={e=>setNewIcon(e.target.value)} style={{width:'48px',padding:'8px',background:'#1f2937',border:'1px solid #374151',borderRadius:'8px',color:'#e5e7eb',fontSize:'18px',textAlign:'center',outline:'none'}}/>
          <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Nome da categoria" onKeyDown={e=>e.key==='Enter'&&add()}
            style={{flex:1,padding:'8px 12px',background:'#1f2937',border:'1px solid #374151',borderRadius:'8px',color:'#e5e7eb',fontSize:'14px',outline:'none'}}/>

        </div>
        <Btn onClick={add} disabled={!newName.trim()} style={{width:'100%',padding:'10px'}}>+ Adicionar</Btn>
      </div>
      {confirm&&<ConfirmModal title="Eliminar Categoria" message="Tens a certeza? Os registos desta categoria não serão apagados." confirmLabel="Eliminar" variant="danger" onConfirm={()=>del(confirm)} onCancel={()=>setConfirm(null)}/>}
    </div>
  );
}

// ─── GASTOS VARIÁVEIS ─────────────────────────────────────────────────────────

function GastosVariaveis({categories,expenses,josi,josiCfg,user,showToast,onSaveExpenses,addActivity}){
  const [view,setView]=useState('list'); // 'list' | 'chart'
  const [modal,setModal]=useState(null); // null | 'add' | expense obj
  const now=new Date(); const curMo=now.getMonth(); const curYr=now.getFullYear();

  // Current month entries
  const curKey=`${curYr}-${String(curMo+1).padStart(2,'0')}`;
  const curEntries=expenses.filter(e=>e.monthKey===curKey);

  // Josi amount for current month
  const josiH=josi.reduce((s,e)=>s+(parseFloat(e.hours)||0),0);
  const josiAmt=parseFloat((josiH*josiCfg.rate).toFixed(2));

  const saveEntry=async(data,existingId)=>{
    let next;
    const cat=categories.find(cc=>cc.id===data.categoryId);
    if(existingId){
      next=expenses.map(e=>e.id===existingId?{...e,...data,editedBy:user,editedAt:new Date().toISOString()}:e);
      addActivity&&addActivity('✏️','#6b7280',`Editado: ${cat?.name||data.categoryName}`,fmt(parseFloat(data.amount)||0));
    } else {
      next=[...expenses,{id:'ve'+Date.now(),by:user,createdAt:new Date().toISOString(),...data}];
      addActivity&&addActivity('📊','#a78bfa',`${cat?.icon||''} ${cat?.name||data.categoryName}`,fmt(parseFloat(data.amount)||0));
    }
    await onSaveExpenses(next); setModal(null); showToast('Guardado ✓');
  };

  const delEntry=async id=>{
    const e=expenses.find(x=>x.id===id);
    const cat=categories.find(cc=>cc.id===e?.categoryId);
    await onSaveExpenses(expenses.filter(x=>x.id!==id)); setModal(null); showToast('Removido');
    addActivity&&addActivity('🗑','#6b7280',`Eliminado: ${cat?.name||e?.categoryName||''}`,null);
  };

  return(
    <div style={{animation:'fadeUp 0.3s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
        <SecTitle>Gastos Variáveis</SecTitle>
        <div style={{display:'flex',gap:'8px'}}>
          <button onClick={()=>setView(v=>v==='list'?'chart':'list')} style={{padding:'8px 14px',borderRadius:'10px',background:'#1f2937',border:'1px solid #374151',color:'#9ca3af',fontSize:'13px',cursor:'pointer'}}>
            {view==='list'?'📊 Gráfico':'📋 Lista'}
          </button>
          {view==='list'&&<Btn onClick={()=>setModal('add')} style={{padding:'8px 16px',fontSize:'13px'}}>+ Novo</Btn>}
        </div>
      </div>

      {view==='list'&&(
        <div>
          {/* Current month summary */}
          <Card style={{marginBottom:'14px',background:'linear-gradient(135deg,rgba(167,139,250,0.07),rgba(16,185,129,0.04))'}}>
            <div style={{color:'#6b7280',fontSize:'11px',textTransform:'uppercase',marginBottom:'10px'}}>{MONTHS[curMo]} {curYr}</div>
            {categories.map(cat=>{
              const entry=curEntries.find(e=>e.categoryId===cat.id);
              return(
                <div key={cat.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid #1a2332'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                    <span style={{fontSize:'16px'}}>{cat.icon}</span>
                    <span style={{fontSize:'13px',color:'#9ca3af'}}>{cat.name}</span>
                  </div>
                  {entry
                    ?<span style={{fontSize:'14px',fontWeight:'600',color:cat.color}}>{fmt(entry.amount)}</span>
                    :<span style={{fontSize:'12px',color:'#374151'}}>— por registar</span>
                  }
                </div>
              );
            })}
            <div style={{display:'flex',justifyContent:'space-between',padding:'8px 0 0',marginTop:'4px'}}>
              <span style={{fontSize:'13px',color:'#9ca3af',fontWeight:'500'}}>Total</span>
              <span style={{fontSize:'16px',fontWeight:'700',color:'#a78bfa'}}>{fmt(curEntries.reduce((s,e)=>s+(parseFloat(e.amount)||0),0))}</span>
            </div>
          </Card>

          {/* Recent entries */}
          {expenses.length===0?(
            <Card style={{textAlign:'center',padding:'40px 16px',color:'#374151'}}>
              <div style={{fontSize:'40px',marginBottom:'10px'}}>📊</div>
              <div style={{fontSize:'14px'}}>Sem registos ainda.<br/>Adiciona o primeiro.</div>
            </Card>
          ):(
            <div>
              <Lbl>Registos Recentes</Lbl>
              {[...expenses].sort((a,b)=>b.monthKey.localeCompare(a.monthKey)).slice(0,20).map(e=>{
                const cat=categories.find(c=>c.id===e.categoryId)||{name:e.categoryName,icon:'💰',color:'#6b7280'};
                return(
                  <Card key={e.id} style={{padding:'12px',marginBottom:'8px',cursor:'pointer'}} onClick={()=>setModal(e)}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                        <span style={{fontSize:'20px'}}>{cat.icon}</span>
                        <div>
                          <div style={{fontSize:'14px',color:'#e5e7eb'}}>{cat.name}</div>
                          <div style={{fontSize:'11px',color:'#4b5563'}}>{MONTHS[parseInt(e.monthKey.split('-')[1])-1]} {e.monthKey.split('-')[0]} · {e.by}</div>
                        </div>
                      </div>
                      <div style={{fontSize:'16px',fontWeight:'700',color:cat.color}}>{fmt(parseFloat(e.amount)||0)}</div>
                    </div>
                  </Card>
                );
              })}
            </div>
          )}
        </div>
      )}

      {view==='chart'&&(
        <VarChart categories={categories} expenses={expenses} josi={josi} josiCfg={josiCfg}/>
      )}

      {modal&&(
        <VarEntryModal
          expense={modal==='add'?null:modal}
          categories={categories}
          allExpenses={expenses}
          onSave={saveEntry}
          onDelete={modal!=='add'?delEntry:null}
          onClose={()=>setModal(null)}
        />
      )}
    </div>
  );
}

function VarEntryModal({expense,categories,allExpenses,onSave,onDelete,onClose}){
  const now=new Date();
  const [categoryId,setCategoryId]=useState(expense?.categoryId||categories[0]?.id||'');
  const [month,setMonth]=useState(expense?parseInt(expense.monthKey.split('-')[1])-1:now.getMonth());
  const [year,setYear]=useState(expense?parseInt(expense.monthKey.split('-')[0]):now.getFullYear());
  const [amount,setAmount]=useState(expense?String(expense.amount):'');
  const [confirm,setConfirm]=useState(false);
  const [dupWarning,setDupWarning]=useState(false);

  const monthKey=`${year}-${String(month+1).padStart(2,'0')}`;
  const isDup=!expense&&allExpenses.some(e=>e.categoryId===categoryId&&e.monthKey===monthKey);

  const save=()=>{
    if(!amount||!categoryId)return;
    if(isDup){setDupWarning(true);return;}
    const cat=categories.find(c=>c.id===categoryId);
    onSave({categoryId,categoryName:cat?.name||'',monthKey,amount:parseFloat(amount)},expense?.id);
  };

  const years=[now.getFullYear(),now.getFullYear()-1,now.getFullYear()-2];

  if(confirm)return<ConfirmModal title="Eliminar Registo" message="Tens a certeza?" confirmLabel="Eliminar" variant="danger" onConfirm={()=>onDelete(expense.id)} onCancel={()=>setConfirm(false)}/>;

  return(
    <Modal title={expense?'Editar Registo':'Novo Registo'} onClose={onClose}>
      <SelectField label="Categoria" value={categoryId} onChange={v=>{setCategoryId(v);setDupWarning(false);}} options={categories.map(c=>({value:c.id,label:`${c.icon} ${c.name}`}))}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'14px'}}>
        <div>
          <label style={{display:'block',color:'#6b7280',fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'6px'}}>Mês</label>
          <select value={month} onChange={e=>{setMonth(parseInt(e.target.value));setDupWarning(false);}} style={{width:'100%',padding:'12px 10px',background:'#1f2937',border:'1px solid #374151',borderRadius:'12px',color:'#e5e7eb',fontSize:'14px',outline:'none'}}>
            {MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}
          </select>
        </div>
        <div>
          <label style={{display:'block',color:'#6b7280',fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'6px'}}>Ano</label>
          <select value={year} onChange={e=>{setYear(parseInt(e.target.value));setDupWarning(false);}} style={{width:'100%',padding:'12px 10px',background:'#1f2937',border:'1px solid #374151',borderRadius:'12px',color:'#e5e7eb',fontSize:'14px',outline:'none'}}>
            {years.map(y=><option key={y} value={y}>{y}</option>)}
          </select>
        </div>
      </div>
      {isDup||dupWarning?(
        <div style={{padding:'12px',background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:'10px',marginBottom:'14px',fontSize:'13px',color:'#fca5a5'}}>
          ⚠️ Já existe um registo para esta categoria neste mês. Clica no registo existente para o editar.
        </div>
      ):null}
      <Field label="Valor (€)" type="number" value={amount} onChange={setAmount} placeholder="0,00"/>
      <Divider/>
      <div style={{display:'flex',gap:'8px'}}>
        {onDelete&&<Btn onClick={()=>setConfirm(true)} variant="danger" style={{padding:'12px 16px'}}>🗑</Btn>}
        <Btn onClick={save} disabled={!amount||isDup} style={{flex:1,padding:'14px'}}>{expense?'Guardar':'Adicionar'}</Btn>
      </div>
    </Modal>
  );
}

function VarChart({categories,expenses,josi,josiCfg}){
  const [activeCategories,setActiveCategories]=useState(()=>categories.map(c=>c.id));
  const [josiActive,setJosiActive]=useState(true);
  const [viewMonths,setViewMonths]=useState(12);
  const [viewYear,setViewYear]=useState(null);
  const [tooltip,setTooltip]=useState(null);

  const now=new Date();
  const years=[now.getFullYear(),now.getFullYear()-1,now.getFullYear()-2];

  const buildKeys=()=>{
    if(viewYear!==null){
      return Array.from({length:12},(_,i)=>`${viewYear}-${String(i+1).padStart(2,'0')}`);
    }
    const keys=[];
    const count=viewMonths===999?Math.max(24,expenses.length>0?Math.ceil((new Date()-new Date(expenses.sort((a,b)=>a.monthKey.localeCompare(b.monthKey))[0]?.monthKey||now))/2592000000)+1:12):viewMonths;
    for(let i=count-1;i>=0;i--){
      const d=new Date(now.getFullYear(),now.getMonth()-i,1);
      keys.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
    }
    return keys;
  };

  const keys=buildKeys();

  const data=keys.map(key=>{
    const [yr,mo]=key.split('-').map(Number);
    const label=`${MONTH_SHORT[mo-1]} ${String(yr).slice(2)}`;
    let total=0;
    activeCategories.forEach(catId=>{
      const e=expenses.find(x=>x.categoryId===catId&&x.monthKey===key);
      if(e) total+=parseFloat(e.amount)||0;
    });
    if(josiActive&&key===`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`){
      const h=josi.reduce((s,e)=>s+(parseFloat(e.hours)||0),0);
      total+=h*josiCfg.rate;
    }
    return {key,label,total};
  });

  const validData=data.filter(d=>d.total>0);
  const maxVal=Math.max(...data.map(d=>d.total),1);
  const avg=validData.length>0?Math.round(validData.reduce((s,d)=>s+d.total,0)/validData.length):0;

  // Linear regression for trend
  const n=data.length;
  const xs=data.map((_,i)=>i);
  const ys=data.map(d=>d.total);
  const sumX=xs.reduce((a,b)=>a+b,0);
  const sumY=ys.reduce((a,b)=>a+b,0);
  const sumXY=xs.reduce((a,x,i)=>a+x*ys[i],0);
  const sumX2=xs.reduce((a,x)=>a+x*x,0);
  const denom=n*sumX2-sumX*sumX;
  const slope=denom!==0?(n*sumXY-sumX*sumY)/denom:0;
  const intercept=(sumY-slope*sumX)/n;
  const trendPoints=data.map((_,i)=>Math.max(0,intercept+slope*i));

  const toggleCat=id=>setActiveCategories(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);

  // SVG dimensions
  const W=320; const H=180;
  const padL=48; const padR=12; const padT=16; const padB=32;
  const gW=W-padL-padR; const gH=H-padT-padB;

  const xPos=i=>padL+i*(gW/(Math.max(data.length-1,1)));
  const yPos=v=>padT+gH-(v/maxVal)*gH;

  const linePath=data.map((d,i)=>`${i===0?'M':'L'}${xPos(i).toFixed(1)},${yPos(d.total).toFixed(1)}`).join(' ');
  const trendPath=trendPoints.map((v,i)=>`${i===0?'M':'L'}${xPos(i).toFixed(1)},${yPos(v).toFixed(1)}`).join(' ');
  const avgY=yPos(avg);

  // X labels - show every nth
  const step=Math.ceil(data.length/6);

  return(
    <div>
      {/* Category toggles */}
      <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'16px'}}>
        {categories.map(cat=>{
          const on=activeCategories.includes(cat.id);
          return(
            <button key={cat.id} onClick={()=>toggleCat(cat.id)} style={{padding:'6px 12px',borderRadius:'20px',border:`1px solid ${on?cat.color:'#374151'}`,background:on?cat.color+'18':'transparent',color:on?cat.color:'#4b5563',fontSize:'12px',cursor:'pointer'}}>
              {cat.icon} {cat.name}
            </button>
          );
        })}
        <button onClick={()=>setJosiActive(o=>!o)} style={{padding:'6px 12px',borderRadius:'20px',border:`1px solid ${josiActive?'#f59e0b':'#374151'}`,background:josiActive?'rgba(245,158,11,0.12)':'transparent',color:josiActive?'#f59e0b':'#4b5563',fontSize:'12px',cursor:'pointer'}}>
          ✦ Josi
        </button>
      </div>

      {/* View selector */}
      <div style={{display:'flex',gap:'6px',marginBottom:'16px',overflowX:'auto',paddingBottom:'2px'}}>
        {[{label:'12M',v:12,y:null},{label:'24M',v:24,y:null},{label:'Tudo',v:999,y:null},...years.map(y=>({label:String(y),v:12,y}))].map(opt=>{
          const active=opt.y!==null?viewYear===opt.y:(viewYear===null&&viewMonths===opt.v);
          return(
            <button key={opt.label} onClick={()=>{setViewMonths(opt.v);setViewYear(opt.y);}} style={{padding:'6px 14px',borderRadius:'20px',fontSize:'12px',fontWeight:'500',whiteSpace:'nowrap',border:'none',cursor:'pointer',background:active?'#10b981':'#1f2937',color:active?'#fff':'#6b7280',flexShrink:0,minHeight:'32px'}}>
              {opt.label}
            </button>
          );
        })}
      </div>

      {/* Stats */}
      {avg>0&&(
        <Card style={{marginBottom:'14px',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px'}}>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:'10px',color:'#4b5563',textTransform:'uppercase',marginBottom:'3px'}}>Média</div>
            <div style={{fontSize:'16px',fontWeight:'700',color:'#a78bfa'}}>{fmt(avg)}</div>
          </div>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:'10px',color:'#4b5563',textTransform:'uppercase',marginBottom:'3px'}}>Mínimo</div>
            <div style={{fontSize:'16px',fontWeight:'700',color:'#34d399'}}>{fmt(Math.min(...validData.map(d=>d.total)))}</div>
          </div>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:'10px',color:'#4b5563',textTransform:'uppercase',marginBottom:'3px'}}>Máximo</div>
            <div style={{fontSize:'16px',fontWeight:'700',color:'#f87171'}}>{fmt(Math.max(...validData.map(d=>d.total)))}</div>
          </div>
        </Card>
      )}

      {/* SVG Chart */}
      <Card style={{padding:'12px 8px 8px',position:'relative'}}>
        <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible'}}>
          {/* Grid lines */}
          {[0,0.25,0.5,0.75,1].map(f=>{
            const y=padT+gH*(1-f);
            return(
              <g key={f}>
                <line x1={padL} y1={y} x2={W-padR} y2={y} stroke="#1f2937" strokeWidth="1"/>
                <text x={padL-4} y={y+4} textAnchor="end" fill="#4b5563" fontSize="9">
                  {Math.round(maxVal*f)>=1000?`${(maxVal*f/1000).toFixed(1)}k`:Math.round(maxVal*f)}
                </text>
              </g>
            );
          })}

          {/* Avg line */}
          {avg>0&&<line x1={padL} y1={avgY} x2={W-padR} y2={avgY} stroke="#a78bfa" strokeWidth="1" strokeDasharray="4 3"/>}

          {/* Trend line */}
          {validData.length>=2&&<path d={trendPath} fill="none" stroke="#374151" strokeWidth="1.5" strokeDasharray="5 4"/>}

          {/* Main line */}
          <path d={linePath} fill="none" stroke="#a78bfa" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>

          {/* Area fill */}
          <path d={`${linePath} L${xPos(data.length-1).toFixed(1)},${padT+gH} L${xPos(0).toFixed(1)},${padT+gH} Z`} fill="url(#areaGrad)" opacity="0.15"/>
          <defs>
            <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#a78bfa" stopOpacity="0.8"/>
              <stop offset="100%" stopColor="#a78bfa" stopOpacity="0"/>
            </linearGradient>
          </defs>

          {/* Dots + tooltip triggers */}
          {data.map((d,i)=>(
            <g key={i}>
              <circle cx={xPos(i)} cy={yPos(d.total)} r="10" fill="transparent"
                onMouseEnter={()=>setTooltip({i,d})} onMouseLeave={()=>setTooltip(null)}
                onTouchStart={()=>setTooltip(t=>t?.i===i?null:{i,d})}
                style={{cursor:'pointer'}}/>
              {d.total>0&&<circle cx={xPos(i)} cy={yPos(d.total)} r="3.5" fill="#a78bfa" stroke="#0d1117" strokeWidth="1.5"/>}
            </g>
          ))}

          {/* X labels */}
          {data.map((d,i)=>i%step===0&&(
            <text key={i} x={xPos(i)} y={H-6} textAnchor="middle" fill="#4b5563" fontSize="9">{d.label}</text>
          ))}

          {/* Tooltip */}
          {tooltip&&(()=>{
            const tx=xPos(tooltip.i);
            const ty=yPos(tooltip.d.total);
            const boxW=80; const boxH=36;
            const bx=Math.min(Math.max(tx-boxW/2,padL),W-padR-boxW);
            const by=ty-boxH-8<padT?ty+8:ty-boxH-8;
            return(
              <g>
                <rect x={bx} y={by} width={boxW} height={boxH} rx="6" fill="#1a2332" stroke="#374151" strokeWidth="1"/>
                <text x={bx+boxW/2} y={by+14} textAnchor="middle" fill="#9ca3af" fontSize="9">{tooltip.d.label}</text>
                <text x={bx+boxW/2} y={by+28} textAnchor="middle" fill="#a78bfa" fontSize="11" fontWeight="bold">{fmt(tooltip.d.total)}</text>
              </g>
            );
          })()}
        </svg>

        {/* Legend */}
        <div style={{display:'flex',gap:'16px',justifyContent:'center',marginTop:'4px',flexWrap:'wrap'}}>
          <div style={{display:'flex',alignItems:'center',gap:'4px'}}><div style={{width:'16px',height:'2.5px',background:'#a78bfa',borderRadius:'2px'}}/><span style={{fontSize:'10px',color:'#6b7280'}}>Total</span></div>
          <div style={{display:'flex',alignItems:'center',gap:'4px'}}><div style={{width:'16px',height:'0',borderTop:'2px dashed #374151'}}/><span style={{fontSize:'10px',color:'#6b7280'}}>Tendência</span></div>
          <div style={{display:'flex',alignItems:'center',gap:'4px'}}><div style={{width:'16px',height:'0',borderTop:'2px dashed #a78bfa'}}/><span style={{fontSize:'10px',color:'#6b7280'}}>Média</span></div>
        </div>
      </Card>
    </div>
  );
}
