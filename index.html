<script type="text/babel">
// ── App shell: syncMMData + Auth + Render ────────────────────────────────────
const { useState: useSA, useEffect: useEA } = React;

function computeSpendHistory(s) {
  const SH = window.MM_STORE.helpers.MONTHS_SHORT;
  const { idx, year } = s.currentMonth;
  const result = [];
  for (let i = 6; i >= 0; i--) {
    let mIdx = idx - i, mYear = year;
    while (mIdx < 0) { mIdx += 12; mYear -= 1; }
    const key = `${mYear}-${String(mIdx+1).padStart(2,'0')}`;
    const md = s.months[key];
    const isCurrent = i === 0;
    const label = SH[mIdx];
    if (!md) { result.push({ m:label, fixos:0, var:0, josi:0, anuais:0, current:isCurrent }); continue; }
    if (!isCurrent && md._spendSummary) { result.push({ ...md._spendSummary, m:label, current:false }); continue; }
    const tasks = md.tasks || [];
    const fixos = tasks.filter(t => t.done && s.encargos.find(e => e.id===t.encargoId && e.freq==='mensal'))
      .reduce((sum,t) => sum+t.amount, 0);
    const anuais = tasks.filter(t => t.done && s.encargos.find(e => e.id===t.encargoId && e.freq==='anual'))
      .reduce((sum,t) => sum+t.amount, 0);
    const varTotal = Object.values(md.variaveis||{}).flat().reduce((sum,v) => sum+v.amount, 0);
    const josiH = (md.josi?.sessions||[]).reduce((sum,x) => sum+x.hours, 0);
    result.push({ m:label, fixos, var:varTotal, josi:josiH*(md.josi?.rate||7.5), anuais, current:isCurrent });
  }
  return result;
}

function computeJosiHistory(s) {
  const SH = window.MM_STORE.helpers.MONTHS_SHORT;
  const { idx, year } = s.currentMonth;
  const result = [];
  for (let i = 6; i >= 0; i--) {
    let mIdx = idx - i, mYear = year;
    while (mIdx < 0) { mIdx += 12; mYear -= 1; }
    const key = `${mYear}-${String(mIdx+1).padStart(2,'0')}`;
    const md = s.months[key];
    const isCurrent = i === 0;
    const label = SH[mIdx];
    if (!md) { result.push({ m:label, h:0, total:0, current:isCurrent }); continue; }
    if (!isCurrent && md._historySummary) { result.push({ m:label, h:md._historySummary.h||0, total:md._historySummary.total||0, current:false }); continue; }
    const h = (md.josi?.sessions||[]).reduce((sum,x) => sum+x.hours, 0);
    result.push({ m:label, h, total:h*(md.josi?.rate||7.5), current:isCurrent });
  }
  return result;
}

function computeAllVariables(s) {
  const allVars = {};
  Object.values(s.months).forEach(md => {
    Object.entries(md.variaveis||{}).forEach(([cat, entries]) => {
      allVars[cat] = allVars[cat] || [];
      (entries||[]).forEach(e => {
        if (!allVars[cat].find(x => x.date===e.date && x.amount===e.amount)) allVars[cat].push({...e});
      });
    });
  });
  Object.values(allVars).forEach(arr => arr.sort((a,b) => a.date.localeCompare(b.date)));
  return allVars;
}

function findBigUpcoming(s) {
  const SH = window.MM_STORE.helpers.MONTHS_SHORT;
  const curIdx = s.currentMonth.idx;
  let best = null, bestDiff = Infinity;
  s.encargos.filter(e => e.active && e.freq==='anual').forEach(e => {
    const eIdx = SH.findIndex(m => e.month?.startsWith(m));
    if (eIdx===-1) return;
    let diff = eIdx - curIdx;
    if (diff <= 0) diff += 12;
    if (diff < bestDiff) { bestDiff = diff; best = { ...e, monthsAway: diff }; }
  });
  return best;
}

function syncMMData() {
  const s = window.MM_STORE.get();
  const md = window.MM_STORE.helpers.currentMonthData();
  const monthLabel = window.MM_STORE.helpers.currentMonthLabel();
  const tasks = md?.tasks || [];
  const tasksDone = tasks.filter(t => t.done).length;
  const manual = tasks.filter(t => t.type==='Manual');
  const auto   = tasks.filter(t => t.type==='Auto');
  const pending = tasks.filter(t => !t.done).reduce((sum,t) => sum+t.amount, 0);
  const spendHistory = computeSpendHistory(s);
  const josiHistory  = computeJosiHistory(s);
  const allVars      = computeAllVariables(s);
  const bigUpcoming  = findBigUpcoming(s);
  const invMonth     = md?.investimentosMonth || [];
  const monthInvestedAmount = invMonth.reduce((sum,x) => sum+x.amount, 0);
  const monthInvestedCount  = invMonth.length;
  const monthInvestedAsset  = invMonth.length===1 ? invMonth[0].asset : (invMonth.length>1 ? `${invMonth.length} activos` : '');
  const josiWithHistory = md?.josi ? { ...md.josi, history: josiHistory } : { sessions:[], rate:7.5, workerName:'Josi', history:josiHistory };

  Object.assign(window.MM_DATA, {
    user: s.currentUser || s.user || 'Nocas',
    partner: s.partner || 'João',
    month: monthLabel,
    monthIdx: s.currentMonth.idx,
    year: s.currentMonth.year,
    tasks,
    tasksDone,
    tasksTotal: tasks.length,
    manualDone: manual.filter(t=>t.done).length,
    manualTotal: manual.length,
    autoDone: auto.filter(t=>t.done).length,
    autoTotal: auto.length,
    pendingAmount: pending,
    monthTotal: tasks.filter(t=>t.done).reduce((sum,t) => sum+t.amount, 0),
    activity: md?.activity || [],
    spendHistory,
    variaveis: Object.keys(allVars).length ? allVars : (md?.variaveis||{}),
    josi: josiWithHistory,
    josiHours: (md?.josi?.sessions||[]).reduce((s,x) => s+x.hours, 0),
    josiAmount: (md?.josi?.sessions||[]).reduce((s,x) => s+x.hours, 0) * (md?.josi?.rate||7.5),
    josiRate: md?.josi?.rate||7.5,
    cofres: s.cofres,
    investimentos: s.investimentos,
    encargos: s.encargos,
    banks: s.banks,
    bigUpcoming,
    monthInvestedAmount,
    monthInvestedCount,
    monthInvestedAsset,
  });
}

// ── PIN Screen ────────────────────────────────────────────────────────────────
function PinScreen({ pinHash, onSuccess, onSetup }) {
  const p = window.MM_PALETTE, f = window.MM_FONT;
  const isSetup = !pinHash;
  const [phase, setPhase] = useSA(isSetup ? 'enter' : 'verify');
  const [pin, setPin] = useSA('');
  const [firstPin, setFirstPin] = useSA('');
  const [error, setError] = useSA('');
  const inputRef = React.useRef(null);

  React.useEffect(() => { inputRef.current?.focus(); }, [phase]);

  const submit = (value) => {
    const next = value.trim();
    if (next.length < 4) return;
    if (phase === 'verify') {
      if (btoa(next) === pinHash) { onSuccess(); }
      else { setError('PIN incorrecto. Tenta de novo.'); setPin(''); }
    } else if (phase === 'enter') {
      setFirstPin(next); setPin(''); setPhase('confirm');
    } else if (phase === 'confirm') {
      if (next === firstPin) { onSetup(next); }
      else { setError('Os PINs não coincidem. Começa de novo.'); setPin(''); setFirstPin(''); setPhase('enter'); }
    }
  };

  const handleChange = e => {
    const val = e.target.value.replace(/\D/g, '').slice(0, 6);
    setPin(val);
    setError('');
    if (val.length >= 4) submit(val);
  };

  const handleKey = e => {
    if (e.key === 'Enter') submit(pin);
  };

  const title = phase==='verify' ? 'Introduz o PIN' : phase==='enter' ? 'Cria um PIN' : 'Confirma o PIN';
  const sub   = phase==='verify' ? 'Para entrar na aplicação' : phase==='enter' ? '4 a 6 dígitos para proteger o acesso' : 'Repete os mesmos dígitos';

  return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center',
      background:p.bg, fontFamily:f.family }}>
      <div style={{ width:320, textAlign:'center' }}>
        <div style={{ width:48, height:48, borderRadius:'50%', background:p.green, color:p.onGreen,
          display:'flex', alignItems:'center', justifyContent:'center',
          fontWeight:800, fontSize:26, letterSpacing:'-0.03em', margin:'0 auto 24px' }}>m</div>
        <div style={{ fontSize:22, fontWeight:800, letterSpacing:'-0.02em', marginBottom:6 }}>{title}</div>
        <div style={{ fontSize:13, color:p.textDim, fontWeight:500, marginBottom:32 }}>{sub}</div>
        <input
          ref={inputRef}
          type="password"
          inputMode="numeric"
          value={pin}
          onChange={handleChange}
          onKeyDown={handleKey}
          placeholder="••••"
          style={{
            width:'100%', boxSizing:'border-box',
            padding:'16px 20px', fontSize:28, letterSpacing:'0.3em',
            textAlign:'center', fontFamily:f.family, fontWeight:700,
            border:`2px solid ${error ? p.expense : p.border}`,
            borderRadius:14, outline:'none', background:p.surface2,
            color:p.text,
          }}
        />
        {error && <div style={{ fontSize:12, color:p.expense, fontWeight:600, marginTop:12 }}>{error}</div>}
        <button onClick={() => submit(pin)} style={{
          marginTop:16, width:'100%', padding:'14px', fontSize:15, fontWeight:700,
          background:p.text, color:p.bg, border:'none', borderRadius:14,
          cursor:'pointer', fontFamily:f.family,
        }}>
          {phase==='verify' ? 'Entrar' : phase==='enter' ? 'Continuar' : 'Confirmar PIN'}
        </button>
      </div>
    </div>
  );
}

// ── App Shell (main UI) ───────────────────────────────────────────────────────
function AppShell() {

    // syncMMData já é chamado pelo subscriber global; aqui só forçamos re-render

// ── Root App (auth flow) ──────────────────────────────────────────────────────
function App() {
  const [phase, setPhase] = useSA('loading'); // loading | pin | user | app
  const [pinHash, setPinHash] = useSA(null);

  useEA(() => {
    window._fbReady.then(async () => {
      // Load persisted state from Firebase
      try {
        const raw = await window._fbLoad('v2-state');
        if (raw) {
          // raw may be a JSON string or already an object
          const data = typeof raw === 'string' ? JSON.parse(raw) : raw;
          if (data && data.months) {
            window.MM_STORE.actions.loadState(data);
          }
        } else {
          // Firebase has nothing — try to migrate from old localStorage (v1 dark theme)
          try {
            const ls = localStorage.getItem('monimoni:v1');
            if (ls) {
              const old = JSON.parse(ls);
              if (old && old.months) {
                window.MM_STORE.actions.loadState(old);
                // immediately persist to Firebase so migration only runs once
                if (window._fbSave) window._fbSave('v2-state', ls);
              }
            }
          } catch(e2) { console.warn('localStorage migration failed', e2); }
        }
      } catch(e) { console.warn('state load failed', e); }
      // Load PIN — always show PIN screen (setup if no PIN, verify if exists)
      try {
        const pin = await window._fbLoad('v2-pin');
        if (pin?.hash) setPinHash(pin.hash);
        setPhase('pin');
      } catch(e) { setPhase('pin'); }
    }).catch(() => setPhase('user'));
  }, []);

  if (phase === 'loading') return <LoadingScreen />;
  if (phase === 'pin') return (
    <PinScreen
      pinHash={pinHash}
      onSuccess={() => setPhase('user')}
      onSetup={async (pin) => {
        try { await window._fbSave('v2-pin', { hash: btoa(pin) }); } catch(e) {}
        setPhase('user');
      }}
    />
  );
  if (phase === 'user') return (
    <UserSelect onSelect={name => {
      window.MM_STORE.actions.setCurrentUser(name);
      setPhase('app');
    }} />
  );
  return <AppShell />;
}

// ── Wire toasts + initial sync + render ──────────────────────────────────────
// Subscriber global: mantém MM_DATA sempre actualizado quando o store muda,
// mesmo antes de AppShell estar montado (ex: quando loadState corre após Firebase carregar)
window.MM_STORE.subscribe(syncMMData);
syncMMData();

(function wireToasts() {
  const A = window.MM_STORE.actions;
  const toast = (msg, kind) => window.MM_TOAST?.push(msg, { kind: kind||'success' });
  const wrap = (name, fn) => {
    const orig = A[name];
    if (!orig || orig.__wrapped) return;
    A[name] = function(...args) { const r = orig.apply(this,args); try { fn(args,r); } catch(e){} return r; };
    A[name].__wrapped = true;
  };
  wrap('toggleTask',      ([id]) => { const t=window.MM_STORE.get().months[window.MM_STORE.helpers.monthKey(window.MM_STORE.get().currentMonth.idx,window.MM_STORE.get().currentMonth.year)]?.tasks.find(x=>x.id===id); if(t) toast(t.done?`"${t.label}" marcada`:`"${t.label}" desmarcada`, t.done?'success':'info'); });
  wrap('addTask',         ([label]) => toast(`Tarefa "${label}" adicionada`));
  wrap('deleteTask',      () => toast('Tarefa eliminada', 'info'));
  wrap('addJosiSession',  ([,hours]) => toast(`${hours}h de limpeza registadas`));
  wrap('deleteJosiSession',() => toast('Sessão eliminada', 'info'));
  wrap('addInvestment',   ([,asset]) => toast(`Movimento em ${asset} registado`));
