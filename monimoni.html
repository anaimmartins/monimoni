<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Monimoni</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCpYKbyco8Kka-xOI42qS7BuVdGWhKuzP4",
    authDomain: "monimoni-e96b6.firebaseapp.com",
    projectId: "monimoni-e96b6",
    storageBucket: "monimoni-e96b6.firebasestorage.app",
    messagingSenderId: "820576443924",
    appId: "1:820576443924:web:b0eb6201d0c6580d37d101"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window._fbLoad = async (key) => {
    try {
      const snap = await getDoc(doc(db, "monimoni", key));
      return snap.exists() ? snap.data().value : null;
    } catch(e) { console.error("load", key, e); return null; }
  };
  window._fbSave = async (key, val) => {
    try {
      await setDoc(doc(db, "monimoni", key), { value: val });
      return true;
    } catch(e) { console.error("save", key, e); return false; }
  };
  window._fbReady = true;
  window.dispatchEvent(new Event("fb-ready"));
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { background: #0d1117; font-family: 'Lexend', sans-serif; color: #e2e8f0; overscroll-behavior: none; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: #0d1117; }
  ::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }
  input, select, textarea, button { font-family: 'Lexend', sans-serif; }
  input[type=number]::-webkit-inner-spin-button { opacity: 1; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
  @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Constants ────────────────────────────────────────────────────────────────

const TASKS = [
  { id:'nocas-cc',   label:'Nocas → Conta Conjunta',           desc:'1.050€',                                      type:'Manual' },
  { id:'joao-cc',    label:'João → Conta Conjunta',            desc:'1.200€',                                      type:'Manual' },
  { id:'jb1-cc',     label:'JB1 → Conta Conjunta',             desc:'250€ · automático dia 1',                     type:'Auto'   },
  { id:'jb1-poup',   label:'JB1 → Poupança Conjunta',          desc:'400€ se saldo JB1 ≥ 5.500€',                 type:'Manual' },
  { id:'cc-nocas',   label:'Conta Conjunta → Nocas',           desc:'750€ renda · automático dia 2',               type:'Auto'   },
  { id:'cc-pai',     label:'Conta Conjunta → Pai',             desc:'750€ renda · automático dia 3',               type:'Auto'   },
  { id:'cc-tomas',   label:'Conta Conjunta → Tomás',           desc:'50€ · automático dia 3',                      type:'Auto'   },
  { id:'invest',     label:'Conta Conjunta → Investimentos',   desc:'150€ (XTB, Maclear, Trade Republic)',         type:'Manual' },
  { id:'dep-prazo',  label:'Conta Conjunta → Dep. Prazo',      desc:'150€ · automático dia 2',                     type:'Auto'   },
  { id:'ajc-escola', label:'AJC Nocas → Escola Tomás',         desc:'Restante com AJC Jojo',                       type:'Manual' },
  { id:'gar-toi',    label:'Renda Garagem → Toi',              desc:'47,50€',                                      type:'Manual' },
  { id:'gar-jb1',    label:'Renda Garagem → JB1 / Poupança',  desc:'47,50€ (ou poup. conjunta se JB1 > 5.500€)', type:'Manual' },
  { id:'tomas-xtb',  label:'Tomás → XTB ETF MSCI World',      desc:'100€',                                        type:'Manual' },
  { id:'natacao',    label:'Natação SCP → Poup. Conjunta',     desc:'35€ · automático dia 5 (set25–jul26)',        type:'Auto'   },
  { id:'josi',       label:'Pagar Josi',                       desc:'Ver secção Josi para o total',                type:'Manual' },
  { id:'coverflex',  label:'Supermercado via Coverflex',        desc:'Lembrete',                                    type:'Info'   },
  { id:'sobras',     label:'Sobras Conta Conjunta → Poupança', desc:'No final do mês',                             type:'Info'   },
  { id:'condominio', label:'Condomínio JB1',                   desc:'Quando aplicável · 53,43€/mês',              type:'Manual' },
];

const ACCOUNTS = [
  { id:'ab_poup',   label:'Poupança Pessoal',    group:'AB Nocas'    },
  { id:'ab_dp',     label:'DP JB1',              group:'AB Nocas'    },
  { id:'tr_n_emerg',label:'Fundo de Emergência', group:'Trade Nocas' },
  { id:'tr_n_conj', label:'Poupanças Conjuntas', group:'Trade Nocas' },
  { id:'tr_n_pes',  label:'Poupanças Pessoais',  group:'Trade Nocas' },
  { id:'tr_j_jb1',  label:'JB1',                group:'Trade João'  },
  { id:'tr_j_poup', label:'Poupanças',           group:'Trade João'  },
];

const ASSETS = [
  { id:'sp500',    label:'S&P 500 (SXR8)',        platform:'Trade Republic' },
  { id:'obrig',    label:'Obrigações',             platform:'Maclear'        },
  { id:'reit',     label:'Imobiliário REIT',       platform:'XTB'            },
  { id:'ouro',     label:'Ouro (Xetra-Gold)',      platform:'XTB'            },
  { id:'ia',       label:'IA & Big Data (XAIX)',   platform:'XTB'            },
  { id:'btc',      label:'Bitcoin (BTC)',           platform:'Trade Republic' },
  { id:'ubiquity', label:'Ubiquity',               platform:'XTB'            },
  { id:'tomas',    label:'Tomás — MSCI World',     platform:'XTB'            },
];

const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

// ── Firebase helpers ─────────────────────────────────────────────────────────

const ld = async (key) => {
  const raw = await window._fbLoad(key);
  if (!raw) return null;
  try { return JSON.parse(raw); } catch { return raw; }
};
const sv = async (key, val) => window._fbSave(key, JSON.stringify(val));

// ── Format helpers ────────────────────────────────────────────────────────────

const fmt = n => (parseFloat(n)||0).toLocaleString('pt-PT',{style:'currency',currency:'EUR'});
const fmtD = iso => { try { return new Date(iso).toLocaleDateString('pt-PT',{day:'2-digit',month:'short'}); } catch { return '—'; } };
const fmtT = iso => { try { return new Date(iso).toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'}); } catch { return ''; } };
const mkKey = (y,m) => `${y}-${String(m+1).padStart(2,'0')}`;

// ── Shared UI ─────────────────────────────────────────────────────────────────

const Card = ({children, style={}}) => (
  <div style={{background:'#111827',border:'1px solid #1f2937',borderRadius:'16px',padding:'16px',...style}}>
    {children}
  </div>
);

const SecTitle = ({children}) => (
  <div style={{fontFamily:"'Fraunces',serif",fontSize:'22px',color:'#f9fafb',marginBottom:'14px',fontWeight:'600'}}>
    {children}
  </div>
);

const Btn = ({children, onClick, variant='primary', disabled=false, style={}}) => {
  const base = {padding:'12px 20px',borderRadius:'12px',fontSize:'14px',fontWeight:'600',border:'none',cursor:disabled?'not-allowed':'pointer',...style};
  const v = {
    primary:   {background:'linear-gradient(135deg,#059669,#10b981)',color:'#fff'},
    secondary: {background:'#1f2937',color:'#9ca3af',border:'1px solid #374151'},
    danger:    {background:'rgba(239,68,68,0.12)',color:'#f87171',border:'1px solid rgba(239,68,68,0.2)'},
    ghost:     {background:'none',color:'#6b7280',padding:'6px 10px'},
  };
  return <button onClick={onClick} disabled={disabled} style={{...base,...v[variant],opacity:disabled?0.4:1}}>{children}</button>;
};

const Pill = ({label}) => {
  const c = {Auto:{bg:'rgba(96,165,250,0.12)',text:'#60a5fa'},Manual:{bg:'rgba(245,158,11,0.12)',text:'#f59e0b'},Info:{bg:'rgba(107,114,128,0.15)',text:'#9ca3af'}};
  const col = c[label]||c.Info;
  return <span style={{fontSize:'10px',padding:'2px 8px',borderRadius:'8px',background:col.bg,color:col.text,fontWeight:'500',flexShrink:0}}>{label}</span>;
};

const Field = ({label, value, onChange, type='text', placeholder=''}) => (
  <div style={{marginBottom:'14px'}}>
    <label style={{display:'block',color:'#6b7280',fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'6px'}}>{label}</label>
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      style={{width:'100%',padding:'12px 14px',background:'#1f2937',border:'1px solid #374151',borderRadius:'12px',color:'#e5e7eb',fontSize:'14px',outline:'none'}} />
  </div>
);

const Label = ({children}) => (
  <div style={{fontSize:'11px',color:'#4b5563',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'8px'}}>{children}</div>
);

// ── Modal ─────────────────────────────────────────────────────────────────────

const Modal = ({title, onClose, children}) => (
  <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:50,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
    <div style={{background:'#111827',borderRadius:'24px 24px 0 0',width:'100%',maxWidth:'480px',maxHeight:'90vh',overflowY:'auto',padding:'24px 20px 48px',animation:'slideUp 0.25s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'22px'}}>
        <div style={{fontFamily:"'Fraunces',serif",fontSize:'22px',color:'#f9fafb',fontWeight:'600'}}>{title}</div>
        <button onClick={onClose} style={{background:'#1f2937',border:'none',borderRadius:'50%',width:'34px',height:'34px',color:'#9ca3af',fontSize:'18px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
      </div>
      {children}
    </div>
  </div>
);

// ── Screens ───────────────────────────────────────────────────────────────────

function Home({done, total, lastCofre, jH, jAmt, mk, inv, hist, cl, onNewMonth, onHistView}) {
  const now = new Date();
  const [confirm, setConfirm] = useState(false);
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  const monthInv = inv.filter(i=>i.mk===mk);
  const invTotal = monthInv.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const cofreTotal = lastCofre ? Object.values(lastCofre.vals).reduce((s,v)=>s+(parseFloat(v)||0),0) : null;

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'14px',animation:'fadeUp 0.3s ease'}}>
      <Card>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'14px'}}>
          <div>
            <div style={{color:'#4b5563',fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'4px'}}>Progresso do Mês</div>
            <div style={{color:'#10b981',fontSize:'14px',fontWeight:'600',marginBottom:'6px'}}>{MONTHS[now.getMonth()]} {now.getFullYear()}</div>
            <div style={{fontSize:'42px',fontWeight:'700',color:'#10b981',lineHeight:1,fontFamily:"'Fraunces',serif"}}>{pct}%</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:'30px',fontWeight:'700',color:'#f9fafb'}}>{done}<span style={{color:'#374151',fontSize:'18px'}}>/{total}</span></div>
            <div style={{color:'#4b5563',fontSize:'12px'}}>tarefas</div>
          </div>
        </div>
        <div style={{background:'#1f2937',borderRadius:'6px',height:'6px',overflow:'hidden'}}>
          <div style={{width:`${pct}%`,height:'100%',background:'linear-gradient(90deg,#059669,#34d399)',borderRadius:'6px',transition:'width 0.6s ease'}} />
        </div>
      </Card>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'10px'}}>
        <Card style={{padding:'12px',textAlign:'center'}}>
          <div style={{color:'#4b5563',fontSize:'10px',textTransform:'uppercase',marginBottom:'6px'}}>Josi</div>
          <div style={{fontSize:'20px',fontWeight:'700',color:'#f59e0b'}}>{jH.toFixed(1)}h</div>
          <div style={{color:'#6b7280',fontSize:'11px',marginTop:'2px'}}>{fmt(parseFloat(jAmt))}</div>
        </Card>
        <Card style={{padding:'12px',textAlign:'center'}}>
          <div style={{color:'#4b5563',fontSize:'10px',textTransform:'uppercase',marginBottom:'6px'}}>Cofres</div>
          {cofreTotal!==null ? <>
            <div style={{fontSize:'12px',fontWeight:'700',color:'#60a5fa',lineHeight:1.2}}>{fmt(cofreTotal)}</div>
            <div style={{color:'#4b5563',fontSize:'10px',marginTop:'4px'}}>{fmtD(lastCofre.date)}</div>
          </> : <div style={{color:'#374151',fontSize:'12px',paddingTop:'4px'}}>—</div>}
        </Card>
        <Card style={{padding:'12px',textAlign:'center'}}>
          <div style={{color:'#4b5563',fontSize:'10px',textTransform:'uppercase',marginBottom:'6px'}}>Invest.</div>
          {monthInv.length>0 ? <>
            <div style={{fontSize:'12px',fontWeight:'700',color:'#34d399',lineHeight:1.2}}>{fmt(invTotal)}</div>
            <div style={{color:'#4b5563',fontSize:'10px',marginTop:'4px'}}>{monthInv.length} reg.</div>
          </> : <div style={{color:'#374151',fontSize:'12px',paddingTop:'4px'}}>—</div>}
        </Card>
      </div>

      {done>0 && (() => {
        const recent = TASKS.filter(t=>cl&&cl[t.id]?.done).slice(-3).reverse();
        return (
          <Card>
            <div style={{color:'#4b5563',fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'12px'}}>Últimas Tarefas</div>
            {recent.map(t => {
              const s = cl?.[t.id];
              return (
                <div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid #1a2332'}}>
                  <div style={{fontSize:'13px',color:'#9ca3af',maxWidth:'65%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.label}</div>
                  <div style={{fontSize:'11px',color:'#10b981'}}>{s?.by} · {fmtT(s?.at)}</div>
                </div>
              );
            })}
          </Card>
        );
      })()}

      {hist.length>0 && (
        <Card>
          <div style={{color:'#4b5563',fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'12px'}}>Histórico</div>
          {hist.slice(0,4).map(h => {
            const hDone = TASKS.filter(t=>h.data[t.id]?.done).length;
            return (
              <div key={h.key} onClick={()=>onHistView(h)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #1a2332',cursor:'pointer'}}>
                <div style={{fontSize:'14px',color:'#e5e7eb'}}>{h.label}</div>
                <div style={{fontSize:'12px',color:hDone===TASKS.length?'#10b981':'#f59e0b',fontWeight:'600'}}>{hDone}/{TASKS.length} ✓</div>
              </div>
            );
          })}
        </Card>
      )}

      <Card style={{border:'1px dashed #1f2937'}}>
        {!confirm ? (
          <Btn onClick={()=>setConfirm(true)} variant="secondary" style={{width:'100%'}}>🔄  Iniciar Novo Mês</Btn>
        ) : (
          <div>
            <div style={{color:'#f59e0b',fontSize:'13px',textAlign:'center',marginBottom:'14px'}}>⚠️ O mês atual será arquivado e as tarefas e horas da Josi serão reiniciadas.</div>
            <div style={{display:'flex',gap:'8px'}}>
              <Btn onClick={()=>setConfirm(false)} variant="secondary" style={{flex:1}}>Cancelar</Btn>
              <Btn onClick={()=>{onNewMonth();setConfirm(false);}} style={{flex:1,background:'linear-gradient(135deg,#b45309,#f59e0b)'}}>Confirmar</Btn>
            </div>
          </div>
        )}
      </Card>
    </div>
  );
}

function Tasks({tasks, cl, onToggle}) {
  const [filter, setFilter] = useState('all');
  const shown = filter==='all' ? tasks : tasks.filter(t=>t.type===filter);
  const done  = tasks.filter(t=>cl[t.id]?.done).length;
  return (
    <div style={{animation:'fadeUp 0.3s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
        <SecTitle>Tarefas</SecTitle>
        <div style={{color:'#6b7280',fontSize:'13px',fontWeight:'600'}}>{done}/{tasks.length}</div>
      </div>
      <div style={{display:'flex',gap:'6px',marginBottom:'16px',overflowX:'auto',paddingBottom:'2px'}}>
        {['all','Manual','Auto','Info'].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{padding:'5px 14px',borderRadius:'20px',fontSize:'12px',fontWeight:'500',whiteSpace:'nowrap',border:'none',cursor:'pointer',background:filter===f?'#10b981':'#1f2937',color:filter===f?'#fff':'#6b7280'}}>
            {f==='all'?'Todas':f}
          </button>
        ))}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
        {shown.map(task => {
          const st = cl[task.id];
          const isDone = !!st?.done;
          return (
            <div key={task.id} onClick={()=>onToggle(task.id)} style={{background:isDone?'rgba(16,185,129,0.06)':'#111827',border:`1px solid ${isDone?'rgba(16,185,129,0.25)':'#1f2937'}`,borderRadius:'14px',padding:'14px',display:'flex',alignItems:'flex-start',gap:'12px',cursor:'pointer',transition:'opacity 0.15s'}}>
              <div style={{width:'22px',height:'22px',borderRadius:'50%',flexShrink:0,marginTop:'1px',background:isDone?'#10b981':'transparent',border:`2px solid ${isDone?'#10b981':'#374151'}`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:'13px',transition:'all 0.2s'}}>
                {isDone&&'✓'}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:'14px',color:isDone?'#4b5563':'#e5e7eb',textDecoration:isDone?'line-through':'none',lineHeight:1.4}}>{task.label}</div>
                <div style={{fontSize:'12px',color:'#374151',marginTop:'2px'}}>{task.desc}</div>
                {isDone&&<div style={{fontSize:'11px',color:'#059669',marginTop:'5px'}}>✓ {st.by} · {fmtD(st.at)} {fmtT(st.at)}</div>}
              </div>
              <Pill label={task.type} />
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Cofres({data, onNew}) {
  const [open, setOpen] = useState(data[0]?.id??null);
  const groups = {};
  ACCOUNTS.forEach(a=>{ if(!groups[a.group]) groups[a.group]=[]; groups[a.group].push(a); });
  return (
    <div style={{animation:'fadeUp 0.3s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
        <SecTitle>Cofres</SecTitle>
        <Btn onClick={onNew} style={{padding:'8px 16px',fontSize:'13px'}}>+ Novo</Btn>
      </div>
      {data.length===0 ? (
        <Card style={{textAlign:'center',padding:'40px 16px',color:'#374151'}}>
          <div style={{fontSize:'40px',marginBottom:'10px'}}>◈</div>
          <div style={{fontSize:'14px'}}>Ainda sem snapshots.<br/>Adiciona o primeiro registo.</div>
        </Card>
      ) : (
        <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
          {data.map((entry,idx)=>{
            const total = Object.values(entry.vals).reduce((s,v)=>s+(parseFloat(v)||0),0);
            const isOpen = open===entry.id;
            return (
              <Card key={entry.id} style={{padding:'14px'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}} onClick={()=>setOpen(isOpen?null:entry.id)}>
                  <div>
                    <div style={{fontSize:'13px',color:'#6b7280'}}>{fmtD(entry.date)} · {entry.by}</div>
                    {idx===0&&<div style={{fontSize:'11px',color:'#10b981',marginTop:'2px',fontWeight:'600'}}>● Mais recente</div>}
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                    <div style={{fontSize:'18px',fontWeight:'700',color:'#60a5fa'}}>{fmt(total)}</div>
                    <span style={{color:'#374151',fontSize:'12px'}}>{isOpen?'▲':'▼'}</span>
                  </div>
                </div>
                {isOpen&&(
                  <div style={{marginTop:'14px',borderTop:'1px solid #1f2937',paddingTop:'14px'}}>
                    {Object.entries(groups).map(([grp,accts])=>{
                      const grpTotal = accts.reduce((s,a)=>s+(parseFloat(entry.vals[a.id])||0),0);
                      return (
                        <div key={grp} style={{marginBottom:'14px'}}>
                          <div style={{fontSize:'11px',color:'#4b5563',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'8px'}}>{grp}</div>
                          {accts.map(a=>(
                            <div key={a.id} style={{display:'flex',justifyContent:'space-between',padding:'5px 0'}}>
                              <div style={{fontSize:'13px',color:'#6b7280'}}>{a.label}</div>
                              <div style={{fontSize:'13px',color:'#e5e7eb',fontWeight:'500'}}>{fmt(parseFloat(entry.vals[a.id])||0)}</div>
                            </div>
                          ))}
                          <div style={{display:'flex',justifyContent:'space-between',borderTop:'1px solid #1a2332',paddingTop:'5px',marginTop:'4px'}}>
                            <div style={{fontSize:'12px',color:'#374151'}}>Total {grp}</div>
                            <div style={{fontSize:'13px',color:'#60a5fa',fontWeight:'600'}}>{fmt(grpTotal)}</div>
                          </div>
                        </div>
                      );
                    })}
                    <div style={{display:'flex',justifyContent:'space-between',borderTop:'2px solid #1f2937',paddingTop:'10px'}}>
                      <div style={{fontSize:'14px',color:'#9ca3af',fontWeight:'600'}}>Total Global</div>

function App() {
  const now = new Date();
  const yr  = now.getFullYear(), mo = now.getMonth();
  const mk  = mkKey(yr, mo);

  const [fbReady, setFbReady] = useState(!!window._fbReady);
  const [ready,   setReady]   = useState(false);
  const [user,    setUser]    = useState(null);
  const [tab,     setTab]     = useState('home');
  const [cl,      setCl]      = useState({});
  const [cofres,  setCofres]  = useState([]);
  const [inv,     setInv]     = useState([]);
  const [josi,    setJosi]    = useState([]);
  const [josiCfg, setJosiCfg] = useState({rate:9});
  const [hist,    setHist]    = useState([]);
  const [modal,   setModal]   = useState(null);
  const [histView,setHistView]= useState(null);
  const [toast,   setToast]   = useState(null);

  useEffect(()=>{
    if(fbReady) return;
    const h = ()=>setFbReady(true);
    window.addEventListener('fb-ready', h);
    return ()=>window.removeEventListener('fb-ready', h);
  },[fbReady]);

  useEffect(()=>{
    if(!fbReady) return;
    Promise.all([
      ld(`cl-${mk}`), ld('cofres'), ld('inv'),
      ld(`josi-${mk}`), ld('josi-cfg'), ld('cl-hist'),
    ]).then(([c,co,iv,j,jc,h])=>{
      setCl(c||{}); setCofres(co||[]); setInv(iv||[]);
      setJosi(j||[]); if(jc) setJosiCfg(jc); setHist(h||[]);
      setReady(true);
    });
  },[fbReady]);

  if(!fbReady || !ready) return <Splash msg={!fbReady?'A ligar ao Firebase…':'A carregar dados…'}/>;
  if(!user) return <Login onSelect={setUser}/>;

  const showToast = (msg, ok=true) => {
    setToast({msg,ok});
    setTimeout(()=>setToast(null), 2000);
  };

  const toggle = async (id) => {
    const cur  = cl[id];
    const next = {...cl, [id]: cur?.done ? null : {done:true, by:user, at:new Date().toISOString()}};
    setCl(next);
    const ok = await sv(`cl-${mk}`, next);
    showToast(ok ? 'Guardado ✓' : 'Erro ao guardar ✗', ok);
  };

  const newMonth = async () => {
    const entry = {key:mk, label:`${MONTHS[mo]} ${yr}`, data:cl, at:new Date().toISOString(), by:user};
    const h = [entry, ...hist];
    setHist(h); await sv('cl-hist', h);
    setCl({}); await sv(`cl-${mk}`, {});
    setJosi([]); await sv(`josi-${mk}`, []);
    showToast('Novo mês iniciado ✓');
  };

  const saveCofre = async (vals) => {
    const next = [{id:Date.now(), date:new Date().toISOString(), by:user, vals}, ...cofres];
    setCofres(next); const ok = await sv('cofres', next);
    showToast(ok?'Snapshot guardado ✓':'Erro ao guardar ✗', ok);
    setModal(null);
  };

  const saveInv = async (data) => {
    const next = [{id:Date.now(), date:new Date().toISOString(), mk, by:user, ...data}, ...inv];
    setInv(next); const ok = await sv('inv', next);
    showToast(ok?'Investimento guardado ✓':'Erro ao guardar ✗', ok);
    setModal(null);
  };

  const saveJosi = async (data) => {
    const next = [...josi, {id:Date.now(), by:user, at:new Date().toISOString(), ...data}].sort((a,b)=>a.date.localeCompare(b.date));
    setJosi(next); const ok = await sv(`josi-${mk}`, next);
    showToast(ok?'Guardado ✓':'Erro ao guardar ✗', ok);
    setModal(null);
  };

  const deleteJosi = async (id) => {
    const next = josi.filter(e=>e.id!==id);
    setJosi(next); await sv(`josi-${mk}`, next);
    showToast('Entrada removida');
  };

  const saveJosiCfg = async (cfg) => { setJosiCfg(cfg); await sv('josi-cfg', cfg); showToast('Valor/hora atualizado ✓'); };

  const jH   = josi.reduce((s,e)=>s+(parseFloat(e.hours)||0), 0);
  const jAmt = (jH * josiCfg.rate).toFixed(2);
  const done = TASKS.filter(t=>cl[t.id]?.done).length;

  const views = {
    home:   <Home done={done} total={TASKS.length} lastCofre={cofres[0]} jH={jH} jAmt={jAmt} mk={mk} inv={inv} hist={hist} cl={cl} onNewMonth={newMonth} onHistView={setHistView}/>,
    tasks:  <Tasks tasks={TASKS} cl={cl} onToggle={toggle}/>,
    cofres: <Cofres data={cofres} onNew={()=>setModal('cofre')}/>,
    invest: <Invest data={inv} mk={mk} onNew={()=>setModal('invest')}/>,
    josi:   <JosiView entries={josi} cfg={josiCfg} hours={jH} total={jAmt} onNew={()=>setModal('josi')} onCfgChange={saveJosiCfg} onDelete={deleteJosi}/>,
  };

  return (
    <div style={{background:'#0d1117',minHeight:'100vh',maxWidth:'480px',margin:'0 auto',paddingBottom:'80px'}}>
      <Header user={user} onLogout={()=>setUser(null)} month={MONTHS[mo]} year={yr}/>
      <main style={{padding:'16px 16px 24px'}}>{views[tab]}</main>
      <Nav tab={tab} setTab={setTab} done={done} total={TASKS.length}/>
      {modal==='cofre'  && <CofreModal  last={cofres[0]?.vals} onSave={saveCofre} onClose={()=>setModal(null)}/>}
      {modal==='invest' && <InvModal    onSave={saveInv}        onClose={()=>setModal(null)}/>}
      {modal==='josi'   && <JosiModal   onSave={saveJosi}       onClose={()=>setModal(null)}/>}
      {histView && <HistModal entry={histView} onClose={()=>setHistView(null)}/>}
      {toast && <Toast msg={toast.msg} ok={toast.ok}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
